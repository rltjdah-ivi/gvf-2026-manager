          <span>${title}</span>
          <span style="font-size:13px;font-weight:700;color:#1B4FA0;background:#EFF6FF;padding:2px 9px;border-radius:99px;">총 ${total}명</span>
          <span style="font-size:12px;font-weight:700;color:#15803d;background:#DCFCE7;padding:2px 9px;border-radius:99px;">✅ 수집 ${collected}</span>
          <span style="font-size:12px;font-weight:700;color:#92400e;background:#FEF3C7;padding:2px 9px;border-radius:99px;">⏳ 미수집 ${pending}</span>
        </div>
        <div style="font-size:12px;color:#64748b;margin-top:5px;">${esc(description)}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;display:flex;align-items:center;gap:8px;">
        <div>
          <div style="font-size:22px;font-weight:800;color:#1B4FA0;">${pctVal}<span style="font-size:13px;">%</span></div>
          <div style="font-size:10px;color:#64748b;font-weight:600;">진행률</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;">
          <button onclick="toggleMatEditSort('${matKey}')" style="padding:4px 10px;border-radius:14px;font-size:10px;font-weight:700;background:${editSortMode?'#1B4FA0':'#F1F5F9'};color:${editSortMode?'#fff':'#1B4FA0'};border:1px solid #BFDBFE;cursor:pointer;white-space:nowrap;">${editSortMode?'✓ 완료':'↕ 순서 편집'}</button>
          <button onclick="openMatAddDialog('${matKey}')" style="padding:4px 10px;border-radius:14px;font-size:10px;font-weight:700;background:#DCFCE7;color:#15803d;border:1px solid #BBF7D0;cursor:pointer;white-space:nowrap;">＋ 추가</button>
        </div>
      </div>
    </div>
    <div style="margin-top:10px;height:6px;background:#F1F5F9;border-radius:99px;overflow:hidden;">
      <div style="height:100%;width:${pctVal}%;background:linear-gradient(90deg,#1B4FA0,#3B82F6);border-radius:99px;transition:width .4s;"></div>
    </div>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap;">
    <input type="text" placeholder="🔍 이름·소속·이메일로 검색" value="${esc(window._matSearch||'')}" oninput="window._matSearch=this.value;draw()" style="flex:1;min-width:180px;padding:7px 12px;border-radius:8px;border:1.5px solid #BFDBFE;font-size:13px;outline:none;">
  </div>
  <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;">
    ${mkFilterBtn("all","전체")}
    ${mkFilterBtn("collected","✅ 수집됨")}
    ${mkFilterBtn("pending","⏳ 미수집")}
    ${mkFilterBtn("hasFiles",`📎 파일 있음 (${withFiles})`)}
    <span style="font-size:11px;color:#64748b;margin-left:auto;align-self:center;">${filtered.length}/${sortedSP.length}명 표시</span>
  </div>

  ${filtered.length === 0 ? `
    <div class="card" style="text-align:center;padding:30px;color:#94a3b8;font-size:13px;">조건에 맞는 연사가 없습니다</div>
  ` : `
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${filtered.map((sp, i) => {
        const d = getSpeakerMaterial(matKey, sp.id);
        const files = d.files || [];
        const fullName = sp.name || `연사 #${i+1}`;
        const dupBadge = sp._isDuplicate
          ? `<span style="font-size:9px;background:#F5F3FF;color:#7c3aed;padding:1px 6px;border-radius:4px;font-weight:700;">🔁 ${esc(sp._suffix || "추가")}</span>`
          : "";
        const isOpen = window._matExpandedId === `${matKey}:${sp.id}`;
        return `
        <div class="card" style="padding:0;overflow:hidden;border:1px solid ${editSortMode?'#FDE68A':(d.collected?'#BBF7D0':'#E2E8F0')};margin-bottom:0;background:${editSortMode?'#FFFBEB':'#fff'};">
          <div style="padding:10px 13px;display:flex;align-items:center;gap:10px;">
            ${editSortMode ? `
              <div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0;">
                <button onclick="event.stopPropagation();moveMatItem('${matKey}','${sp.id}',-1)" style="padding:3px 10px;border-radius:5px;background:#1B4FA0;color:#fff;border:none;cursor:pointer;font-size:12px;line-height:1;font-weight:700;min-width:30px;" title="위로">▲</button>
                <button onclick="event.stopPropagation();moveMatItem('${matKey}','${sp.id}',1)" style="padding:3px 10px;border-radius:5px;background:#1B4FA0;color:#fff;border:none;cursor:pointer;font-size:12px;line-height:1;font-weight:700;min-width:30px;" title="아래로">▼</button>
              </div>
            ` : `<input type="checkbox" ${d.collected?"checked":""} onchange="toggleMatCollected('${matKey}','${sp.id}',this.checked)" style="width:20px;height:20px;cursor:pointer;flex-shrink:0;accent-color:#16a34a;">`}
            <div onclick="${editSortMode?'':`toggleMatCard('${matKey}','${sp.id}')`}" style="flex:1;min-width:0;cursor:${editSortMode?'default':'pointer'};">
              <div style="font-size:13px;font-weight:700;color:${d.collected?'#15803d':'#0B1D3F'};display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
                <span style="text-decoration:${d.collected?'line-through':'none'};opacity:${d.collected?'0.7':'1'};">${esc(fullName)}</span>
                ${sp._isManual ? `<span style="font-size:9px;background:#FEF3C7;color:#92400e;padding:1px 6px;border-radius:4px;font-weight:700;">＋ 수동</span>` : sbadge(sp.status||"pending")}
                ${dupBadge}
                ${files.length > 0 ? `<span style="font-size:10px;background:#EFF6FF;color:#1B4FA0;padding:1px 6px;border-radius:4px;font-weight:700;">📎 ${files.length}</span>` : ""}
              </div>
              ${(sp.org || sp.title) ? `<div style="font-size:11px;color:#64748b;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${sp.title?esc(sp.title)+(sp.org?" · ":""):""}${esc(sp.org||"")}</div>` : ""}
              ${sp.email ? `<div style="font-size:10px;color:#94a3b8;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">📧 ${esc(sp.email)}</div>` : ""}
            </div>
            ${editSortMode ? `
              ${sp._isManual ? `<button onclick="deleteMatManual('${matKey}','${sp.id}')" style="padding:4px 9px;border-radius:5px;background:#FEF2F2;color:#ef4444;border:1px solid #FECACA;cursor:pointer;font-size:10px;font-weight:700;flex-shrink:0;">✕ 삭제</button>` : ""}
            ` : `<label style="padding:5px 11px;border-radius:14px;cursor:pointer;font-size:11px;font-weight:700;background:#EFF6FF;color:#1B4FA0;border:1px solid #BFDBFE;flex-shrink:0;white-space:nowrap;" title="자료 업로드">
              📎 첨부
              <input type="file" multiple style="display:none;" onchange="uploadSpeakerMaterial('${matKey}','${sp.id}',event)">
            </label>`}
            ${editSortMode ? "" : `<span onclick="toggleMatCard('${matKey}','${sp.id}')" style="font-size:14px;color:#94a3b8;flex-shrink:0;cursor:pointer;transform:rotate(${isOpen?'90':'0'}deg);transition:transform .15s;">›</span>`}
          </div>
          ${(isOpen && !editSortMode) ? `
          <div style="padding:11px 13px;background:#F8FAFC;border-top:1px solid #E2E8F0;">
            ${files.length === 0 ? `
              <div style="text-align:center;padding:14px;color:#94a3b8;font-size:11px;border:1.5px dashed #E2E8F0;border-radius:7px;margin-bottom:8px;">아직 첨부 파일 없음 — 📎 첨부 버튼으로 업로드</div>

              <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:8px;">
                ${files.map((f,fi) => `
                  <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 9px;background:#fff;border:1px solid #E2E8F0;border-radius:6px;gap:6px;">

                    </div>

            <textarea onblur="updateSpeakerMaterialNotes('${matKey}','${sp.id}',this.value)" placeholder="메모 (선택)" style="width:100%;min-height:50px;padding:7px 9px;border-radius:6px;border:1px solid #E2E8F0;font-size:11px;font-family:inherit;outline:none;resize:vertical;box-sizing:border-box;">${esc(d.notes||'')}</textarea>
          </div>` : ""}
        </div>`;
      }).join("")}
    </div>
  `}
  ${window._matAddMatKey === matKey ? `
    <div onclick="if(event.target===this)closeMatAddDialog()" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;">
      <div style="background:#fff;border-radius:14px;max-width:480px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.3);overflow:hidden;">
        <div style="padding:14px 18px;border-bottom:1px solid #E2E8F0;display:flex;justify-content:space-between;align-items:center;">

        <div style="padding:16px 18px;display:flex;flex-direction:column;gap:10px;">
          <div><label style="font-size:11px;font-weight:700;color:#64748b;display:block;margin-bottom:4px;">이름 <span style="color:#ef4444;">*</span></label>

// 현재 화면에 표시된 sortedSP를 재구성하기 위한 보조: pageMatPpt의 옵션을 재현
function _rebuildMatSorted(matKey) {
  // 페이지 호출로 sortedSP를 다시 계산
  if (matKey === "ppt") {
    return _computeMatSortedForOpts({
      excludeChairs: true,
      excludeNames: ["Jerome", "Lim", "Minwon", "Jae Kyoun", "Hee Soo", "Jae-Hwan"],
      includeNames: ["Sushant"],
      duplicateAfter: [{after:"Sushant", name:"Nakorn Premsri", suffix:"Plenary"}]
    }, matKey);
  }
  if (matKey === "abstract") {
    return _computeMatSortedForOpts({}, matKey);
  }
  return _computeMatSortedForOpts({}, matKey);
}

function _computeMatSortedForOpts(opts, matKey) {
  // renderMaterialBySpeaker의 정렬 결과만 추출하는 헬퍼
  const excludeChairs = opts.excludeChairs === true;
  const excludeNames = Array.isArray(opts.excludeNames) ? opts.excludeNames : [];
  const includeNames = Array.isArray(opts.includeNames) ? opts.includeNames : [];
  const duplicateAfter = Array.isArray(opts.duplicateAfter) ? opts.duplicateAfter : [];
  const manualEntries = (window.MAT_MANUAL?.[matKey]) || [];
  const customOrder = (window.MAT_SORT_ORDER?.[matKey]) || [];
  const includeNorms = includeNames.map(t => normalizeSpName(String(t)));
  const isIncluded = (sp) => includeNorms.some(t => t && normalizeSpName(sp.name||"").includes(t));
  let arr;
  if (excludeChairs) {
    const chairIds = getChairIdSet();
    SP.forEach(s => { if (isIncluded(s)) chairIds.delete(s.id); });
    arr = getSpeakersSortedByLOP().filter(s => !chairIds.has(s.id));
  } else arr = getSpeakersSortedByLOP();
  if (excludeNames.length > 0) {
    arr = arr.filter(s => {
      if (isIncluded(s)) return true;
      const f = normalizeSpName(s.name||"");
      return !excludeNames.some(t => f.includes(normalizeSpName(String(t))));
    });
  }
  duplicateAfter.forEach(rule => {
    const afterN = normalizeSpName(rule.after||"");
    const tgtN = normalizeSpName(rule.name||"");
    if (!afterN || !tgtN) return;
    const target = SP.find(s => normalizeSpName(s.name||"").includes(tgtN));
    if (!target) return;
    const idx = arr.findIndex(s => normalizeSpName(s.name||"").includes(afterN));
    if (idx < 0) return;
    const dupId = target.id + "_dup_" + (rule.suffix ? rule.suffix.replace(/\s+/g,"_") : "1");
    arr.splice(idx+1, 0, {...target, id: dupId, _isDuplicate:true, _origId:target.id, _suffix:rule.suffix||""});
  });
  manualEntries.forEach(m => arr.push({...m, _isManual:true}));
  if (customOrder.length > 0) {
    const ord = new Map(customOrder.map((id,i)=>[id,i]));
    arr.sort((a,b)=>{
      const ai = ord.has(a.id) ? ord.get(a.id) : Number.MAX_SAFE_INTEGER;
      const bi = ord.has(b.id) ? ord.get(b.id) : Number.MAX_SAFE_INTEGER;
      return ai - bi;
    });
  }
  return arr;
}

window.moveMatItem = (matKey, spId, delta) => {
  if (!window.MAT_SORT_ORDER) window.MAT_SORT_ORDER = {};
  try {
    const arr = _rebuildMatSorted(matKey);
    const ids = arr.map(s => s.id);
    const idx = ids.indexOf(spId);
    if (idx < 0) {
      console.warn(`[순서편집] id 못 찾음: ${spId} (matKey=${matKey})`, ids);
      return;
    }
    const newIdx = idx + delta;
    if (newIdx < 0 || newIdx >= ids.length) {
      console.log(`[순서편집] 경계 도달 (idx=${idx}, delta=${delta})`);
      return;
    }
    // swap
    const tmp = ids[idx];
    ids[idx] = ids[newIdx];
    ids[newIdx] = tmp;
    window.MAT_SORT_ORDER[matKey] = ids;
    console.log(`[순서편집] ${spId} 이동: ${idx} → ${newIdx}`);
    scheduleSave();
    draw();
  } catch(e) {
    console.error("[순서편집] 오류:", e);
    alert("순서 편집 중 오류: " + e.message);
  }
};

function uploadFiles(event) {
  const files = Array.from(event.target.files);
  if(!files.length) return;
  const stored = getFiles();
  let processed = 0;
  files.forEach(file => {
    if(file.size > 4.5*1024*1024) { alert(file.name+" 파일이 너무 큽니다"); processed++; return; }
    const reader = new FileReader();
    reader.onload = e => {
      const id = "f_"+Date.now()+"_"+Math.random().toString(36).slice(2,7);
      const now = new Date().toLocaleDateString("ko-KR",{month:"numeric",day:"numeric"});
      stored.push({id, name:file.name, type:file.type, size:file.size, date:now, data:e.target.result});
      processed++;
      if(processed===files.length) { saveFiles(stored); draw(); event.target.value=""; }
    };
    reader.readAsDataURL(file);
  });
}

function viewFile(id) { const f=getFiles().find(x=>x.id===id); if(!f)return; const w=window.open(); w.document.write(`<iframe src="${f.data}" style="width:100%;height:100vh;border:none;"></iframe>`); }
function downloadFile(id) { const f=getFiles().find(x=>x.id===id); if(!f)return; const a=document.createElement("a"); a.href=f.data; a.download=f.name; a.click(); }
function deleteFile(id) { saveFiles(getFiles().filter(f=>f.id!==id)); draw(); }

window.autoFillSection = async (travelId, section, event) => {
  const file = event.target.files[0];
  if (!file) return;
  const statusEl = document.getElementById(`td-autofill-status-${travelId}`);
  const setStatus = (msg, color="#1B4FA0", bg="#EFF6FF") => {
    if (!statusEl) return;
    statusEl.style.display = "block";
    statusEl.style.color = color;
    statusEl.style.background = bg;
    statusEl.innerHTML = msg;
  };

  const sectionLabels = {
    flight: {icon:"✈️", name:"항공편", fields:["airline","flightNo","flightArr","flightDep","seat","pnr"]},
    hotel:  {icon:"🏨", name:"Hotel",   fields:["hotelName","hotelRes","checkIn","checkOut"]},
    pickup: {icon:"🚗", name:"픽업·교통", fields:["pickupTime","pickupLoc","driver","vehicle","dropTime","dropLoc"]},
  };

  setStatus(`${sectionLabels[section].icon} ${sectionLabels[section].name} 정보 추출 중...`);

  try {
    const text = await extractTextFromFile(file);
    if (!text || text.trim().length < 20) {
      setStatus("⚠️ 텍스트 추출 실패. 스캔본 PDF는 인식이 어렵습니다.", "#92400e", "#FEF3C7");
      event.target.value = "";
      return;
    }

    // 디버그: 추출된 텍스트를 콘솔에 출력 + 전역 변수에 저장
    window._lastExtractedText = text;
    window._lastExtractedResult = null;
    console.log("=== PDF 추출 텍스트 ===");
    console.log(text);

    // 섹션별 추출 함수 호출
    let extracted = {};
    if (section === "flight") extracted = parseFlightInfo(text);
    else if (section === "hotel") extracted = parseHotelInfo(text);
    else if (section === "pickup") extracted = parsePickupInfo(text);

    window._lastExtractedResult = extracted;
    console.log("=== 추출 결과 ===", extracted);

    // 항공편 구간 정보가 있으면 TRAVEL_DETAIL에 직접 저장 + UI 갱신
    if (section === "flight" && extracted.segments && extracted.segments.length > 0) {
      TRAVEL_DETAIL = TRAVEL_DETAIL.map(t => t.id === travelId ? {...t, segments: extracted.segments} : t);
      scheduleSave();
      // 패널 다시 그리기 (segments UI 표시)
      setTimeout(() => draw(), 100);
    }

    // 해당 섹션 필드만 채우기
    const allowedFields = sectionLabels[section].fields;
    const filtered = {};
    Object.entries(extracted).forEach(([k,v]) => {
      if (k === "segments") return; // segments는 별도 처리
      if (allowedFields.includes(k)) filtered[k] = v;
    });

    if (Object.keys(filtered).length === 0 && !extracted.segments) {
      setStatus(`⚠️ ${sectionLabels[section].name} 정보를 찾지 못했습니다. 파일이 맞는지 확인하세요.`, "#92400e", "#FEF3C7");
      event.target.value = "";
      return;
    }

    // UI 채우기 (이미 입력된 필드는 차이 감지 후 사용자에게 교체 옵션 제공)
    const labelMap = {airline:"항공사",flightNo:"편명",flightArr:"도착",flightDep:"출국",seat:"좌석",pnr:"PNR",
                     hotelName:"Hotel",hotelRes:"Confirmation Number",checkIn:"Check In",checkOut:"Check Out",
                     pickupTime:"픽업시간",pickupLoc:"픽업장소",driver:"운전기사",vehicle:"차량",dropTime:"샌딩시간",dropLoc:"샌딩지"};
    let filled = [], skipped = [], conflicts = []; // conflicts: {key, label, old, new}
    Object.entries(filtered).forEach(([key, value]) => {
      const el = document.getElementById("td-" + key);
      if (!el) return;
      const existing = el.value.trim();
      const incoming = String(value || "").trim();
      if (!incoming) return;
      if (!existing) {
        // 빈 칸: 채움
        el.value = value;
        el.style.background = "#F0FDF4";
        el.style.borderColor = "#86efac";
        filled.push(labelMap[key]||key);
      } else if (normalizeForCompare(existing) === normalizeForCompare(incoming)) {
        // 동일: 건너뜀
        skipped.push(labelMap[key]||key);
      } else {
        // 차이 발생: 충돌 기록 + 새 값 임시 보관
        conflicts.push({key, label: labelMap[key]||key, old: existing, "new": incoming});
        el.dataset.pendingValue = incoming;
        el.style.background = "#FEF3C7";
        el.style.borderColor = "#f59e0b";
      }
    });

    let msg = `${sectionLabels[section].icon} <strong>${sectionLabels[section].name}</strong> 분석 완료`;
    if (extracted.segments && extracted.segments.length > 0) {
      msg += `<br>✈️ <strong>${extracted.segments.length}개 구간 인식됨</strong>`;
      msg += `<table style="width:100%;margin-top:4px;font-size:10px;border-collapse:collapse;"><tr style="background:#fff;"><th style="padding:3px 6px;border:1px solid #cbd5e1;">#</th><th style="padding:3px 6px;border:1px solid #cbd5e1;">편명</th><th style="padding:3px 6px;border:1px solid #cbd5e1;">경로</th><th style="padding:3px 6px;border:1px solid #cbd5e1;">출발</th><th style="padding:3px 6px;border:1px solid #cbd5e1;">도착</th></tr>`;
      extracted.segments.forEach((s, i) => {
        msg += `<tr><td style="padding:3px 6px;border:1px solid #cbd5e1;text-align:center;">${i+1}</td><td style="padding:3px 6px;border:1px solid #cbd5e1;font-weight:700;">${s.flightNo||'-'}</td><td style="padding:3px 6px;border:1px solid #cbd5e1;">${s.from||'?'}→${s.to||'?'}</td><td style="padding:3px 6px;border:1px solid #cbd5e1;">${s.depTime||'<span style=\"color:#ef4444;\">없음</span>'}</td><td style="padding:3px 6px;border:1px solid #cbd5e1;">${s.arrTime||'<span style=\"color:#ef4444;\">없음</span>'}</td></tr>`;
      });
      msg += `</table>`;
      // segments 저장 후 화면 다시 그려서 구간 표시
      setTimeout(() => draw(), 100);
    }
    if (filled.length > 0) msg += `<br>✅ 자동 입력: ${filled.join(", ")}`;
    if (skipped.length > 0) msg += `<br>ℹ️ 이미 입력됨 (건너뜀): ${skipped.join(", ")}`;
    if (conflicts.length > 0) {
      msg += `<br>⚠️ <strong>${conflicts.length}개 필드의 값이 다릅니다</strong> — 새 값으로 교체하시겠습니까?`;
      msg += `<div style="margin-top:6px;display:flex;flex-direction:column;gap:4px;">`;
      conflicts.forEach((c,i) => {
        const safeNew = c["new"].replace(/"/g,'&quot;');
        msg += `<div style="background:#fff;border:1px solid #FDE68A;border-radius:6px;padding:5px 9px;font-size:11px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <strong style="color:#92400e;min-width:80px;">${c.label}</strong>
          <span style="color:#94a3b8;text-decoration:line-through;">${esc(c.old)}</span>
          <span style="color:#16a34a;">→</span>
          <strong style="color:#15803d;">${esc(c["new"])}</strong>
          <button onclick="applyConflict('${travelId||''}','${section}','${c.key}','${safeNew}')" style="margin-left:auto;background:#16a34a;color:#fff;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:10px;font-weight:700;">교체</button>
          <button onclick="dismissConflict('${section}','${c.key}','${esc(c.old).replace(/'/g,'&#39;')}')" style="background:#F1F5F9;color:#64748b;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:10px;">유지</button>
        </div>`;
      });
      msg += `<button onclick="applyAllConflicts('${travelId||''}','${section}')" style="margin-top:4px;background:#1B4FA0;color:#fff;border:none;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:11px;font-weight:700;align-self:flex-start;">⚡ 모두 새 값으로 교체</button></div>`;
    }
    msg += `<br><strong>💾 저장 버튼을 눌러 확정하세요</strong>`;
    setStatus(msg, filled.length > 0 || extracted.segments ? "#15803d" : "#92400e", filled.length > 0 || extracted.segments ? "#F0FDF4" : "#FEF3C7");
  } catch (err) {
    setStatus(`⚠️ 분석 실패: ${err.message}`, "#991b1b", "#FEE2E2");
  }
  event.target.value = "";
};

// 값 비교를 위한 정규화 (공백·줄바꿈·대소문자 무시, 날짜 표기 통일)
function normalizeForCompare(s) {
  return String(s || "").trim().toLowerCase()
    .replace(/\s+/g, " ")
    .replace(/[,.]/g, "")
    .replace(/(\d{1,2})\s*[\/\-\.]\s*(\d{1,2})\s*[\/\-\.]\s*(\d{2,4})/g, "$1$2$3");
}

// 단일 충돌 교체 (사용자가 "교체" 버튼 클릭)
window.applyConflict = function(travelId, section, key, newValue) {
  const el = document.getElementById("td-" + key);
  if (!el) return;
  el.value = newValue;
  el.style.background = "#F0FDF4";
  el.style.borderColor = "#86efac";
  delete el.dataset.pendingValue;
  // 충돌 카드 시각적 표시 (해당 행 흐리게)
  if (typeof event !== "undefined" && event && event.target) {
    const card = event.target.closest("div[style*='border:1px solid #FDE68A']");
    if (card) {
      card.style.opacity = "0.4";
      card.style.background = "#F0FDF4";
      card.querySelectorAll("button").forEach(b => b.disabled = true);
    }
  }
};

// 단일 충돌 유지 (사용자가 "유지" 버튼 클릭)
window.dismissConflict = function(section, key, oldValue) {
  const el = document.getElementById("td-" + key);
  if (!el) return;
  el.style.background = "#fff";
  el.style.borderColor = "";
  delete el.dataset.pendingValue;
  if (typeof event !== "undefined" && event && event.target) {
    const card = event.target.closest("div[style*='border:1px solid #FDE68A']");
    if (card) {
      card.style.opacity = "0.4";
      card.querySelectorAll("button").forEach(b => b.disabled = true);
    }
  }
};

// 모든 충돌 일괄 교체
window.applyAllConflicts = function(travelId, section) {
  document.querySelectorAll("input[data-pending-value], textarea[data-pending-value]").forEach(el => {
    el.value = el.dataset.pendingValue;
    el.style.background = "#F0FDF4";
    el.style.borderColor = "#86efac";
    delete el.dataset.pendingValue;
  });
  document.querySelectorAll("div[style*='border:1px solid #FDE68A']").forEach(card => {
    card.style.opacity = "0.4";
    card.style.background = "#F0FDF4";
    card.querySelectorAll("button").forEach(b => b.disabled = true);
  });
};

// 파일에서 텍스트 추출 (PDF/TXT/EML 공통)
async function extractTextFromFile(file) {
  if (file.type === "application/pdf" || /\.pdf$/i.test(file.name)) {
    if (typeof pdfjsLib === "undefined") throw new Error("PDF 라이브러리 로드 실패. 새로고침 후 다시 시도하세요.");
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buf}).promise;
    const pages = [];
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      // ── Y 좌표 기준으로 같은 줄끼리 묶어서 순서 보존 ──
      // 각 item: {str, transform: [a,b,c,d,e,f]} — e=x, f=y
      const items = content.items.map(it => ({
        str: it.str,
        x: it.transform[4],
        y: it.transform[5]
      })).filter(it => it.str && it.str.trim());

      // Y 좌표가 비슷한 것끼리 묶기 (±3px 허용)
      const lines = [];
      items.forEach(it => {
        const line = lines.find(l => Math.abs(l.y - it.y) < 3);
        if (line) {
          line.items.push(it);
        } else {
          lines.push({y: it.y, items: [it]});
        }
      });
      // 같은 줄 안에서 X 순서로 정렬, 줄 자체는 Y 큰 순서(위→아래)
      lines.sort((a, b) => b.y - a.y);
      lines.forEach(line => {
        line.items.sort((a, b) => a.x - b.x);
      });

      // 각 줄을 문자열로 변환 + 줄간 더블 스페이스로 컬럼 표시
      const pageText = lines.map(line => {
        let lineStr = "";
        let prevEnd = -Infinity;
        line.items.forEach((it, idx) => {
          // X 좌표 간격이 크면 (컬럼 구분) 더 많은 공백 추가
          if (idx > 0 && it.x - prevEnd > 20) {
            lineStr += "    ";  // 4 spaces = column separator
          } else if (idx > 0) {
            lineStr += " ";
          }
          lineStr += it.str;
          prevEnd = it.x + (it.str.length * 4); // 대략적 너비
        });
        return lineStr;
      }).join("\n");
      pages.push(pageText);
    }
    return pages.join("\n\n");
  }
  if (/\.(txt|eml)$/i.test(file.name) || file.type.startsWith("text/")) {
    return await file.text();
  }
  if (file.type.startsWith("image/")) {
    throw new Error("이미지는 OCR 미지원. PDF나 텍스트 파일을 사용하세요.");
  }
  throw new Error("지원하지 않는 파일 형식. PDF/TXT/EML을 사용하세요.");
}

function parseFlightInfo(text) {
  const orig = text;
  const t = text.replace(/\s+/g, " ");
  const out = {segments: []};
  const monMap = {JAN:"01",FEB:"02",MAR:"03",APR:"04",MAY:"05",JUN:"06",JUL:"07",AUG:"08",SEP:"09",OCT:"10",NOV:"11",DEC:"12"};

  // ── 도시명 → IATA 매핑 ─────────────────────────────
  const CITY_TO_IATA = {
    "TOKYO HANEDA":"HND", "TOKYO NARITA":"NRT", "TOKYO":"HND",
    "OSAKA KANSAI":"KIX", "OSAKA ITAMI":"ITM", "OSAKA":"KIX",
    "NAGOYA":"NGO", "FUKUOKA":"FUK", "SAPPORO":"CTS", "OKINAWA":"OKA",
    "SEOUL GIMPO":"GMP", "SEOUL INCHEON":"ICN", "SEOUL":"ICN",
    "BANGKOK SUVARNABHUMI":"BKK", "BANGKOK DON":"DMK", "BANGKOK":"BKK",
    "BEIJING":"PEK", "SHANGHAI":"PVG", "HONG KONG":"HKG",
    "TAIPEI":"TPE", "SINGAPORE":"SIN", "MANILA":"MNL",
    "JAKARTA":"CGK", "KUALA LUMPUR":"KUL", "HO CHI MINH":"SGN",
    "HANOI":"HAN", "LONDON":"LHR", "PARIS":"CDG",
    "FRANKFURT":"FRA", "AMSTERDAM":"AMS", "NEW YORK":"JFK",
    "LOS ANGELES":"LAX", "SAN FRANCISCO":"SFO", "CHICAGO":"ORD",
    "SEATTLE":"SEA", "WASHINGTON":"IAD", "TORONTO":"YYZ",
    "VANCOUVER":"YVR", "SYDNEY":"SYD", "MELBOURNE":"MEL",
    "DUBAI":"DXB", "DOHA":"DOH", "DELHI":"DEL", "MUMBAI":"BOM",
    "ADDIS ABABA":"ADD", "ISTANBUL":"IST", "ROME":"FCO", "MADRID":"MAD",
  };

  // ── 헬퍼: 날짜 문자열 파싱 ────────────────────────
  function parseDateStr(s) {
    if (!s) return null;
    s = s.replace(/\s+/g, " ").trim();
    let m;
    // "Mon, 22 Jun 2026" 또는 "22 Jun 2026"
    m = s.match(/(?:Mon|Tue|Wed|Thu|Fri|Sat|Sun)[a-z]*,?\s+(\d{1,2})\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+(\d{2,4})/i);
    if (!m) m = s.match(/(\d{1,2})\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+(\d{2,4})/i);
    if (m) {
      let yr = m[3]; if (yr.length === 2) yr = "20" + yr;
      const mon = monMap[m[2].substring(0,3).toUpperCase()];
      return `${yr}-${mon}-${m[1].padStart(2,"0")}`;
    }
    // "24JUN26" or "24JUN2026"
    m = s.match(/(\d{1,2})([A-Z]{3})(\d{2,4})/i);
    if (m) {
      let yr = m[3]; if (yr.length === 2) yr = "20" + yr;
      const mon = monMap[m[2].toUpperCase()];
      if (mon) return `${yr}-${mon}-${m[1].padStart(2,"0")}`;
    }
    // "2026-06-24"
    m = s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
    if (m) return `${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`;
    return null;
  }

  // ── 알려진 항공사 ────────────────────────────────
  const KNOWN_CARRIERS = ["OZ","KE","AA","DL","UA","JL","NH","TG","SQ","CX","AF","LH","BA","QF","EK","QR","ET","VN","PR","MH","CI","BR","GA","BI","CA","CZ","MU","HU","XJ","KL","IB","TK","SU","AS","WN","B6","F9","NK","AC","WS","LX","AY","SK","LO","OS","JJ","LA","AV","AM","CM","AR","AZ","TP","FI","AI","6E","UK","SG","TR","MI","DG","RA","KB","TZ"];

  // ── 핵심: 편명 위치 기준 블록 단위 처리 ────────────
  // 각 편명 인근 ~300자 블록에서 모든 정보 추출
  const flightCodes = [];
  const reF = /\b([A-Z]{2})\s?(\d{2,4}[A-Z]?)\b/g;
  let fm;
  while ((fm = reF.exec(orig)) !== null) {
    const code = fm[1];
    if (!KNOWN_CARRIERS.includes(code)) continue;
    const before = orig.substring(Math.max(0, fm.index - 40), fm.index).toLowerCase();
    if (/booking\s*ref|reference|reservation|record\s*locator|^pnr|\spnr|ticket\s*(number|no)|operated\s+by\s+$|operated\s+by\b/.test(before)) continue;
    if (!/\n/.test(before) && /fare\s*basis|class\b/.test(before)) continue;
    const flightNum = fm[2].replace(/[A-Z]$/, "");
    flightCodes.push({pos: fm.index, full: code + flightNum.padStart(3, "0"), airline: code});
  }

  // 편명 그룹화 (같은 편명이 가까이 있으면 합침)
  flightCodes.sort((a,b) => a.pos - b.pos);
  const flightGroups = [];
  flightCodes.forEach(fc => {
    const last = flightGroups[flightGroups.length - 1];
    if (last && last.full === fc.full && (fc.pos - last.endPos) < 400) {
      last.endPos = fc.pos;
    } else {
      flightGroups.push({full: fc.full, airline: fc.airline, startPos: fc.pos, endPos: fc.pos});
    }
  });

  // ── 각 편명 블록에서 정보 추출 ─────────────────────
  flightGroups.forEach((g, gi) => {
    // 블록 범위: 이전 편명 끝 ~ 다음 편명 시작까지 (오버랩 방지)
    const prevEnd = gi > 0 ? flightGroups[gi - 1].endPos : 0;
    const nextStart = flightGroups[gi + 1]?.startPos ?? (g.endPos + 1000);
    // 현재 편명 위치 직전 ~100자만 허용 (출발지 도시명이 편명 앞에 있을 수 있어서)
    const blockStart = Math.max(prevEnd, g.startPos - 200);
    const block = orig.substring(blockStart, nextStart);

    let depTime = "", arrTime = "", from = "", to = "", seat = "";

    // 1) 블록 내 시간 후보 (HH:MM) - 메타 라인 제외
    const blockLines = block.split(/\n/);
    const times = [];
    blockLines.forEach((ln, li) => {
      if (/Not\s+Valid|Booking\s+Date|Issuing|Marketed|Operated|Carbon|Booking\s+Status|Special\s+Service|Page\s+\d|Remarks|Telephone|Phone|Flying\s+Time|Flight\s+Time/i.test(ln)) return;
      const reT = /\b(\d{1,2}:\d{2})\b/g;
      let tm;
      while ((tm = reT.exec(ln)) !== null) {
        // hr/min 옆은 제외
        const ctx = ln.substring(Math.max(0, tm.index - 8), tm.index + tm[0].length + 8).toLowerCase();
        if (/hr|hrs|min/.test(ctx)) continue;
        times.push({time: tm[1], lineIdx: li, inLineIdx: tm.index});
      }
    });

    // 2) 블록 내 날짜 후보 - 메타 라인 제외
    const dates = [];
    blockLines.forEach((ln, li) => {
      if (/Not\s+Valid|Booking\s+Date|Issuing|Marketed|Operated|Carbon|Booking\s+Status|Page\s+\d/i.test(ln)) return;
      // "Mon, 22 Jun 2026" 또는 "22 Jun 2026" 모두 매치
      const reD = /(?:(?:Mon|Tue|Wed|Thu|Fri|Sat|Sun)[a-z]*,?\s+)?(\d{1,2})\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+(\d{2,4})/gi;
      let dm;
      while ((dm = reD.exec(ln)) !== null) {
        let yr = dm[3]; if (yr.length === 2) yr = "20" + yr;
        const mon = monMap[dm[2].substring(0,3).toUpperCase()];
        const display = `${yr}-${mon}-${dm[1].padStart(2,"0")}`;
        dates.push({display, lineIdx: li, inLineIdx: dm.index});
      }
      // "24JUN26" 형식도 매치
      const reD2 = /\b(\d{1,2})([A-Z]{3})(\d{2,4})(?:\s*\([A-Z]{3}\))?\b/g;
      let dm2;
      while ((dm2 = reD2.exec(ln)) !== null) {
        const mon = monMap[dm2[2].toUpperCase()];
        if (!mon) continue;
        let yr = dm2[3]; if (yr.length === 2) yr = "20" + yr;
        const display = `${yr}-${mon}-${dm2[1].padStart(2,"0")}`;
        if (!dates.some(d => d.lineIdx === li && Math.abs(d.inLineIdx - dm2.index) < 30)) {
          dates.push({display, lineIdx: li, inLineIdx: dm2.index});
        }
      }
    });

    // 3) 시간-날짜 짝짓기
    // Thai 형식: 시간 2개 한 줄 + 날짜 2개 한 줄 (서로 다른 줄, 가까운 위치)
    // TOPAS 형식: "24JUN26(TUE) 12:40 24JUN26(WED) 17:20" 한 줄에 시간+날짜 같이
    // Sabre: "24JUN 12:05" 한 줄 (날짜+시간 인접)
    //
    // 전략: 시간 2개와 날짜 2개 매칭
    let pairedDates = [];
    if (times.length >= 2 && dates.length >= 2) {
      // 시간 2개와 날짜 2개를 위치순으로 매칭
      // 시간 i번째 → 시간이 위치한 inLineIdx와 가까운 날짜
      times.slice(0, 2).forEach((tm, idx) => {
        // 같은 줄의 가장 가까운 컬럼 날짜
        let best = null;
        let bestDist = Infinity;
        dates.forEach(d => {
          const lineDiff = Math.abs(d.lineIdx - tm.lineIdx);
          const colDiff = Math.abs(d.inLineIdx - tm.inLineIdx);
          // 같은 줄(±2줄) 안의 비슷한 컬럼 위치 우선
          if (lineDiff <= 3) {
            const dist = lineDiff * 100 + colDiff;
            if (dist < bestDist) { bestDist = dist; best = d; }
          }
        });
        // 같은 줄 매칭 실패 시 i번째 날짜 사용
        if (!best && dates[idx]) best = dates[idx];
        if (best) {
          pairedDates.push(`${best.display} ${tm.time}`);
        } else {
          pairedDates.push(tm.time);
        }
      });
    } else if (times.length >= 1 && dates.length >= 1) {
      // 하나만 있는 경우: 첫 날짜 + 각 시간
      times.slice(0, 2).forEach((tm) => {
        pairedDates.push(`${dates[0].display} ${tm.time}`);
      });
    } else if (times.length >= 1) {
      // 날짜 없으면 시간만
      times.slice(0, 2).forEach((tm) => pairedDates.push(tm.time));
    }

    depTime = pairedDates[0] || "";
    arrTime = pairedDates[1] || "";

    // 4) 공항 코드 (IATA 직접) 또는 도시명 추론
    // 블록 내에서 IATA 코드 추출
    const iataPattern = /\b(ADD|SFO|ICN|GMP|LAX|JFK|NRT|HND|KIX|ITM|NGO|FUK|CTS|OKA|PEK|PVG|SHA|HKG|SIN|BKK|DMK|TPE|TSA|KHH|HNL|FRA|LHR|LGW|CDG|ORY|AMS|MAD|FCO|SYD|MEL|BNE|YYZ|YVR|ATL|ORD|DFW|MIA|BOS|SEA|IAD|EWR|MEX|GRU|SCL|DOH|DXB|AUH|JNB|CAI|IST|DEL|BOM|MAA|BLR|MNL|CEB|KUL|PEN|CGK|DPS|SGN|HAN|DAD)\b/g;
    const blockAirports = [];
    let ipm;
    while ((ipm = iataPattern.exec(block)) !== null) {
      blockAirports.push({code: ipm[1], pos: ipm.index});
    }
    // 도시명 추론 (IATA 부족 시)
    if (blockAirports.length < 2) {
      const cityNames = Object.keys(CITY_TO_IATA).sort((a,b) => b.length - a.length);
      const matchedRanges = [];
      cityNames.forEach(c => {
        const reC = new RegExp("\\b" + c.replace(/\s+/g, "\\s+") + "\\b", "gi");
        let cm;
        while ((cm = reC.exec(block)) !== null) {
          if (matchedRanges.some(r => cm.index >= r.start && cm.index < r.end)) continue;
          matchedRanges.push({start: cm.index, end: cm.index + cm[0].length});
          blockAirports.push({code: CITY_TO_IATA[c], pos: cm.index});
        }
      });
      blockAirports.sort((a,b) => a.pos - b.pos);
    }
    // 같은 코드 중복 제거 (헤더 + 본문에 같은 도시명이 반복되는 경우)
    const uniqAirports = [];
    const seenCodes = new Set();
    blockAirports.forEach(a => {
      if (uniqAirports.length >= 2) return;
      if (seenCodes.has(a.code)) return;
      seenCodes.add(a.code);
      uniqAirports.push(a);
    });
    from = uniqAirports[0]?.code || "";
    to = uniqAirports[1]?.code || "";

    // 5) 좌석
    const seatM = block.match(/(?:Seat(?:\s*Number)?|좌석(?:\s*번호)?)[\s:#]*\n?\s*([0-9]{1,3}[A-Z])\b/i);
    if (seatM) seat = seatM[1].toUpperCase();
    else {
      // 표 형식: "Seat Baggage Fare Basis\n12A 2 PCS ZLAST"
      const tableSeat = block.match(/\bSeat\b[^\n]*\n[^\n]*?\b([0-9]{1,3}[A-Z])\b[^\n]*(?:PCS|kg|Basis|ZLAST|YLAST|CLAST)/i);
      if (tableSeat) seat = tableSeat[1].toUpperCase();
      else {
        // Thai 형식: "Terminal 1    12A    2 PCS    ZLAST" (좌석이 Terminal과 같은 줄)
        const termSeat = block.match(/\bTerminal\s+\d[^\n]*?\b([0-9]{1,3}[A-Z])\b[^\n]*(?:PCS|kg)/i);
        if (termSeat) seat = termSeat[1].toUpperCase();
      }
    }

    out.segments.push({
      flightNo: g.full,
      from,
      to,
      depTime,
      arrTime,
      seat,
    });
  });

  // ── 호환성 필드 ─────────────────────────────────
  const carriers = {
    OZ:"Asiana Airlines", KE:"Korean Air", AA:"American Airlines",
    DL:"Delta", UA:"United", JL:"Japan Airlines", NH:"ANA (All Nippon Airways)",
    TG:"Thai Airways", SQ:"Singapore Airlines", CX:"Cathay Pacific",
    AF:"Air France", LH:"Lufthansa", BA:"British Airways",
    QF:"Qantas", EK:"Emirates", QR:"Qatar Airways", ET:"Ethiopian Airlines",
    VN:"Vietnam Airlines", PR:"Philippine Airlines", MH:"Malaysia Airlines",
    CI:"China Airlines", BR:"EVA Air", GA:"Garuda Indonesia", BI:"Royal Brunei",
    CA:"Air China", CZ:"China Southern", MU:"China Eastern", HU:"Hainan Airlines",
    KL:"KLM", IB:"Iberia", TK:"Turkish Airlines", SU:"Aeroflot",
    AS:"Alaska Airlines", AC:"Air Canada", WS:"WestJet", LX:"Swiss",
    AY:"Finnair", SK:"SAS", LO:"LOT Polish", OS:"Austrian Airlines",
    LA:"LATAM", AV:"Avianca", AM:"Aeromexico", AR:"Aerolineas Argentinas",
    AZ:"ITA Airways", TP:"TAP Portugal", FI:"Icelandair", AI:"Air India"
  };
  if (out.segments.length >= 1) out.flightArr = out.segments[0].arrTime || out.segments[0].depTime;
  if (out.segments.length >= 2) out.flightDep = out.segments[out.segments.length - 1].depTime;
  if (out.segments.length > 0) {
    const firstCode = out.segments[0].flightNo.substring(0, 2);
    if (carriers[firstCode]) out.airline = carriers[firstCode];
  }

  // PNR
  const REJECT_PNR = /^(TICKET|NUMBER|BOOKING|REFERENCE|RESERVATION|CONFIRM|FLIGHT|SEAT|GUEST|HOTEL|CHECK|DATE|TIME|TOTAL|BAGGAGE|FARE|BASIS|ECONOMY|BUSINESS|FIRST|CLASS|MILES|AIRLINES|AIRWAYS|NIGHT|ROOM|ISSUE|VALID|VOUCHER|HOLDER|PAGE|FROM|DEPARTURE|ARRIVAL|DEPARTS|ARRIVES|TERMINAL|CARRIER|OPERATED|MARKETED|STATUS|SPECIAL|REMARKS|GENERAL|AIRCRAFT|RECORD|LOCATOR|ITINERARY|RECEIPT|PASSENGER|ISSUING|OFFICE|THAILAND|BANGKOK|SEOUL|TOKYO|OSAKA|BEIJING|ROAD|STREET|AVENUE|SUVARNABHUMI|INCHEON|INTERNATIONAL|RANGSIT|VIBHAVADI|MYEONGDONG|CULTURE|CONTENTS|SMTOWN|EMAIL|PHONE|VOLUNTARY|CHECKIN|CONFIRMED|NONSTOP)$/i;
  const labelM = orig.match(/(?:Booking\s+Reference|Booking\s+Ref\.?|Booking\s+Code|Record\s+Locator|PNR|Reservation\s+(?:Code|Number)|예약\s*(?:번호|코드))/i);
  if (labelM) {
    const after = orig.substring(labelM.index + labelM[0].length, labelM.index + labelM[0].length + 200);
    const tokens = after.match(/\b[A-Z0-9]{5,8}\b/g) || [];
    for (const tok of tokens) {
      if (REJECT_PNR.test(tok)) continue;
      if (/^\d+$/.test(tok)) continue;
      if (/^[A-Z]+$/.test(tok)) continue;
      out.pnr = tok.toUpperCase();
      break;
    }
    if (!out.pnr) {
      for (const tok of tokens) {
        if (REJECT_PNR.test(tok)) continue;
        if (/^\d+$/.test(tok)) continue;
        if (!/[A-Z]/.test(tok)) continue;
        out.pnr = tok.toUpperCase();
        break;
      }
    }
  }

  return out;
}

function parseHotelInfo(text) {
  const orig = text;
  const t = text.replace(/\s+/g, " ");
  const out = {};

  // ── 1) 예약번호 ────────────────────────────────────
  const resPatterns = [
    /(?:Confirmation\s+(?:Number|Code|#|No\.?|Numbers?))[\s\S]{0,50}?([A-Z0-9][A-Z0-9\-\/]{5,24})\b/i,
    /(?:Booking\s+(?:Number|ID|Code|Ref(?:erence)?|No\.?))[\s\S]{0,50}?([A-Z0-9][A-Z0-9\-\/]{5,24})\b/i,
    /(?:Reservation\s+(?:ID|Number|Code|No\.?|Confirmation))[\s\S]{0,50}?([A-Z0-9][A-Z0-9\-\/]{5,24})\b/i,
    /(?:예약\s*(?:확인\s*)?(?:번호|코드))[\s\S]{0,50}?([A-Z0-9][A-Z0-9\-\/]{5,24})\b/i,
    /(?:Conf(?:irmation)?\.?\s*[#No\.]+)[\s\S]{0,50}?([A-Z0-9][A-Z0-9\-\/]{5,24})\b/i,
  ];
  for (const re of resPatterns) {
    const m = orig.match(re) || t.match(re);
    if (m && m[1]) {
      const v = m[1].trim();
      if (!/^(HOTEL|GUEST|ROOM|EMAIL|PHONE|DATE|TIME|CHECK|NIGHT|TOTAL|TAX|RATE|CARD|VISA|MASTER|AMEX|CONFIRM|BOOKING|RESERV|NUMBER)$/i.test(v)) {
        out.hotelRes = v;
        break;
      }
    }
  }

  // ── 2) 호텔 이름 ───────────────────────────────────
  // 2a. 라벨
  let hotelNameM = orig.match(/(?:Hotel\s+Name|Property\s+Name|숙소(?:명)?|호텔(?:명)?)\s*[:：]\s*([^\n\r]{5,80}?)(?=\s*(?:Address\s*[:：]|(?:^|\s)Phone\s*[:：]|(?:^|\s)Tel\.?\s*[:：]|Email\s*[:：]|주소\s*[:：]|전화\s*[:：]|Check[\s\-]?in|Check[\s\-]?out|체크인|체크아웃|Confirmation\s+(?:Number|Code)|Booking\s+(?:Number|ID|Code)|Reservation\s+(?:ID|Number|Code)|예약\s*(?:확인\s*)?(?:번호|코드)|$|\n))/i);
  if (hotelNameM) out.hotelName = hotelNameM[1].trim().replace(/[,\.\s]+$/, "");

  // 2b. "Thank you for choosing XXX" 패턴 (공식 호텔 바우처에서 가장 정확함)
  if (!out.hotelName) {
    const thankM = orig.match(/(?:Thank\s+you\s+for\s+(?:choosing|selecting|staying\s+(?:at|with))|We\s+are\s+pleased\s+to\s+(?:welcome\s+you\s+to|confirm\s+your\s+reservation\s+at))\s+([^.\n]{5,100}?)(?=\s*(?:\.|We\s+are|We\s+would|Please|$|\n))/i);
    if (thankM) out.hotelName = thankM[1].trim().replace(/[,\s]+$/, "");
  }

  // 2c. 체인 호텔 (THE 접두사 포함)
  if (!out.hotelName) {
    const chainStart = /\b((?:THE\s+)?(?:Sotetsu|Marriott|Hilton|Hyatt|Sheraton|Westin|Conrad|Lotte|Shilla|Plaza|Four\s+Seasons|Grand\s+Hyatt|Park\s+Hyatt|Novotel|Ibis|Ramada|InterContinental|Holiday\s+Inn|Courtyard|Fairmont|Hyundai|Best\s+Western|Crowne\s+Plaza|Doubletree|Renaissance|Aloft|Le\s+Meridien|M[öo]venpick|Mercure|Sofitel|Pullman|Banyan\s+Tree|Mandarin\s+Oriental|Ritz[\s\-]Carlton|St\.?\s+Regis|W\s+Hotel|JW\s+Marriott|Anantara|Kempinski|Oakwood|Fraser|Pan\s+Pacific|Shangri[\s\-]La|Hard\s+Rock|Wyndham))\b/i;
    const cM = orig.match(chainStart);
    if (cM) {
      const startIdx = cM.index;
      const tail = orig.substring(startIdx, startIdx + 100);
      const stopPattern = /(?:Confirmation\s+(?:Number|Code|#|No\.?)|Booking\s+(?:Number|ID|Code|Ref)|Reservation\s+(?:ID|Number|Code)|Address\s*[:：]|(?:^|\s)Phone\s*[:：]?|(?:^|\s)Tel\.?\s*[:：]|(?:^|\s)Fax\s*[:：]?|Email\s*[:：]|Invoice\s+(?:Date|Number)|Check[\s\-]?in|Check[\s\-]?out|Arrival\s+Date|Departure\s+Date|Room\s+Type|Room\s+Category|Guest\s+Name|예약\s*(?:확인\s*)?(?:번호|코드)|체크인|체크아웃|주소|전화|숙소명|호텔명|Dear\s|Thank\s+you|\d{4}[-\/.]\d|We\s+are)/i;
      const stopM = tail.match(stopPattern);
      let extracted = stopM ? tail.substring(0, stopM.index) : tail;
      extracted = extracted.split(/[\n\r]/)[0].trim();
      if (extracted.length > 60) {
        const words = extracted.split(/\s+/);
        extracted = words.slice(0, 8).join(" ");
      }
      out.hotelName = extracted.replace(/[,\.\s]+$/, "");
    }
  }

  // 2d. "XXX Hotel" 후행
  if (!out.hotelName) {
    const tailM = orig.match(/\b([A-Z][A-Za-z0-9&'\-]+(?:\s+[A-Z][A-Za-z0-9&'\-]+){0,4}\s+(?:Hotel|Resort|Suites|Inn|Tower|Residence|Hostel))\b(?!\s*(?:Name|Address|Phone))/);
    if (tailM) out.hotelName = tailM[1].trim();
  }

  // ── 3) 체크인/체크아웃 ─────────────────────────────
  const dateRegexStr = "(\\d{1,2}[A-Z]{3}\\d{2,4}(?:\\s*\\([A-Z]{3}\\))?|\\d{1,2}\\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*(?:,?\\s+\\d{4})?|(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\\s+\\d{1,2}(?:,?\\s+\\d{2,4})?|\\d{4}[-\\/.]\\d{1,2}[-\\/.]\\d{1,2}|\\d{1,2}[-\\/.]\\d{1,2}[-\\/.]\\d{2,4})";

  // ── 3) 체크인/체크아웃 ─────────────────────────────
  // 더 정밀한 매칭: 같은 줄 안에서 라벨 + 날짜 찾기 (PDF 컬럼 레이아웃 대응)
  // 단어가 떨어져 있어도 OK ("Jun 24, 2026 Wednesday" 같은 패턴 포함)
  const fullDateInLine = "(?:(\\d{1,2})[A-Z]{3}\\d{2,4}|(\\d{1,2})\\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*(?:,?\\s+\\d{2,4})?|(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\\.?\\s+\\d{1,2}(?:,?\\s+\\d{2,4})?|\\d{4}[-\\/.]\\d{1,2}[-\\/.]\\d{1,2}|\\d{1,2}[-\\/.]\\d{1,2}[-\\/.]\\d{2,4})";

  // 줄 단위로 검색 (PDF 좌표 정렬로 한 줄에 라벨+값이 같이 있음)
  const lines = orig.split(/\n/);
  for (const line of lines) {
    if (!out.checkIn && /Check[\s\-]*[Ii]n(?:\s+Date)?|Arrival\s+Date|입실|체크인/i.test(line)) {
      const m = line.match(new RegExp(fullDateInLine));
      if (m) out.checkIn = m[0].trim();
    }
    if (!out.checkOut && /Check[\s\-]*[Oo]ut(?:\s+Date)?|Departure\s+Date|퇴실|체크아웃/i.test(line)) {
      const m = line.match(new RegExp(fullDateInLine));
      if (m) out.checkOut = m[0].trim();
    }
  }

  // 줄 단위로 못 찾으면 전체 텍스트에서 라벨 인접 매칭 (백업)
  if (!out.checkIn) {
    const ciM = orig.match(new RegExp(
      `(?:Check[-\\s]*[Ii]n(?:\\s+Date)?|Arrival(?:\\s+Date)?|Arriving|입실|체크인|숙박\\s*시작)[\\s:\\-]*${fullDateInLine}`, "i"
    ));
    if (ciM) out.checkIn = ciM[0].replace(/^[^A-Z0-9]*(?:Check[-\s]*[Ii]n(?:\s+Date)?|Arrival(?:\s+Date)?|Arriving|입실|체크인|숙박\s*시작)[\s:\-]*/i, "").trim();
  }
  if (!out.checkOut) {
    const coM = orig.match(new RegExp(
      `(?:Check[-\\s]*[Oo]ut(?:\\s+Date)?|Departure(?:\\s+Date)?|Departing|퇴실|체크아웃|숙박\\s*종료)[\\s:\\-]*${fullDateInLine}`, "i"
    ));
    if (coM) out.checkOut = coM[0].replace(/^[^A-Z0-9]*(?:Check[-\s]*[Oo]ut(?:\s+Date)?|Departure(?:\s+Date)?|Departing|퇴실|체크아웃|숙박\s*종료)[\s:\-]*/i, "").trim();
  }

  // 미발견 시 연속 2개 날짜 (취소정책 날짜 등 배제)
  if (!out.checkIn || !out.checkOut) {
    const allDates = [];
    const reDates = new RegExp(fullDateInLine, "gi");
    let dm;
    while ((dm = reDates.exec(orig)) !== null) {
      const before = orig.substring(Math.max(0,dm.index-40), dm.index).toLowerCase();
      if (/issued|sent|today|email|invoice\s*date|order\s*date|booked\s*on|cancel|policy|prior\s+to|by\s+\d|advise|advance|notice/i.test(before)) continue;
      const after = orig.substring(dm.index + dm[0].length, dm.index + dm[0].length + 15).toLowerCase();
      if (/^\s*(pm|am|p\.m\.|a\.m\.)/i.test(after)) continue;
      allDates.push(dm[0]);
    }
    if (allDates.length >= 2) {
      if (!out.checkIn) out.checkIn = allDates[0];
      if (!out.checkOut) out.checkOut = allDates[1];
    } else if (allDates.length === 1 && !out.checkIn) {
      out.checkIn = allDates[0];
    }
  }

  // 체크인/체크아웃이 같은 형식이고 연도가 빠진 경우 다른 쪽에서 보강
  // 예: "Jun 30, 24" → "Jun 30, 2024" 처럼 부정확한 연도 제거
  const fixYear = (s) => {
    if (!s) return s;
    // "Jun 30, 24" 같은 2자리 연도를 정상 4자리로 (PDF 추출 단편화 보정)
    s = s.replace(/(\b[A-Z][a-z]{2}\.?\s+\d{1,2},?\s+)(\d{2})\b(?!\d)/i, (m, p1, p2) => {
      const yr = parseInt(p2);
      return p1 + (yr < 50 ? "20"+p2 : "19"+p2);
    });
    return s.trim();
  };
  if (out.checkIn) out.checkIn = fixYear(out.checkIn);
  if (out.checkOut) out.checkOut = fixYear(out.checkOut);

  // ── 4) 객실 타입 ───────────────────────────────────
  let roomM = orig.match(/(?:Room\s+Type|Room\s+Category|객실\s*(?:타입|종류))\s*[:：]?\s*([^\n\r]{3,60}?)(?=\s*(?:Preference|Number\s+of|Nightly|$|\n))/i);
  if (!roomM) {
    roomM = orig.match(/\b((?:Deluxe|Standard|Superior|Executive|Suite|Premium|Twin|King|Queen|Double|Single|Family|Junior|Penthouse)\s*(?:Room|Bed|Twin|Double|Single|Suite|King|Queen)?(?:\s+(?:with|w\/|ocean|city|garden|sea|mountain|river)\s+\w+){0,2})/i);
  }
  if (roomM) out.roomType = roomM[1].trim().substring(0, 60);

  // ── 5) 조식 ────────────────────────────────────────
  if (/Breakfast(?:\s+included|\s*,|\s+Free|\s+Inclusive)/i.test(orig) || /조식\s*(?:포함|Inclusive)/i.test(orig)) {
    out.breakfast = "Y";
  } else if (/Breakfast.*(?:not\s+included|excluded|N\/A|미포함|불포함)/i.test(orig)) {
    out.breakfast = "N";
  }

  // ── 6) Nights → 체크아웃 추론 ──────────────────────
  // 체크아웃이 이미 있으면 건너뜀, "1 day prior" 같은 정책 문구도 배제
  if (out.checkIn && !out.checkOut) {
    const nightsM = orig.match(/(?<!prior\s+to\s+)(?<!by\s+)(\d{1,2})\s*(?:Nights?\b|박)/i);
    if (nightsM) {
      const nights = parseInt(nightsM[1]);
      const ci = normDate(out.checkIn);
      if (ci) {
        const co = new Date(ci.getTime() + nights * 86400000);
        out.checkOut = `${co.getFullYear()}-${String(co.getMonth()+1).padStart(2,"0")}-${String(co.getDate()).padStart(2,"0")}`;
      }
    }
  }

  return out;
}

// 다양한 포맷의 날짜 문자열을 Date 객체로 변환
function normDate(s) {
  if (!s) return null;
  s = s.trim();
  // 24JUN26 또는 24JUN2026
  const monMap = {JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};
  let m = s.match(/^(\d{1,2})([A-Z]{3})(\d{2,4})/i);
  if (m) {
    let y = parseInt(m[3]); if (y < 100) y += 2000;
    return new Date(y, monMap[m[2].toUpperCase()]||0, parseInt(m[1]));
  }
  // 2026-06-24 또는 2026/06/24
  m = s.match(/^(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})/);
  if (m) return new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
  // 24/06/2026 또는 24.06.2026 (DD/MM/YYYY 가정)
  m = s.match(/^(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{2,4})/);
  if (m) {
    let y = parseInt(m[3]); if (y < 100) y += 2000;
    return new Date(y, parseInt(m[2])-1, parseInt(m[1]));
  }
  // 24 Jun 2026
  m = s.match(/^(\d{1,2})\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*(?:,?\s+(\d{4}))?/i);
  if (m) {
    const y = m[3] ? parseInt(m[3]) : 2026;
    return new Date(y, monMap[m[2].substring(0,3).toUpperCase()], parseInt(m[1]));
  }
  // Jun 24, 2026
  m = s.match(/^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+(\d{1,2})(?:,?\s+(\d{4}))?/i);
  if (m) {
    const y = m[3] ? parseInt(m[3]) : 2026;
    return new Date(y, monMap[m[1].substring(0,3).toUpperCase()], parseInt(m[2]));
  }
  return null;
}

function parsePickupInfo(text) {
  const t = text.replace(/\s+/g, " ").replace(/[^\S ]+/g, " ");
  const out = {};

  // 픽업 시간 (Pickup time / Pick-up at / 픽업)
  const puTimeM = t.match(/(?:Pick(?:-|\s)?up|픽업)[\s:]*(?:Time|일시|시간)?[\s:]*(\d{1,2}[\/\-]\d{1,2}[^,]{0,15}?\d{1,2}[:.]\d{2}|\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*[^.]{0,20}?\d{1,2}[:.]\d{2})/i);
  if (puTimeM) out.pickupTime = puTimeM[1].replace(/\./g, ":");

  // 픽업 장소 (Pickup location / 만남 장소)
  const puLocM = t.match(/(?:Pick(?:-|\s)?up\s+(?:Location|Point|Place|Spot)|만남\s*장소|픽업\s*장소|Meeting\s+Point)[\s:]*([A-Za-z0-9가-힣 ,\.\-#]{3,60})/i)
              || t.match(/\b(ICN\s+(?:T1|T2|Terminal\s+\d|Exit\s+\d+|Gate\s+\d+)[A-Za-z0-9 ,]*?)/i)
              || t.match(/\b(GMP\s+(?:Terminal|Exit)[A-Za-z0-9 ,]*?)/i);
  if (puLocM) out.pickupLoc = puLocM[1].trim();

  // 운전기사 (Driver / 기사)
  const driverM = t.match(/(?:Driver|운전기사|기사(?:님)?)[\s:]*(?:Name)?[\s:]*([가-힣A-Za-z]+(?:\s*[\(\/].*?[\)\]])?\s*(?:010|011|016|017|018|019|\+\d{1,3})?[-\s\d]{8,15})/i)
              || t.match(/(?:Driver|운전기사|기사)[\s:]*([가-힣A-Za-z]{2,10})\s+(\d{2,3}[-\s]?\d{3,4}[-\s]?\d{4})/i);
  if (driverM) out.driver = driverM[0].replace(/^(?:Driver|운전기사|기사(?:님)?)[\s:]*/i, "").trim();

  // 차량 (Vehicle / 차량번호)
  const vehicleM = t.match(/(?:Vehicle|차량(?:\s*번호)?|Car)[\s:]*([A-Za-z0-9가-힣\s,]{3,40})/i)
                || t.match(/(\d{2,3}[가-힣]\s?\d{4})/);
  if (vehicleM) out.vehicle = vehicleM[1].trim().substring(0, 50);

  // 샌딩 시간 (Drop-off / 출국 픽업)
  const dropTimeM = t.match(/(?:Drop(?:-|\s)?off|샌딩|복귀\s*픽업)[\s:]*(?:Time|일시|시간)?[\s:]*(\d{1,2}[\/\-]\d{1,2}[^,]{0,15}?\d{1,2}[:.]\d{2}|\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*[^.]{0,20}?\d{1,2}[:.]\d{2})/i);
  if (dropTimeM) out.dropTime = dropTimeM[1].replace(/\./g, ":");

  // 샌딩 도착지 (Drop-off location)
  const dropLocM = t.match(/(?:Drop(?:-|\s)?off\s+(?:Location|Point|Place)|샌딩\s*도착지|복귀\s*장소)[\s:]*([A-Za-z0-9가-힣 ,\.\-#]{3,60})/i);
  if (dropLocM) out.dropLoc = dropLocM[1].trim();

  return out;
}

window.autoFillTravelDetail = async (travelId, event) => {
  const file = event.target.files[0];
  if (!file) return;
  const statusEl = document.getElementById(`td-autofill-status-${travelId}`);
  const setStatus = (msg, color="#1B4FA0", bg="#EFF6FF") => {
    if (!statusEl) return;
    statusEl.style.display = "block";
    statusEl.style.color = color;
    statusEl.style.background = bg;
    statusEl.textContent = msg;
  };

  setStatus("🔍 파일 분석 중...");

  try {
    let text = "";
    if (file.type === "application/pdf" || /\.pdf$/i.test(file.name)) {
      if (typeof pdfjsLib === "undefined") throw new Error("PDF 라이브러리 로드 실패. 새로고침 후 다시 시도하세요.");
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data: buf}).promise;
      const pages = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        pages.push(content.items.map(it => it.str).join(" "));
      }
      text = pages.join("\n");
    } else if (/\.(txt|eml)$/i.test(file.name) || file.type.startsWith("text/")) {
      text = await file.text();
    } else if (file.type.startsWith("image/")) {
      setStatus("⚠️ 이미지는 OCR 미지원. PDF나 텍스트 파일을 사용하세요.", "#92400e", "#FEF3C7");
      event.target.value = "";
      return;
    } else {
      setStatus("⚠️ 지원하지 않는 파일 형식입니다. PDF/TXT/EML을 사용하세요.", "#92400e", "#FEF3C7");
      event.target.value = "";
      return;
    }

    if (!text || text.trim().length < 20) {
      setStatus("⚠️ 텍스트 추출 실패. 스캔본은 인식이 어렵습니다.", "#92400e", "#FEF3C7");
      event.target.value = "";
      return;
    }

    // 정보 추출
    const extracted = parseTravelText(text);
    const filledCount = Object.keys(extracted).length;
    if (filledCount === 0) {
      setStatus("⚠️ 분석 가능한 정보를 찾지 못했습니다. 수동 입력해 주세요.", "#92400e", "#FEF3C7");
      event.target.value = "";
      return;
    }

    // 현재 입력 필드에 자동 채우기
    let filled = [];
    Object.entries(extracted).forEach(([key, value]) => {
      const el = document.getElementById("td-" + key);
      if (el && !el.value.trim()) {
        el.value = value;
        el.style.background = "#F0FDF4";
        el.style.borderColor = "#86efac";
        filled.push(key);
      }
    });

    // 모든 필드가 이미 차있는 경우라도 추출 결과 보여주기
    const labelMap = {airline:"항공사",flightNo:"편명",flightArr:"도착",flightDep:"출국",seat:"좌석",pnr:"PNR",hotelName:"Hotel",hotelRes:"Confirmation Number",checkIn:"Check In",checkOut:"Check Out"};
    const filledLabels = filled.map(k => labelMap[k]||k).join(", ");
    if (filled.length > 0) {
      setStatus(`✅ ${filled.length}개 필드 자동 입력: ${filledLabels} (저장 버튼 눌러 확정)`, "#15803d", "#F0FDF4");
    } else {
      setStatus(`ℹ️ 정보 발견했으나 이미 입력된 필드라 덮어쓰지 않음: ${Object.keys(extracted).map(k=>labelMap[k]||k).join(", ")}`, "#92400e", "#FEF3C7");
    }
  } catch (err) {
    setStatus(`⚠️ 분석 실패: ${err.message}`, "#991b1b", "#FEE2E2");
  }
  event.target.value = "";
};

// 텍스트에서 출장 정보 추출 (패턴 매칭)
function parseTravelText(text) {
  const t = text.replace(/\s+/g, " ").replace(/[^\S ]+/g, " ");
  const out = {};

  // ── 항공편 ────────────────────────────────────
  // 편명: "OZ 201", "OZ201", "KE0703", "AA1234"
  const flightM = t.match(/\b([A-Z]{2})\s?(\d{2,4})\b/);
  if (flightM) {
    out.flightNo = (flightM[1] + flightM[2]).toUpperCase();
    // 항공사 코드 → 한글
    const carriers = {
      OZ:"Asiana Airlines", KE:"Korean Air", AA:"American Airlines",
      DL:"Delta", UA:"United", JL:"Japan Airlines", NH:"ANA",
      TG:"Thai Airways", SQ:"Singapore Airlines", CX:"Cathay Pacific",
      AF:"Air France", LH:"Lufthansa", BA:"British Airways",
      QF:"Qantas", EK:"Emirates", QR:"Qatar Airways"
    };
    if (carriers[flightM[1]]) out.airline = carriers[flightM[1]];
  }

  // 항공사 명시적 언급
  if (!out.airline) {
    const carrierNames = [
      "Asiana Airlines", "Korean Air", "American Airlines", "Delta", "United",
      "Japan Airlines", "ANA", "All Nippon", "Thai Airways", "Singapore Airlines",
      "Cathay Pacific", "Air France", "Lufthansa", "British Airways",
      "Qantas", "Emirates", "Qatar Airways"
    ];
    for (const c of carrierNames) {
      if (new RegExp(c, "i").test(t)) { out.airline = c; break; }
    }
  }

  // PNR / Booking Reference (6자리 영문+숫자)
  const pnrM = t.match(/(?:PNR|Booking\s+(?:Reference|Code|Ref(?:erence)?)|Reservation\s+(?:Code|Number)|예약\s*번호)[\s:#]*([A-Z0-9]{5,8})\b/i);
  if (pnrM) out.pnr = pnrM[1];

  // 좌석 정보
  const seatM = t.match(/(?:Seat|좌석)[\s:#]*([0-9]{1,3}[A-Z])\b/i);
  if (seatM) out.seat = seatM[1];
  const classM = t.match(/\b(Business|Economy|First|Premium\s+Economy|비즈니스|이코노미|퍼스트)\s*(?:Class|class|클래스)?\b/i);
  if (classM) {
    const cls = classM[1];
    out.seat = (out.seat ? cls + " / " + out.seat : cls);
  }

  // 도착/출국 일시 — 다양한 포맷
  // "Arrival: 24 Jun 2026 15:30" / "Departure: 26 Jun 2026 23:50"
  const dateTimeRegex = /(\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+\d{4}|\d{4}[-\/]\d{1,2}[-\/]\d{1,2}|\d{1,2}[-\/]\d{1,2}[-\/]\d{2,4})\s*(?:at)?\s*(\d{1,2}[:.]\d{2})/gi;
  const arrM = t.match(/(?:Arrival|Arrive[ds]?|도착)[^.]{0,80}?(\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*(?:\s+\d{4})?|\d{4}[-\/]\d{1,2}[-\/]\d{1,2})[^.]{0,30}?(\d{1,2}[:.]\d{2})/i);
  if (arrM) out.flightArr = `${arrM[1]} ${arrM[2]}`.replace(/\./g, ":");

  const depM = t.match(/(?:Departure|Depart[ds]?|출국|출발)[^.]{0,80}?(\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*(?:\s+\d{4})?|\d{4}[-\/]\d{1,2}[-\/]\d{1,2})[^.]{0,30}?(\d{1,2}[:.]\d{2})/i);
  if (depM) out.flightDep = `${depM[1]} ${depM[2]}`.replace(/\./g, ":");

  // 도착/출국 못 찾은 경우 첫 두 개의 날짜+시간을 사용
  if (!out.flightArr || !out.flightDep) {
    const allDt = [];
    let m;
    const re = new RegExp(dateTimeRegex.source, "gi");
    while ((m = re.exec(t)) !== null) allDt.push(`${m[1]} ${m[2]}`.replace(/\./g, ":"));
    if (allDt.length >= 1 && !out.flightArr) out.flightArr = allDt[0];
    if (allDt.length >= 2 && !out.flightDep) out.flightDep = allDt[1];
  }

  // ── 호텔 ─────────────────────────────────────
  // 호텔 이름 (Hotel, Resort, Suites, Inn 포함된 줄)
  const hotelNameM = t.match(/(?:Hotel\s+Name|호텔\s*명|Property|Accommodation)[\s:]*([A-Z][A-Za-z0-9 &\-'.]{3,60}?(?:Hotel|Resort|Suites|Inn|호텔))/i)
                 || t.match(/\b((?:Sotetsu|Marriott|Hilton|Hyatt|Sheraton|Westin|Conrad|Lotte|Shilla|Plaza|Four Seasons|Grand|Park)\s+[A-Za-z ]{2,40}?(?:Hotel|Resort|Suites|Seoul|호텔))/i)
                 || t.match(/\b([A-Z][A-Za-z]+\s+(?:Hotel|Resort|Suites|호텔))\b/);
  if (hotelNameM) out.hotelName = hotelNameM[1].trim();

  // 호텔 예약번호
  const hotelResM = t.match(/(?:Confirmation\s+(?:Number|Code|#)|Booking\s+Number|Reservation\s+(?:ID|Number)|예약\s*확인\s*번호)[\s:#]*([A-Z0-9\-]{6,20})/i);
  if (hotelResM) out.hotelRes = hotelResM[1];

  // 체크인/체크아웃
  const ciM = t.match(/(?:Check[-\s]*in|체크인|입실)[^.]{0,40}?(\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*(?:\s+\d{4})?|\d{4}[-\/]\d{1,2}[-\/]\d{1,2}|\d{1,2}[\/\-]\d{1,2}(?:[\/\-]\d{2,4})?)/i);
  if (ciM) out.checkIn = ciM[1];
  const coM = t.match(/(?:Check[-\s]*out|체크아웃|퇴실)[^.]{0,40}?(\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*(?:\s+\d{4})?|\d{4}[-\/]\d{1,2}[-\/]\d{1,2}|\d{1,2}[\/\-]\d{1,2}(?:[\/\-]\d{2,4})?)/i);
  if (coM) out.checkOut = coM[1];

  // 객실 타입
  const roomM = t.match(/(?:Room\s+Type|객실\s*(?:타입|종류))[\s:]*([A-Za-z0-9 ,]{3,50})/i)
            || t.match(/\b((?:Deluxe|Standard|Superior|Executive|Suite|Premium|Twin|King|Queen|Double)\s*(?:Room|Bed|Twin)?[A-Za-z ]{0,30})/i);
  if (roomM) out.roomType = roomM[1].trim().substring(0, 50);

  // 조식 포함
  const breakfastM = t.match(/(?:Breakfast|조식)[\s:]*(included|포함|N\/A|excluded|미포함|불포함)/i);
  if (breakfastM) {
    const v = breakfastM[1].toLowerCase();
    out.breakfast = /included|포함/.test(v) ? "Y" : "N";
  }

  return out;
}

window.toggleTravelDetail = id => {
  // 다른 모드 닫기
  if (window._travelDetailId === id) {
    window._travelDetailId = null;
  } else {
    window._travelDetailId = id;
    window._travelAttachId = null;
    window._travelEditId = null;
  }
  draw();
};

window.saveTravelDetail = id => {
  const fields = ["airline","flightNo","flightArr","flightDep","seat","pnr",
                  "hotelName","hotelRes","checkIn","checkOut",
                  "pickupTime","pickupLoc","driver","vehicle","dropTime","dropLoc",
                  "diet","passport","emergency","visa","notes"];
  const updates = {};
  fields.forEach(f => {
    const el = document.getElementById("td-" + f);
    if (el) updates[f] = el.value.trim();
  });
  TRAVEL_DETAIL = TRAVEL_DETAIL.map(t => t.id===id ? {...t, ...updates} : t);
  scheduleSave();
  window._travelDetailId = null;
  alert("✅ 출장 상세 정보가 저장되었습니다.");
  draw();
};

// ── 항공편 구간 편집 ─────────────────────────────────
window.setSegment = (travelId, segIdx, key, value) => {
  TRAVEL_DETAIL = TRAVEL_DETAIL.map(t => {
    if (t.id !== travelId) return t;
    const segs = [...(t.segments||[])];
    if (!segs[segIdx]) return t;
    segs[segIdx] = {...segs[segIdx], [key]: value.trim().toUpperCase().substring(0,4) === value.trim().toUpperCase() && (key==='from'||key==='to') ? value.trim().toUpperCase() : value.trim()};
    return {...t, segments: segs};
  });
  scheduleSave();
};

window.addFlightSegment = (travelId) => {
  TRAVEL_DETAIL = TRAVEL_DETAIL.map(t => {
    if (t.id !== travelId) return t;
    const segs = [...(t.segments||[])];
    segs.push({flightNo:"", airline:"", from:"", to:"", depTime:"", arrTime:"", seat:""});
    return {...t, segments: segs};
  });
  scheduleSave();
  draw();
};

window.delFlightSegment = (travelId, segIdx) => {
  if (!confirm("이 구간을 삭제하시겠습니까?")) return;
  TRAVEL_DETAIL = TRAVEL_DETAIL.map(t => {
    if (t.id !== travelId) return t;
    const segs = (t.segments||[]).filter((_, i) => i !== segIdx);
    return {...t, segments: segs.length > 0 ? segs : undefined};
  });
  scheduleSave();
  draw();
};

const __saveTravelDetail_orig = window.saveTravelDetail;

window.toggleTravelAttach = id => {
  window._travelAttachId = (window._travelAttachId === id) ? null : id;
  window._travelEditId = null;
  draw();
};

window.attachToTravel = (id, event) => {
  const files = Array.from(event.target.files);
  if(!files.length) return;
  let done = 0;
  files.forEach(file => {
    if(file.size > 4.5*1024*1024) { alert(file.name+" 파일이 너무 큽니다 (최대 4.5MB)"); done++; return; }
    const reader = new FileReader();
    reader.onload = e => {
      const aid = "ta_" + Date.now() + "_" + Math.random().toString(36).slice(2,6);
      const now = new Date().toLocaleDateString("ko-KR",{month:"numeric",day:"numeric"});
      localStorage.setItem("gvf2026_tfa_"+aid, e.target.result);
      TRAVEL_DETAIL = TRAVEL_DETAIL.map(t => t.id === id ? {
        ...t,
        attachments: [...(t.attachments||[]), {id:aid, name:file.name, type:file.type, size:file.size, date:now}]
      } : t);
      done++;
      if(done === files.length) { scheduleSave(); window._travelAttachId = id; draw(); }
    };
    reader.readAsDataURL(file);
  });
  event.target.value = "";
};

window.downloadTravelAttach = aid => {
  const data = localStorage.getItem("gvf2026_tfa_"+aid);
  if(!data) return alert("파일을 찾을 수 없습니다.\n(다른 기기에서 첨부된 파일은 그 기기에서만 다운로드 가능합니다.)");
  let name = "파일";
  TRAVEL_DETAIL.forEach(t => (t.attachments||[]).forEach(a => { if(a.id===aid) name = a.name; }));
  const a = document.createElement("a"); a.href=data; a.download=name; a.click();
};

window.removeTravelAttach = (id, aid) => {

};

// ─────────── 일반 참가자 (Google Sheets 연동) ───────────
// 참가자의 참석 방식 판별: "onsite" | "virtual"
// 29번 이전(시트 행 30 미만)은 문항이 없었으므로 On-site로 간주
function getAttendanceMode(a) {
  const keys = Object.keys(a).filter(k => !k.startsWith("_") && k !== "id");
  const modeKey = keys.find(k => /on.?site|virtual|참석.*방식|attendance.*type|참석.*형태|현장|온라인|in.?person|온.?오프/i.test(k));
  if (modeKey && a[modeKey]) {
    const v = String(a[modeKey]).toLowerCase();
    if (/virtual|online|온라인|화상|원격|remote|zoom|웹/i.test(v)) return "virtual";
    if (/on.?site|offline|현장|대면|in.?person|참석|오프라인/i.test(v)) return "onsite";
  }
  // 문항 값 없음 → On-site로 간주 (29번 이전 응답 포함)
  return "onsite";
}

window.attCfgPasteUrl = async () => {
  const ta = document.getElementById("att-cfg-url");
  if (!ta) return;
  try {
    if (navigator.clipboard && navigator.clipboard.readText) {
      const text = await navigator.clipboard.readText();
      if (text) {
        ta.value = text.trim();
        ta.focus();
        return;
      }
    }
    // fallback
    ta.focus();
    alert("📋 클립보드 접근이 차단되었습니다.\n\nURL 칸을 직접 길게 눌러 붙여넣기 메뉴를 사용하세요.");
  } catch (e) {
    ta.focus();
    alert("📋 클립보드 접근 실패.\n\nURL 칸을 직접 길게 눌러 붙여넣기 해주세요.");

};

  }
  const btn = event.target;
  const orig = btn.innerHTML;
  btn.innerHTML = "⏳ 테스트 중...";
  btn.disabled = true;
  try {
    // CORS-safe 모드: 헤더 추가 안 함, GET만 사용 (preflight 회피)
    const res = await fetch(url, {method: "GET", redirect: "follow", mode: "cors"});
    if (!res.ok) {
      throw new Error(`HTTP ${res.status} ${res.statusText}`);
    }
    const text = await res.text();
    if (text.startsWith("<")) {
      throw new Error("HTML이 반환됨 (로그인 페이지로 리다이렉트)\n\n→ 배포 시 액세스 권한이 'Anyone(모든 사용자)' 가 아닌 것 같습니다.\n\nApps Script → 배포 → 배포 관리 → ✏️편집 → 액세스 권한을 'Anyone(모든 사용자)'으로 변경 후 재배포하세요.");
    }
    let data;
    try {
      data = JSON.parse(text);
    } catch(e) {
      throw new Error(`JSON 파싱 실패\n응답: ${text.slice(0,200)}`);
    }
    if (!data.rows || !Array.isArray(data.rows)) {
      throw new Error("응답 형식이 다릅니다.\n\nApps Script 코드를 다시 확인하세요 (function doGet 부분).");
    }
    alert(`✅ 연결 성공!\n\n• 시트 행 수: ${data.total || data.rows.length}개\n• 컬럼 (${(data.headers||[]).length}개): ${(data.headers||[]).slice(0,5).join(", ")}${(data.headers||[]).length>5?'…':''}\n\n💾 저장 버튼을 눌러 설정을 확정하세요.`);
  } catch (e) {
    let detail = e.message || String(e);
    let troubleshoot = "";
    if (/failed to fetch|networkerror|cors/i.test(detail)) {
      troubleshoot = `\n\n🔧 가능한 원인:\n1. 액세스 권한이 'Anyone(모든 사용자)'가 아님\n   → 배포 관리에서 변경\n2. URL이 /dev 로 끝남 (테스트 배포)\n   → '새 배포' 후 /exec URL 사용\n3. 네트워크 일시 끊김 → 잠시 후 재시도\n\n🧪 진단 방법:\n위 URL을 새 브라우저 탭에 직접 붙여넣어 보세요.\nJSON 데이터가 나오면 코드는 정상, CORS 문제입니다.`;
    } else if (/HTTP 401|HTTP 403/.test(detail)) {
      troubleshoot = "\n\n🔧 권한 문제입니다. 배포 시 '액세스 권한이 있는 사용자'를 'Anyone(모든 사용자)'으로 설정하세요.";
    }
    alert(`❌ 연결 실패\n\n${detail}${troubleshoot}`);
  } finally {
    btn.innerHTML = orig;
    btn.disabled = false;
  }
};

// 동기화 실패 카운터 + 진행 중 플래그
let _attendeesSyncInFlight = false;
let _attendeesConsecErrors = 0;

window.syncAttendeesNow = async (opts = {}) => {
  const url = ATTENDEES_CONFIG.webAppUrl;
  const isAuto = opts.auto === true;
  if (!url) {
    if (!isAuto) alert("⚠️ 먼저 ⚙️ 설정에서 Apps Script URL을 입력하세요");
    return;
  }
  // 중복 호출 방지 (이전 요청이 끝나기 전 새 요청 무시)
  if (_attendeesSyncInFlight) {
    console.log("[일반 참가자] 이전 동기화 진행 중 — 스킵");
    return;
  }
  _attendeesSyncInFlight = true;
  try {
    // 30초 타임아웃 (데이터 증가에 대비)
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 30000);
    const res = await fetch(url, {
      method: "GET",
      redirect: "follow",
      mode: "cors",
      signal: controller.signal,
      cache: "no-store"
    });
    clearTimeout(timeoutId);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    if (text.startsWith("<")) throw new Error("로그인 페이지 리다이렉트 — 액세스 권한 확인 필요");
    const data = JSON.parse(text);
    if (!data.rows || !Array.isArray(data.rows)) throw new Error("응답 형식 오류");
    // 안정적 ID 부여 (랜덤 fallback 없애기 — 매번 새 ID 방지)
    ATTENDEES = data.rows.map((r, i) => ({id: "att_" + (r._rowIndex ?? i), ...r}));
    ATTENDEES_CONFIG = {...ATTENDEES_CONFIG, lastSync: Date.now(), lastError: null};
    _attendeesConsecErrors = 0; // 성공 시 에러 카운터 리셋
    scheduleSave();
    draw();
    console.log(`[일반 참가자] ${ATTENDEES.length}명 동기화 완료`);
  } catch (e) {
    _attendeesConsecErrors++;
    const errMsg = e.name === "AbortError" ? "응답 시간 초과 (30초)" : (e.message || String(e));
    ATTENDEES_CONFIG = {...ATTENDEES_CONFIG, lastError: errMsg};
    console.warn(`[일반 참가자] 동기화 실패 (연속 ${_attendeesConsecErrors}회):`, errMsg);
    // 연속 5회 실패 시 자동 폴링 중지
    if (_attendeesConsecErrors >= 5 && ATTENDEES_CONFIG.autoSync) {
      console.error("[일반 참가자] 연속 5회 실패 — 자동 동기화 중지");
      ATTENDEES_CONFIG = {...ATTENDEES_CONFIG, autoSync: false, lastError: `${errMsg} (연속 실패로 자동 중지됨)`};
      stopAttendeesPolling();
    }
    scheduleSave();
    draw();
    // 수동 호출일 때만 alert
    if (!isAuto) alert(`❌ 동기화 실패\n${errMsg}`);
  } finally {
    _attendeesSyncInFlight = false;
  }
};

window.toggleAttendeesAutoSync = () => {

let _attendeesPollTimer = null;
function startAttendeesPolling() {
  stopAttendeesPolling();
  if (!ATTENDEES_CONFIG.autoSync || !ATTENDEES_CONFIG.webAppUrl) return;
  const intervalMs = (ATTENDEES_CONFIG.interval || 30) * 1000;
  _attendeesPollTimer = setInterval(() => {
    // 탭이 비활성화된 경우 스킵 (배터리/네트워크 절약)
    if (document.hidden) {
      console.log("[일반 참가자] 탭 비활성화 — 폴링 스킵");
      return;
    }
    // 오프라인이면 스킵
    if (!navigator.onLine) {
      console.log("[일반 참가자] 오프라인 — 폴링 스킵");
      return;
    }
    syncAttendeesNow({auto: true});
  }, intervalMs);
  console.log(`[일반 참가자] 자동 폴링 시작 (${ATTENDEES_CONFIG.interval}초마다)`);
}
function stopAttendeesPolling() {
  if (_attendeesPollTimer) {
    clearInterval(_attendeesPollTimer);
    _attendeesPollTimer = null;
    console.log("[일반 참가자] 자동 폴링 중지");
  }
}
// 페이지 로드 후 자동 폴링 시작
setTimeout(() => { if (ATTENDEES_CONFIG.autoSync) startAttendeesPolling(); }, 3000);

window.copyAppsScriptCode = () => {
  const code = document.getElementById("apps-script-code")?.textContent || "";
  const btn = event.target;
  const orig = btn.innerHTML;
  const showSuccess = () => {
    btn.innerHTML = "✅ 복사됨";
    setTimeout(() => btn.innerHTML = orig, 1500);
  };
  const showManualCopy = () => {
    // 자동 복사 실패 시 textarea를 보여서 직접 선택 가능하게
    const ta = document.createElement("textarea");
    ta.value = code;
    ta.style.cssText = "position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:80vw;height:60vh;z-index:99999;padding:14px;border:3px solid #1B4FA0;border-radius:10px;font-family:monospace;font-size:12px;background:#fff;box-shadow:0 20px 50px rgba(0,0,0,.3);";
    document.body.appendChild(ta);
    ta.select();
    try {
      const ok = document.execCommand("copy");
      if (ok) {
        showSuccess();
        setTimeout(() => ta.remove(), 100);
        return;
      }
    } catch(e) {}
    // execCommand도 실패 → 사용자가 직접 복사
    const overlay = document.createElement("div");
    overlay.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:99998;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:20px;";
    overlay.innerHTML = `<div style="color:#fff;font-size:14px;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.5);">📋 아래 텍스트를 직접 선택하고 Ctrl+C로 복사하세요</div>`;
    const closeBtn = document.createElement("button");
    closeBtn.innerHTML = "✕ 닫기";
    closeBtn.style.cssText = "padding:8px 20px;background:#fff;color:#0B1D3F;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;";
    closeBtn.onclick = () => { overlay.remove(); ta.remove(); };
    overlay.appendChild(closeBtn);
    document.body.appendChild(overlay);
    ta.focus();
    ta.select();
  };

  // 1) 최신 Clipboard API 시도
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(code).then(showSuccess).catch(() => {
      // 2) Clipboard 실패 → execCommand fallback
      showManualCopy();
    });
  } else {
    // Clipboard API 미지원 → 바로 fallback
    showManualCopy();
  }
};

window.exportAttendeesToExcel = () => {

// Agenda 등장 순서로 강제 재정렬 (수동 order 모두 제거 + Agenda 기반 새 order 부여)
// 좌장(chair)도 포함하여 정렬, 중복 연사는 제거
window.resortByAgenda = () => {
  if (!AGENDA_ROWS) {
    AGENDA_ROWS = parseAgendaToRows(AGENDA_HTML);
  }

  // 1) SP 중복 제거 (같은 이름이 여러 번 등록된 경우 첫 번째만 유지)
  const seenNormNames = new Map(); // norm → first SP
  const dedupedSP = [];
  let removedDupes = 0;
  SP.forEach(s => {
    const norm = normalizeSpName(s.name);
    if (!norm) return;
    if (seenNormNames.has(norm)) {
      // 중복: 정보가 더 풍부한 쪽을 유지
      const existing = seenNormNames.get(norm);
      if ((s.org && !existing.org) || (s.role && !existing.role)) {
        if (!existing.org && s.org) existing.org = s.org;
        if (!existing.role && s.role) existing.role = s.role;
      }
      // status는 confirmed 우선
      if (s.status === "confirmed" && existing.status !== "confirmed") existing.status = "confirmed";
      removedDupes++;
      return;
    }
    seenNormNames.set(norm, s);
    dedupedSP.push(s);
  });
  SP = dedupedSP;

  // 2) ID 자동 바인딩 (Agenda 행 연사)
  AGENDA_ROWS.forEach(r => {
    if (r.type !== "row" || !r.speakers) return;
    r.speakers.forEach(sp => {
      if (!sp.spId && sp.name) {
        const norm = normalizeSpName(sp.name);
        const master = SP.find(s => normalizeSpName(s.name) === norm);
        if (master) sp.spId = master.id;
      }
    });
  });

  // 2-b) 섹션 좌장 중 LOP에 없는 사람은 자동 추가
  let addedChairs = 0;
  AGENDA_ROWS.forEach(r => {
    if (r.type !== "section" || !r.chair) return;
    const chairs = parseChairNames(r.chair);
    chairs.forEach(chairName => {
      const norm = normalizeSpName(chairName);
      if (!norm) return;
      const exists = SP.find(s => normalizeSpName(s.name) === norm);
      if (!exists) {
        // 좌장 소속 추출 시도: "Jerome H. Kim, IVI" → "IVI"
        const orgMatch = r.chair.match(new RegExp(chairName.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "\\s*,\\s*([^,&/()]+)", "i"));
        const org = orgMatch ? orgMatch[1].trim() : "";
        SP.push({
          id: nextSpId(),
          name: chairName,
          org: org,
          role: "좌장",
          session: r.label || "",
          status: "pending",
          travel: "미정"
        });
        addedChairs++;
      }
    });
  });

  AGENDA_HTML = rowsToAgendaHtml(AGENDA_ROWS);

  // 3) Agenda 등장 순서대로 SP.order 부여 (좌장 + 연사)
  const seenIds = new Set();
  const seenNames = new Set();
  let orderIdx = 0;
  SP.forEach(s => { delete s.order; });

  const tryAssign = (nameOrSp) => {
    let master = null;
    if (typeof nameOrSp === "object" && nameOrSp.spId) {
      master = SP.find(s => s.id === nameOrSp.spId);
    }
    if (!master) {
      const name = typeof nameOrSp === "object" ? nameOrSp.name : nameOrSp;
      if (!name) return;
      const norm = normalizeSpName(name);
      if (seenNames.has(norm)) return;
      master = SP.find(s => normalizeSpName(s.name) === norm);
    }
    if (master && master.order === undefined) {
      master.order = orderIdx++;
      seenIds.add(master.id);
      seenNames.add(normalizeSpName(master.name));
    }
  };

  AGENDA_ROWS.forEach(r => {
    // 섹션 좌장 먼저 (해당 섹션 시작 시점에 등장)
    if (r.type === "section" && r.chair) {
      const chairs = parseChairNames(r.chair);
      chairs.forEach(chairName => tryAssign(chairName));
    }
    // 그 다음 행의 연사들
    if (r.type === "row" && r.speakers) {
      r.speakers.forEach(sp => tryAssign(sp));
    }
  });

  // 4) Agenda에 없는 연사들은 끝에 이름순으로
  const remaining = SP.filter(s => s.order === undefined)
                       .sort((a, b) => (a.name || "").localeCompare(b.name || ""));
  remaining.forEach(s => { s.order = orderIdx++; });

  scheduleSave();
  alert(`✅ Agenda 순서로 재정렬 완료\n` +
        `• Agenda 매칭 (좌장 포함): ${seenIds.size}명\n` +
        `• 나머지 (이름순): ${remaining.length}명\n` +
        `• 좌장 자동 추가: ${addedChairs}명\n` +
        `• 중복 제거: ${removedDupes}명\n` +
        `• 전체: ${SP.length}명`);
  draw();
};

// 현재 화면 정렬을 SP에 order로 반영하는 헬퍼
function commitSpOrder(orderedSpIds) {
  orderedSpIds.forEach((id, i) => {
    const sp = SP.find(s => s.id === id);
    if (sp) sp.order = i;
  });
  scheduleSave();
}

window.moveSpUp = (idx) => {
  if (idx <= 0) return;
  // 현재 화면의 정렬 순서를 다시 계산
  const agendaOrderMap = buildAgendaOrderMap();
  const sorted = [...SP].sort((a, b) => {
    const aOrd = (a.order !== undefined && a.order !== null) ? a.order : null;
    const bOrd = (b.order !== undefined && b.order !== null) ? b.order : null;
    if (aOrd !== null && bOrd !== null) return aOrd - bOrd;
    if (aOrd !== null) return -1;
    if (bOrd !== null) return 1;
    const aIdx = agendaOrderMap.get(normalizeSpName(a.name));
    const bIdx = agendaOrderMap.get(normalizeSpName(b.name));
    if (aIdx !== undefined && bIdx !== undefined) return aIdx - bIdx;
    if (aIdx !== undefined) return -1;
    if (bIdx !== undefined) return 1;
    return (a.name || "").localeCompare(b.name || "");
  });
  // idx와 idx-1 swap
  [sorted[idx-1], sorted[idx]] = [sorted[idx], sorted[idx-1]];
  commitSpOrder(sorted.map(s => s.id));
  draw();
};

window.moveSpDown = (idx) => {
  const agendaOrderMap = buildAgendaOrderMap();
  const sorted = [...SP].sort((a, b) => {
    const aOrd = (a.order !== undefined && a.order !== null) ? a.order : null;
    const bOrd = (b.order !== undefined && b.order !== null) ? b.order : null;
    if (aOrd !== null && bOrd !== null) return aOrd - bOrd;
    if (aOrd !== null) return -1;
    if (bOrd !== null) return 1;
    const aIdx = agendaOrderMap.get(normalizeSpName(a.name));
    const bIdx = agendaOrderMap.get(normalizeSpName(b.name));
    if (aIdx !== undefined && bIdx !== undefined) return aIdx - bIdx;
    if (aIdx !== undefined) return -1;
    if (bIdx !== undefined) return 1;
    return (a.name || "").localeCompare(b.name || "");
  });
  if (idx >= sorted.length - 1) return;
  [sorted[idx], sorted[idx+1]] = [sorted[idx+1], sorted[idx]];
  commitSpOrder(sorted.map(s => s.id));
  draw();
};

window.spDrop = (e, dropIdx) => {
  e.preventDefault();
  const fromIdx = parseInt(e.dataTransfer.getData("text/plain"), 10);
  if (isNaN(fromIdx) || fromIdx === dropIdx) return;
  const agendaOrderMap = buildAgendaOrderMap();
  const sorted = [...SP].sort((a, b) => {
    const aOrd = (a.order !== undefined && a.order !== null) ? a.order : null;
    const bOrd = (b.order !== undefined && b.order !== null) ? b.order : null;
    if (aOrd !== null && bOrd !== null) return aOrd - bOrd;
    if (aOrd !== null) return -1;
    if (bOrd !== null) return 1;
    const aIdx = agendaOrderMap.get(normalizeSpName(a.name));
    const bIdx = agendaOrderMap.get(normalizeSpName(b.name));
    if (aIdx !== undefined && bIdx !== undefined) return aIdx - bIdx;
    if (aIdx !== undefined) return -1;
    if (bIdx !== undefined) return 1;
    return (a.name || "").localeCompare(b.name || "");
  });
  const [moved] = sorted.splice(fromIdx, 1);
  sorted.splice(dropIdx, 0, moved);
  commitSpOrder(sorted.map(s => s.id));
  draw();
};

const PM_LABEL = {high:"긴급", medium:"일반", low:"여유"};
