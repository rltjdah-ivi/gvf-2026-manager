function _buildSheets() {
  const today = new Date().toLocaleDateString("ko-KR");

  // 준비 현황
  const sheetChecklist = [
    ["카테고리", "항목", "완료여부", "마감일", "우선순위", "첨부파일수"],
    ...CL.map(t => [
      t.cat || "",
      t.task || "",
      t.done ? "완료" : "미완료",
      t.deadline || "",
      PM_LABEL[t.pri] || t.pri || "",
      (t.attachments || []).length
    ])
  ];

  // 연사 명단
  const sheetSpeakers = [
    ["이름", "소속", "역할", "세션", "상태", "항공/숙박"],
    ...SP.map(s => [
      s.name || "",
      s.org || "",
      s.role || "",
      s.session || "",
      SM_LABEL[s.status] || s.status || "",
      s.travel || ""
    ])
  ];

  // 예산 항목
  const sheetBudget = [
    ["항목", "예산(원)", "실지출(원)", "잔여(원)", "집행률(%)", "첨부파일수"],
    ...BUDGET_ITEMS.map(b => {
      const actual = BUDGET_ENTRIES.filter(e => e.budgetId === b.id).reduce((s,e) => s+e.amount, 0);
      const realActual = b.id === "b1" ? TRAVEL_DETAIL.reduce((s,t) => s+t.flight+t.hotel+t.trans+t.misc, 0) : actual;
      return [
        b.label,
        b.budget,
        realActual,
        b.budget - realActual,
        b.budget > 0 ? Math.round((realActual / b.budget) * 100) : 0,
        (b.attachments || []).length
      ];
    }),
    [],
    ["합계", BUDGET_ITEMS.reduce((s,b)=>s+b.budget,0), "", "", "", ""]
  ];

  // 항공·숙박
  const sheetTravel = [
    ["이름", "소속", "출발지", "항공(원)", "호텔(원)", "교통(원)", "기타(원)", "합계(원)", "확정여부"],
    ...TRAVEL_DETAIL.map(t => [
      t.name, t.org, t.from,
      t.flight, t.hotel, t.trans, t.misc,
      t.flight + t.hotel + t.trans + t.misc,
      t.ok ? "확정" : "미확인"
    ]),
    [],
    ["합계", "", "",
      TRAVEL_DETAIL.reduce((s,t)=>s+t.flight,0),
      TRAVEL_DETAIL.reduce((s,t)=>s+t.hotel,0),
      TRAVEL_DETAIL.reduce((s,t)=>s+t.trans,0),
      TRAVEL_DETAIL.reduce((s,t)=>s+t.misc,0),
      TRAVEL_DETAIL.reduce((s,t)=>s+t.flight+t.hotel+t.trans+t.misc,0),
      ""]
  ];

  // 지출 내역
  const itemMap = {};
  BUDGET_ITEMS.forEach(b => itemMap[b.id] = b.label);
  const sheetEntries = [
    ["항목 분류", "내역", "금액(원)", "날짜", "지급여부", "첨부파일수"],
    ...BUDGET_ENTRIES.map(e => [
      itemMap[e.budgetId] || e.budgetId,
      e.desc,
      e.amount,
      e.date,
      e.paid ? "지급완료" : "미지급",
      (e.attachments || []).length
    ])
  ];
  if (BUDGET_ENTRIES.length === 0) sheetEntries.push(["(지출 내역 없음)", "", "", "", "", ""]);

  // To-do
  const todoRows = [["날짜", "시간", "할일", "완료여부"]];
  Object.keys(DAILY_TODOS).sort().forEach(date => {
    (DAILY_TODOS[date] || []).forEach(t => {
      todoRows.push([date, t.time || "", t.task, t.done ? "완료" : "미완료"]);
    });
  });
  if (todoRows.length === 1) todoRows.push(["(To-do 없음)", "", "", ""]);

  // Agenda
  ensureAgendaRows();
  const agendaRows = [["구분", "시간", "제목", "좌장", "연사"]];
  AGENDA_ROWS.forEach(r => {
    if (r.type === "section") {
      agendaRows.push(["섹션", "", r.label, r.chair || "", ""]);
    } else if (r.type === "row") {
      const speakersText = (r.speakers || []).map(sp => sp.sub ? `${sp.name} (${sp.sub})` : sp.name).join(" / ");
      const kind = r.rowType === "special" ? "특수" : r.rowType === "keynote" ? "기조" : "발표";
      agendaRows.push([kind, r.time, r.title, "", speakersText]);
    }
  });

  return {
    info: [
      ["2026 IVI Global Vaccine Forum 운영 데이터"],
      ["내보낸 날짜", today],
      ["행사 일자", "2026년 6월 25일 (목)"],
      ["장소", "Royal Hall (3F), Peace & Park Convention, Seoul"],
      [],
      ["요약"],
      ["체크리스트 진행률", `${CL.filter(t=>t.done).length} / ${CL.length} (${pct(CL.filter(t=>t.done).length, CL.length)}%)`],
      ["연사 확정", `${SP.filter(s=>s.status==="confirmed").length} / ${SP.length}명`],
      ["총 예산", `₩${BUDGET_ITEMS.reduce((s,b)=>s+b.budget,0).toLocaleString()}`],
    ],
    checklist: sheetChecklist,
    speakers:  sheetSpeakers,
    budget:    sheetBudget,
    travel:    sheetTravel,
    entries:   sheetEntries,
    todos:     todoRows,
    agenda:    agendaRows,
  };
}

window.importBudgetExcel = (event) => {
  const file = event.target.files[0];
  if (!file) return;
  if (typeof XLSX === "undefined") return alert("엑셀 라이브러리 로드 실패. 새로고침 후 다시 시도하세요.");

  const statusEl = document.getElementById("budget-import-status");
  if (statusEl) statusEl.innerHTML = `<div class="card" style="background:#FAFCFF;border:1px solid #BFDBFE;padding:14px;text-align:center;color:#1B4FA0;font-weight:600;">📊 엑셀 파일 분석 중...</div>`;

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, {type:"array"});
      const result = {newBudget:[], newTravel:[], newEntries:[], errors:[], detected:[]};

      // 금액 파싱 헬퍼
      const parseAmount = (v) => {
        if (typeof v === "number") return Math.round(v);
        const s = String(v||"").replace(/[,₩\s원]/g, "");
        let n = parseFloat(s) || 0;
        if (/만원|만/.test(String(v))) n *= 10000;
        if (/억/.test(String(v))) n *= 100000000;
        return Math.round(n);
      };

      // ═══════════════════════════════════════════════════
      //   회계 양식 (Budget/Item/Amount + S.Total) 자동 인식
      // ═══════════════════════════════════════════════════
      const parseAccountingFormat = () => {
        // "Budget" 또는 "예산" 시트 우선 탐색
        const candidates = wb.SheetNames.filter(n => /budget|예산|estimat/i.test(n));
        if (candidates.length === 0) return false;

        for (const sheetName of candidates) {
          const ws = wb.Sheets[sheetName];
          const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
          // "Item" + "Amount" 헤더 행 찾기
          let headerRow = -1, itemCol = -1, amountCol = -1, subCol = -1, eaCol = -1, unitCol = -1;
          for (let i = 0; i < Math.min(10, rows.length); i++) {
            const r = rows[i].map(c => String(c||"").trim().toLowerCase());
            for (let j = 0; j < r.length; j++) {
              if (/^item$|^항목$/.test(r[j])) itemCol = j;
              if (/^amount$|^total$|^합계$|^금액$/.test(r[j])) amountCol = j;
              if (/^ea$|^qty$|^수량$|^개수$/.test(r[j])) eaCol = j;
              if (/unit\s*price|단가/.test(r[j])) unitCol = j;
            }
            if (itemCol !== -1 && amountCol !== -1) { headerRow = i; break; }
          }
          if (headerRow === -1) continue;
          subCol = itemCol + 1; // 둘째 열 = 세부

          // 카테고리 단위로 데이터 수집
          let currentCat = null;
          let currentCatTotal = 0;
          let currentCatEntries = [];
          const colorPool = ["#1B4FA0","#0891b2","#7c3aed","#0d9488","#b45309","#16a34a","#dc2626","#ea580c"];
          let colorIdx = 0;

          const flushCategory = () => {
            if (!currentCat || currentCatTotal <= 0) return;
            const isTravel = /^travel|항공|숙박/i.test(currentCat);
            // Travel 카테고리는 고정 ID "b1" 사용 (TRAVEL_DETAIL과 연동)
            const budgetId = isTravel ? "b1" : "b_" + Date.now() + "_" + result.newBudget.length;
            const label = isTravel ? "항공·숙박" : currentCat;
            result.newBudget.push({
              id: budgetId,
              label,
              budget: currentCatTotal,
              actual: 0,
              color: isTravel ? "#1B4FA0" : colorPool[colorIdx++ % colorPool.length]
            });
            // Travel은 세부 행들을 지출 내역으로 안 넣음 (대신 TRAVEL_DETAIL이 담당)
            if (!isTravel) {
              currentCatEntries.forEach((e, ei) => {
                result.newEntries.push({
                  id: "e_" + Date.now() + "_" + ei + "_" + Math.random().toString(36).slice(2,5),
                  budgetId,
                  desc: e.desc,
                  amount: e.amount,
                  date: "",
                  paid: false
                });
              });
            }
            currentCat = null;
            currentCatTotal = 0;
            currentCatEntries = [];
          };

          for (let i = headerRow + 1; i < rows.length; i++) {
            const r = rows[i];
            const itemStr = String(r[itemCol]||"").trim();
            const subStr = String(r[subCol]||"").trim();
            const amount = parseAmount(r[amountCol]);

            // 총합계 (G. Total) → 종료
            if (/^g\.?\s*total/i.test(itemStr) || /^총\s*합계/i.test(itemStr)) {
              flushCategory();
              break;
            }
            // 상세 항목 시작 부분 ("* Details for...") → 종료
            if (/^\*\s*details|국제\s*항공/i.test(itemStr) || /^\*\s*details/i.test(subStr)) {
              flushCategory();
              break;
            }
            // 카테고리 소계 (S. Total / Sub Total / 소계)
            if (/^s\.?\s*total|^sub\s*total|^소계/i.test(itemStr)) {
              if (currentCat && amount > 0 && currentCatTotal === 0) {
                currentCatTotal = amount;
              }
              if (currentCat) flushCategory();
              continue;
            }
            // 새 카테고리 (Item 칸에 텍스트가 있고 그게 카테고리)
            if (itemStr && !subStr && amount > 0) {
              // "Honorarium 6500000" 같은 단일행 카테고리
              if (currentCat) flushCategory();
              currentCat = itemStr;
              currentCatTotal = amount;
              continue;
            }
            if (itemStr && !/^s\.?\s*total/i.test(itemStr)) {
              // 카테고리 시작 (소계 행 다음 새 카테고리)
              if (currentCat) flushCategory();
              currentCat = itemStr;
              currentCatTotal = 0;
              currentCatEntries = [];
              // 같은 행에 세부 정보 + 금액이 있으면 그것도 처리
              if (subStr && amount > 0) {
                currentCatEntries.push({desc: subStr, amount});
              } else if (amount > 0 && !subStr) {
                // 카테고리 + 금액만 있음 (단일 행 카테고리 케이스)
                currentCatTotal = amount;
              }
              continue;
            }
            // 카테고리 안의 세부 행
            if (currentCat && subStr && amount > 0) {
              currentCatEntries.push({desc: subStr, amount});
              continue;
            }
          }
          flushCategory();

          if (result.newBudget.length > 0) {
            result.detected.push(`📊 "${sheetName}" → 예산 항목 ${result.newBudget.length}개 + 세부 지출 ${result.newEntries.length}건`);
            // 같은 시트에서 "* Details for international travel cost" 부분 파싱
            for (let i = 0; i < rows.length; i++) {
              const r = rows[i];
              // 모든 셀에서 "Details for travel" 검색 (어느 컬럼이든)
              const fullRowText = (r||[]).map(c => String(c||"").trim()).join(" ");
              if (!/details\s+for\s+(international\s+)?travel/i.test(fullRowText)) continue;

              // 다음 헤더 행 찾기 (Name + Flight)
              for (let j = i + 1; j < Math.min(i + 5, rows.length); j++) {
                const hdr = (rows[j]||[]).map(c => String(c||"").trim().toLowerCase());
                const nameC   = hdr.findIndex(h => /^name$|^이름/.test(h));
                const flightC = hdr.findIndex(h => /flight|항공/.test(h));
                const hotelC  = hdr.findIndex(h => /hotel|호텔/.test(h));
                const transC  = hdr.findIndex(h => /trans/.test(h));
                const miscC   = hdr.findIndex(h => /misc|기타/.test(h));
                if (nameC === -1 || flightC === -1) continue;

                // Name과 Flight 사이의 빈 컬럼들 = org, from
                // 예: Name(1) | (2) | (3) | Flight(4)  → org=2, from=3
                let orgC = -1, fromC = -1;
                const gap = flightC - nameC - 1;
                if (gap >= 2) { orgC = nameC + 1; fromC = nameC + 2; }
                else if (gap === 1) { orgC = nameC + 1; }

                // 데이터 행 처리
                for (let k = j + 1; k < rows.length; k++) {
                  const tr = rows[k] || [];
                  const name = String(tr[nameC]||"").trim();
                  if (!name) {
                    // 빈 행 만나도 계속, 단 S.Total / G.Total 만나면 종료
                    continue;
                  }
                  if (/^total|^합계|^s\.?\s*total|^g\.?\s*total|^subtotal|^소계|^총계/i.test(name)) break;
                  // 다음 섹션(footer, * 시작 행 등) 만나면 종료
                  if (/^\*/.test(name)) break;

                  result.newTravel.push({
                    id: "t_" + Date.now() + "_" + k + "_" + Math.random().toString(36).slice(2,5),
                    name,
                    org:  orgC  !== -1 ? String(tr[orgC]||"").trim()  : "",
                    from: fromC !== -1 ? String(tr[fromC]||"").trim() : "",
                    flight: flightC !== -1 ? parseAmount(tr[flightC]) : 0,
                    hotel:  hotelC  !== -1 ? parseAmount(tr[hotelC])  : 0,
                    trans:  transC  !== -1 ? parseAmount(tr[transC])  : 0,
                    misc:   miscC   !== -1 ? parseAmount(tr[miscC])   : 0,
                    ok: false
                  });
                }
                if (result.newTravel.length > 0) {
                  result.detected.push(`✈️ "${sheetName}" 내 Travel Details → 항공·숙박 ${result.newTravel.length}명`);
                }
                break;
              }
              break;
            }
            // Travel 카테고리가 인식됐는데 연사 명단이 없으면 기본 5명 복원
            const hasTravelCat = result.newBudget.some(b => b.id === "b1");
            if (hasTravelCat && result.newTravel.length === 0) {
              result.newTravel = DEFAULT_TRAVEL_DETAIL.map(t => ({...t}));
              result.detected.push(`✈️ Travel 카테고리 감지 → 기본 연사 5명 복원`);
            }
            return true;
          }
        }
        return false;
      };

      const accountingMatched = parseAccountingFormat();

      // ═══════════════════════════════════════════════════
      //   일반 자동 감지 (회계 양식 못 찾았을 때)
      // ═══════════════════════════════════════════════════
      if (!accountingMatched) wb.SheetNames.forEach(sheetName => {
        const ws = wb.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
        if (rows.length < 2) return;

        // 헤더 행 찾기 (실제 데이터가 있는 첫 행 직전)
        let headerIdx = -1;
        for (let i = 0; i < Math.min(5, rows.length); i++) {
          const r = rows[i].map(c => String(c||"").trim()).filter(c => c);
          if (r.length >= 2) { headerIdx = i; break; }
        }
        if (headerIdx === -1) return;
        const headers = rows[headerIdx].map(h => String(h||"").trim().toLowerCase());
        const dataRows = rows.slice(headerIdx + 1);

        // 헤더 매핑 함수
        const findCol = (keywords) => {
          for (let i = 0; i < headers.length; i++) {
            const h = headers[i].replace(/[\s·\-_(),원\/]/g, "");
            for (const kw of keywords) {
              if (h.includes(kw)) return i;
            }
          }
          return -1;
        };

        const parseYN = (v) => /^(y|yes|확정|완료|지급|true|1|✓|o|✅)$/i.test(String(v||"").trim());

        // ▼ 시트 의미 자동 추론 ─────────────────
        const colLabel  = findCol(["항목명","항목","name","label","분류","카테고리","목적"]);
        const colBudget = findCol(["예산","budget","계획"]);
        const colId     = findCol(["항목id","id","코드"]);
        const colColor  = findCol(["색상","color"]);

        const colName   = findCol(["이름","name","참석자","연사","speaker"]);
        const colOrg    = findCol(["소속","org","기관","회사","institution"]);
        const colFrom   = findCol(["출발","from","도시","origin"]);
        const colFlight = findCol(["항공","flight","비행"]);
        const colHotel  = findCol(["호텔","hotel","숙박","accommodation"]);
        const colTrans  = findCol(["교통","trans","transport"]);
        const colMisc   = findCol(["기타","misc","other"]);
        const colOk     = findCol(["확정","ok","status","상태"]);

        const colCat    = findCol(["항목분류","분류","category","항목","대분류"]);
        const colDesc   = findCol(["내역","desc","항목명","상세","details","적요"]);
        const colAmt    = findCol(["금액","amount","액","비용","total"]);
        const colDate   = findCol(["날짜","date","일자","월일"]);
        const colPaid   = findCol(["지급","paid","결제","status"]);

        // 시트 유형 판단
        const hasTravelCols = colName !== -1 && (colFlight !== -1 || colHotel !== -1);
        const hasEntryCols  = colDesc !== -1 && colAmt !== -1 && colName === -1;
        const hasBudgetCols = colLabel !== -1 && colBudget !== -1 && !hasTravelCols && !hasEntryCols;

        if (hasTravelCols) {
          let count = 0;
          dataRows.forEach((r, i) => {
            const name = String(r[colName]||"").trim();
            if (!name || /^[─\-=].*|.*─$/.test(name)) return;
            result.newTravel.push({
              id: "t_"+Date.now()+"_"+i+"_"+Math.random().toString(36).slice(2,5),
              name,
              org:  colOrg  !== -1 ? String(r[colOrg]||"").trim() : "",
              from: colFrom !== -1 ? String(r[colFrom]||"").trim() : "",
              flight: colFlight !== -1 ? parseAmount(r[colFlight]) : 0,
              hotel:  colHotel  !== -1 ? parseAmount(r[colHotel])  : 0,
              trans:  colTrans  !== -1 ? parseAmount(r[colTrans])  : 0,
              misc:   colMisc   !== -1 ? parseAmount(r[colMisc])   : 0,
              ok:     colOk     !== -1 ? parseYN(r[colOk]) : false,
            });
            count++;
          });
          if (count > 0) result.detected.push(`✈️ "${sheetName}" → 항공·숙박 ${count}명`);
        } else if (hasEntryCols) {
          let count = 0;
          dataRows.forEach((r, i) => {
            const desc = String(r[colDesc]||"").trim();
            const amt = parseAmount(r[colAmt]);
            if (!desc || amt <= 0 || /^[─\-=]/.test(desc)) return;
            const catName = colCat !== -1 ? String(r[colCat]||"").trim() : "";
            // 카테고리 매칭: 새 예산 항목 OR 기존 BUDGET_ITEMS에서 찾기
            const allBudgets = result.newBudget.length > 0 ? result.newBudget : BUDGET_ITEMS;
            let budgetId = "";
            if (catName) {
              const found = allBudgets.find(b => b.label === catName || catName.includes(b.label) || b.label.includes(catName));
              if (found) budgetId = found.id;
            }
            if (!budgetId && allBudgets.length > 0) budgetId = allBudgets[0].id;
            if (!budgetId) {
              result.errors.push(`"${desc}" - 항목 분류를 찾지 못함`);
              return;
            }
            result.newEntries.push({
              id: "e_"+Date.now()+"_"+i+"_"+Math.random().toString(36).slice(2,5),
              budgetId, desc, amount:amt,
              date: colDate !== -1 ? String(r[colDate]||"").trim() : "",
              paid: colPaid !== -1 ? parseYN(r[colPaid]) : false,
            });
            count++;
          });
          if (count > 0) result.detected.push(`💰 "${sheetName}" → 지출 내역 ${count}건`);
        } else if (hasBudgetCols) {
          let count = 0;
          dataRows.forEach((r, i) => {
            const label = String(r[colLabel]||"").trim();
            if (!label || /^[─\-=]/.test(label)) return;
            const budget = parseAmount(r[colBudget]);
            if (budget <= 0) return;
            const id = colId !== -1 ? String(r[colId]||"").trim() : "";
            const color = colColor !== -1 ? String(r[colColor]||"#64748b").trim() : ["#1B4FA0","#0891b2","#7c3aed","#0d9488","#b45309","#16a34a","#dc2626"][result.newBudget.length % 7];
            result.newBudget.push({id: id || "b_"+Date.now()+"_"+i, label, budget, actual:0, color});
            count++;
          });
          if (count > 0) result.detected.push(`📊 "${sheetName}" → 예산 항목 ${count}개`);
        }
      });

      const hasData = result.newBudget.length + result.newTravel.length + result.newEntries.length;
      if (hasData === 0) {
        if (statusEl) statusEl.innerHTML = `<div class="card" style="background:#FEF2F2;border:1px solid #FECACA;padding:14px;">
          <div style="font-size:13px;font-weight:700;color:#991b1b;margin-bottom:8px;">⚠️ 가져올 데이터를 찾지 못했습니다</div>
          <div style="font-size:12px;color:#64748b;line-height:1.7;">
            엑셀 파일의 컬럼 헤더를 확인해 주세요. 다음 단어 중 하나가 포함되어야 합니다:<br>
            • <strong>예산 항목</strong>: "항목명" + "예산"<br>
            • <strong>항공·숙박</strong>: "이름" + "항공" 또는 "호텔"<br>
            • <strong>지출 내역</strong>: "내역" + "금액"<br>
            ${result.errors.length > 0 ? `<br><span style="color:#92400e;">⚠️ ${result.errors.length}건 오류: ${result.errors.slice(0,3).map(esc).join(", ")}</span>` : ""}
          </div>
        </div>`;
        event.target.value = "";
        return;
      }

      const detected = result.detected.join("<br>");
      const confirmMsg = `📋 자동 감지된 내용:\n\n${result.detected.join("\n")}\n\n⚠️ 해당 데이터가 있으면 모두 교체됩니다. 계속하시겠습니까?`;
      if (!confirm(confirmMsg)) {
        if (statusEl) statusEl.innerHTML = "";
        event.target.value = "";
        return;
      }

      if (result.newBudget.length > 0)  BUDGET_ITEMS = result.newBudget;
      if (result.newTravel.length > 0)  TRAVEL_DETAIL = result.newTravel;
      if (result.newEntries.length > 0) BUDGET_ENTRIES = result.newEntries;
      window._budgetMeta = {
        fileName: file.name,
        updatedAt: new Date().toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})
      };
      scheduleSave();
      draw();

      const ns = document.getElementById("budget-import-status");
      if (ns) ns.innerHTML = `<div class="card" style="background:#F0FDF4;border:1px solid #BBF7D0;padding:14px;">
        <div style="font-size:13px;font-weight:700;color:#15803d;margin-bottom:8px;">✅ 가져오기 완료: ${esc(file.name)}</div>
        <div style="font-size:12px;color:#475569;line-height:1.7;">${detected}
          ${result.errors.length>0?`<br><span style="color:#92400e;">⚠️ ${result.errors.length}건 무시: ${result.errors.slice(0,3).map(esc).join(", ")}${result.errors.length>3?" ...":""}</span>`:""}
        </div>
      </div>`;
    } catch (err) {
      if (statusEl) statusEl.innerHTML = `<div class="card" style="background:#FEF2F2;border:1px solid #FECACA;padding:14px;">
        <div style="font-size:13px;font-weight:700;color:#991b1b;">⚠️ 파일 읽기 실패: ${esc(err.message)}</div>
      </div>`;
    }
    event.target.value = "";
  };
  reader.readAsArrayBuffer(file);
};

window.fixTravelCategory = () => {
  // Travel / 항공 / 숙박 라벨을 가진 budget item 찾기
  const travelItem = BUDGET_ITEMS.find(b => /^(travel|항공|숙박|항공.*숙박|국제\s*항공)/i.test(b.label||""));
  if (!travelItem) {
    alert("Travel 카테고리를 찾지 못했습니다.\n현재 예산 항목명을 확인해 주세요.");
    return;
  }
  const msg = `Travel 카테고리 정리 안내:\n\n` +
    `1. "${travelItem.label}" → "항공·숙박"으로 변경 (ID: b1)\n` +
    `2. 이 카테고리의 지출 내역 (${BUDGET_ENTRIES.filter(e=>e.budgetId===travelItem.id).length}건) 삭제\n` +
    `3. 항공·숙박 명단 ${TRAVEL_DETAIL.length === 0 ? "기본 5명 복원" : `현재 ${TRAVEL_DETAIL.length}명 유지`}\n\n` +
    `계속하시겠습니까?`;
  if (!confirm(msg)) return;

  // 1. Travel 카테고리 ID와 라벨 정리
  const oldId = travelItem.id;
  BUDGET_ITEMS = BUDGET_ITEMS.map(b => b.id === oldId ? {...b, id:"b1", label:"항공·숙박", color:"#1B4FA0"} : b);

  // 2. 해당 지출 내역 삭제
  BUDGET_ENTRIES = BUDGET_ENTRIES.filter(e => e.budgetId !== oldId && e.budgetId !== "b1");

  // 3. 연사 명단이 비어있으면 기본 5명 복원
  if (TRAVEL_DETAIL.length === 0) {
    TRAVEL_DETAIL = DEFAULT_TRAVEL_DETAIL.map(t => ({...t}));
  }

  scheduleSave();
  draw();
  alert("✅ Travel 카테고리가 연사 명단 방식으로 정리되었습니다.");
};

// firebaseConfig 붙여넣기 파서 — 모든 형식 지원
// · { apiKey:... }  (JSON/JS 객체)
// · const firebaseConfig = { ... };
// · var firebaseConfig = { ... };
// · firebase.initializeApp({ ... });
function parseFirebaseConfig(raw) {
  if (!raw) return null;
  // 1) 중괄호 블록만 추출
  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) return null;
  const objStr = match[0];
  // 2) JS 객체 → JSON 변환 (키에 따옴표 추가)
  const jsonStr = objStr
    .replace(/\/\/[^\n]*/g, '')          // 주석 제거
    .replace(/,\s*([}\]])/g, '$1')       // 후행 쉼표 제거
    .replace(/([{,]\s*)([a-zA-Z_$][a-zA-Z0-9_$]*)(\s*:)/g, '$1"$2"$3'); // 키 따옴표
  try { return JSON.parse(jsonStr); } catch {}
  // 3) 파싱 실패 시 new Function fallback
  try { return new Function("return (" + objStr + ")")(); } catch {}
  return null;
}

window.applyFbConfig = () => {
  const raw = document.getElementById("fb-cfg-input")?.value.trim() || "";
  const errEl = document.getElementById("fb-err");
  if (errEl) errEl.style.display = "none";

  const cfg = parseFirebaseConfig(raw);

  if (!cfg) {
    if(errEl){ errEl.textContent = "❌ 파싱 실패 — 아래 예시처럼 firebaseConfig 전체를 붙여넣어 주세요."; errEl.style.display="block"; }
    return;
  }
  if (!cfg.projectId) {
    if(errEl){ errEl.textContent = "❌ projectId가 없습니다. Firebase 콘솔 → 프로젝트 설정에서 복사해 주세요."; errEl.style.display="block"; }
    return;
  }

  if (initFirebase(cfg)) {
    const panel = document.getElementById("fb-setup-panel");
    if(panel) panel.style.display = "none";
    draw();
  } else {
    if(errEl){ errEl.textContent = "❌ Firestore 연결 실패. 보안 규칙을 확인해 주세요: allow read, write: if true;"; errEl.style.display="block"; }
  }
};
window.disconnectFb = () => {
  if(unsubscribe){ unsubscribe(); unsubscribe=null; }
  try{if(firebase.apps.length>0)firebase.apps.forEach(a=>a.delete());}catch{}
  db=null;
  localStorage.removeItem("gvf_fb_cfg");
  updateFbStatus(false);
  draw();
};

window.forceReload = () => {
  // 모든 캐시 무력화 후 강제 새로고침
  const url = new URL(window.location.href);
  url.searchParams.set('v', Date.now());
  window.location.href = url.toString();
};

window.addEventListener("DOMContentLoaded", () => {
  // 로딩 화면 표시
  document.getElementById("body").innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;">
      <div style="font-size:48px;animation:spin 1s linear infinite;">🔥</div>
      <div style="font-size:16px;font-weight:700;color:#1B4FA0;">Firestore 연결 중...</div>
      <div style="font-size:13px;color:#94a3b8;">gvf-407a5 프로젝트에 자동 연결합니다</div>
    </div>
    <style>@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>`;
  // 파일에 내장된 설정으로 자동 연결
  initFirebase(FIREBASE_CONFIG);
  // 사이드바 즉시 렌더
  renderSidebarMenu();
  renderSidebarCalendar();
});
</script>
