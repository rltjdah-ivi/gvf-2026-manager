function applyFontScale(scale) {
  FONT_SCALE = Math.max(0.7, Math.min(1.5, parseFloat(scale) || 1));
  document.documentElement.style.setProperty("--fs-scale", FONT_SCALE);
  localStorage.setItem("gvf_font_scale", String(FONT_SCALE));
}
// 페이지 로드 시 즉시 적용
setTimeout(() => applyFontScale(FONT_SCALE), 0);

// ── 폰트 크기 조절 UI 핸들러 ───────────────────────
window.toggleFontMenu = (e) => {
  e?.stopPropagation();
  const menu = document.getElementById("font-menu");
  if (!menu) return;
  const isOpen = menu.style.display === "block";
  menu.style.display = isOpen ? "none" : "block";
  if (!isOpen) {
    // 슬라이더 동기화
    const slider = document.getElementById("font-scale-slider");
    if (slider) slider.value = FONT_SCALE;
    const label = document.getElementById("font-scale-label");
    if (label) label.textContent = Math.round(FONT_SCALE * 100) + "%";
    updateFontPresetActive();
    // 외부 클릭 시 닫기
    setTimeout(() => {
      document.addEventListener("click", closeFontMenuOnOutsideClick, {once: true});
    }, 0);
  }
};
window.closeFontMenu = () => {
  const menu = document.getElementById("font-menu");
  if (menu) menu.style.display = "none";
};
function closeFontMenuOnOutsideClick(e) {
  const menu = document.getElementById("font-menu");
  if (!menu) return;
  if (!menu.contains(e.target) && !e.target.closest("[onclick*='toggleFontMenu']")) {
    menu.style.display = "none";
  } else {
    document.addEventListener("click", closeFontMenuOnOutsideClick, {once: true});
  }
}
window.setFontScale = (scale) => {
  applyFontScale(scale);
  const slider = document.getElementById("font-scale-slider");
  if (slider) slider.value = FONT_SCALE;
  const label = document.getElementById("font-scale-label");
  if (label) label.textContent = Math.round(FONT_SCALE * 100) + "%";
  updateFontPresetActive();
};
function updateFontPresetActive() {
  const presets = {0.85: "작게", 1.0: "보통", 1.15: "크게", 1.3: "더 크게"};
  document.querySelectorAll(".font-preset-btn").forEach(btn => {
    const matchingScale = Object.entries(presets).find(([s, label]) => label === btn.textContent.trim());
    if (matchingScale && Math.abs(parseFloat(matchingScale[0]) - FONT_SCALE) < 0.01) {
      btn.classList.add("active");
    } else {
      btn.classList.remove("active");
    }
  });
}

function calcMsProgress(m) {
  if (!m.cats || m.cats.length === 0) return null;
  const items = CL.filter(t => m.cats.includes(t.cat));
  if (items.length === 0) return 0;
  return pct(items.filter(t => t.done).length, items.length);
}

// 다음 마일스톤 찾기 (사이드바 표시용)
function getNextMilestone() {
  const today0 = new Date(); today0.setHours(0,0,0,0);
  const todayMs = today0.getTime();
  for (const m of MILESTONES) {
    if (!m.deadline) continue;
    const [y,mo,d] = m.deadline.split("-").map(Number);
    const ms = new Date(y, mo-1, d).getTime();
    if (ms >= todayMs) {
      const dday = Math.round((ms - todayMs) / 86400000);
      return {...m, dday};
    }
  }
  return null;
}

const FS_COL = "gvf2026";
const FS_DOC = "main";

function initFirebase(cfg) {
  try {
    // 기존 앱 정리
    if (firebase.apps.length > 0) {
      if (unsubscribe) { unsubscribe(); unsubscribe = null; }
      firebase.apps.forEach(a => { try { a.delete(); } catch {} });
    }
    firebase.initializeApp(cfg);
    db = firebase.firestore();
    // 오프라인 퍼시스턴스 활성화 (네트워크 끊겨도 캐시 사용)
    db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
    localStorage.setItem("gvf_fb_cfg", JSON.stringify(cfg));

    // 실시간 리스너
    unsubscribe = db.collection(FS_COL).doc(FS_DOC).onSnapshot(snap => {
      const d = snap.data();
      if (!d) {
        // 문서 없으면 기본 데이터로 첫 저장
        saveToFirestore();
        return;
      }
      isReceiving = true;
      if (d.cl && Array.isArray(d.cl))  CL            = d.cl;
      if (d.sp && Array.isArray(d.sp))  SP            = d.sp;
      if (d.bi && Array.isArray(d.bi))  BUDGET_ITEMS  = d.bi;
      if (d.td && Array.isArray(d.td))  TRAVEL_DETAIL = d.td;
      if (d.be && Array.isArray(d.be))  BUDGET_ENTRIES= d.be;
      if (d.tp && typeof d.tp === "object") TRAVEL_PAID = {...TRAVEL_PAID, ...d.tp};
      // ⚠️ ATTENDEES는 별도 문서 "attendees"에서 로드 (마이그레이션 시 main에 있을 수 있음)
      if (d.at && Array.isArray(d.at) && d.at.length > 0 && (!ATTENDEES || ATTENDEES.length === 0)) {
        // 옛 위치(main)에서 발견 → 임시로 사용 (별도 문서로 마이그레이션은 첫 저장 시)
        ATTENDEES = d.at;
        window._attendeesNeedMigration = true;
        console.log(`[마이그레이션] main 문서에서 ATTENDEES ${d.at.length}명 발견 → 다음 저장 시 별도 문서로 이동`);
      }
      if (d.atc && typeof d.atc === "object") ATTENDEES_CONFIG = {...ATTENDEES_CONFIG, ...d.atc};
      if (d.dt && typeof d.dt === "object") DAILY_TODOS = d.dt;
      if (d.sm && Array.isArray(d.sm))       SIDEBAR_MENU = d.sm;
      // Materials 마이그레이션: 메인 메뉴 안의 mat_* 항목을 별도 Materials 그룹으로 이동
      const matPageSet = new Set(["mat_abstract","mat_ppt","mat_designs","mat_nametag","mat_tabletent"]);
      const main = SIDEBAR_MENU.find(g => g.group === "메인 메뉴");
      const inMainMatItems = main ? main.items.filter(i => matPageSet.has(i.page)) : [];
      if (inMainMatItems.length > 0) {
        // 메인 메뉴에서 제거
        main.items = main.items.filter(i => !matPageSet.has(i.page));
      }
      // Materials 그룹 보장
      let matGroup = SIDEBAR_MENU.find(g => g.group === "Materials");
      if (!matGroup) {
        matGroup = {group: "Materials", items: []};
        const toolIdx = SIDEBAR_MENU.findIndex(g => g.group === "도구");
        if (toolIdx >= 0) SIDEBAR_MENU.splice(toolIdx, 0, matGroup);
        else SIDEBAR_MENU.push(matGroup);
      }
      // 메인에서 옮긴 항목을 Materials 그룹 앞쪽에 추가 (중복 제거)
      inMainMatItems.forEach(item => {
        if (!matGroup.items.some(i => i.page === item.page)) matGroup.items.unshift(item);
      });
      // 빠진 기본 항목 자동 보충 (순서 보장)
      const defaultMat = [
        {icon:"📖", label:"Abstract Book", page:"mat_abstract"},
        {icon:"🖼", label:"PPT Slides", page:"mat_ppt"},
        {icon:"🎨", label:"Designs", page:"mat_designs"},
        {icon:"🪪", label:"Name Tag", page:"mat_nametag"},
        {icon:"🪧", label:"Table Tent", page:"mat_tabletent"}
      ];
      defaultMat.forEach((def, idx) => {
        if (!matGroup.items.some(i => i.page === def.page)) {
          matGroup.items.splice(idx, 0, def);
        }
      });
      // Materials 그룹 내 순서 정규화 (defaultMat 순서대로)
      matGroup.items.sort((a, b) => {
        const ai = defaultMat.findIndex(d => d.page === a.page);
        const bi = defaultMat.findIndex(d => d.page === b.page);
        if (ai === -1 && bi === -1) return 0;
        if (ai === -1) return 1;
        if (bi === -1) return -1;
        return ai - bi;
      });
      if (d.mt && typeof d.mt === "object")   window.MATERIALS = d.mt;
      if (d.mts && typeof d.mts === "object")  window.MATERIALS_BY_SPEAKER = d.mts;
      if (d.mtso && typeof d.mtso === "object") window.MAT_SORT_ORDER = d.mtso;
      if (d.mtsm && typeof d.mtsm === "object") window.MAT_MANUAL = d.mtsm;
      if (d.mti && typeof d.mti === "object")  window.MATERIALS_BY_ITEM = d.mti;
      if (d.ms && Array.isArray(d.ms))       MILESTONES = d.ms;
      // Firestore에서 사이드바 메뉴를 받았다면 현재 페이지 제목도 갱신
      const ttlEl = document.getElementById("pg-ttl");
      if (ttlEl) ttlEl.textContent = getPageTitle(curPage);
      if (d.agendaHtml)   { AGENDA_HTML = d.agendaHtml; AGENDA_ROWS = null; }
      if (d.agendaMeta)   AGENDA_META = d.agendaMeta;
      if (d.savedAt)      savedAt     = d.savedAt;
      updateFbStatus(true);
      updateSidebar();
      draw();
      setTimeout(() => { isReceiving = false; }, 300);
    }, err => {
      console.error("Firestore onSnapshot 오류:", err.message);
      updateFbStatus(false);
    });

    // ⭐ ATTENDEES 별도 문서 구독 (1MB 한도 회피)
    db.collection(FS_COL).doc("attendees").onSnapshot(snap => {
      const d = snap.data();
      if (!d) return;
      isReceiving = true;
      if (d.at && Array.isArray(d.at)) {
        ATTENDEES = d.at;
        console.log(`[ATTENDEES] 별도 문서에서 ${d.at.length}명 로드`);
      }
      draw();
      setTimeout(() => { isReceiving = false; }, 300);
    }, err => {
      console.warn("[ATTENDEES] onSnapshot 오류:", err.message);
    });

    updateFbStatus(true);
    return true;
  } catch(e) {
    console.error("Firebase 초기화 오류:", e.message);
    updateFbStatus(false);
    return false;
  }
}

// Firestore에 전체 상태 저장
async function saveToFirestore() {
  if (!db) return false;
  const now = ts();
  try {
    // ⭐ main 문서 — ATTENDEES 제외하여 저장 (1MB 한도 회피)
    const mainPayload = {
      cl: CL,
      sp: SP,
      bi: BUDGET_ITEMS,
      td: TRAVEL_DETAIL,
      be: BUDGET_ENTRIES,
      tp: TRAVEL_PAID,
      atc: ATTENDEES_CONFIG,
      dt: DAILY_TODOS,
      sm: SIDEBAR_MENU,
      mt: window.MATERIALS || {},
      mts: window.MATERIALS_BY_SPEAKER || {},
      mtso: window.MAT_SORT_ORDER || {},
      mtsm: window.MAT_MANUAL || {},
      mti: window.MATERIALS_BY_ITEM || {},
      ms: MILESTONES,
      agendaHtml: AGENDA_HTML,
      agendaMeta: AGENDA_META,
      savedAt: now
    };
    // 마이그레이션 중이면 main에서 at 필드를 명시적으로 삭제
    if (window._attendeesNeedMigration && typeof firebase !== "undefined" && firebase.firestore?.FieldValue?.delete) {
      mainPayload.at = firebase.firestore.FieldValue.delete();
      console.log("[마이그레이션] main 문서에서 at 필드 삭제 예정");
    }
    await db.collection(FS_COL).doc(FS_DOC).set(mainPayload, {merge: true});

    // ⭐ ATTENDEES — 별도 문서에 저장
    await db.collection(FS_COL).doc("attendees").set({
      at: ATTENDEES,
      count: ATTENDEES.length,
      savedAt: now
    });

    // 마이그레이션 완료 플래그 클리어
    if (window._attendeesNeedMigration) {
      window._attendeesNeedMigration = false;
      console.log(`[마이그레이션] 완료 — ATTENDEES ${ATTENDEES.length}명을 별도 문서로 이동`);
    }
    savedAt = now;
    updateSyncPill("synced");
    setTimeout(() => updateSyncPill("idle"), 2000);
    return true;
  } catch(e) {
    console.error("Firestore 저장 오류:", e);
    window._lastSaveError = {
      message: e.message || String(e),
      code: e.code || "unknown",
      time: new Date().toLocaleString("ko-KR")
    };
    // 데이터 크기 진단 정보
    try {
      const payloadSize = JSON.stringify({
        cl:CL.length, sp:SP.length, at:ATTENDEES.length,
        mtsFiles: countMatFiles(window.MATERIALS_BY_SPEAKER),
        mtiFiles: countMatFiles(window.MATERIALS_BY_ITEM)
      });
      window._lastSaveError.summary = payloadSize;
      // 추정 main 페이로드 크기 (at 제외)
      const payload = {
        cl:CL, sp:SP, bi:BUDGET_ITEMS, td:TRAVEL_DETAIL, be:BUDGET_ENTRIES, dt:DAILY_TODOS,
        tp:TRAVEL_PAID, atc:ATTENDEES_CONFIG, sm:SIDEBAR_MENU,
        mt:window.MATERIALS||{}, mts:window.MATERIALS_BY_SPEAKER||{},
        mtso:window.MAT_SORT_ORDER||{}, mtsm:window.MAT_MANUAL||{},
        mti:window.MATERIALS_BY_ITEM||{}, ms:MILESTONES,
        agendaHtml:AGENDA_HTML, agendaMeta:AGENDA_META
      };
      const sizeKB = Math.round(JSON.stringify(payload).length / 1024);
      const atSizeKB = Math.round(JSON.stringify(ATTENDEES).length / 1024);
      window._lastSaveError.sizeKB = sizeKB;
      window._lastSaveError.atSizeKB = atSizeKB;
      console.warn(`[Firestore] main 크기: ${sizeKB}KB, attendees 크기: ${atSizeKB}KB (각 한도: 1024KB)`);
      if (sizeKB > 900) console.error(`⚠️ main 1MB 한도 초과 임박! ${sizeKB}KB`);
      if (atSizeKB > 900) console.error(`⚠️ attendees 1MB 한도 초과 임박! ${atSizeKB}KB`);
    } catch(_) {}
    updateSyncPill("error");
    return false;
  }
}

function countMatFiles(obj) {
  if (!obj || typeof obj !== "object") return 0;
  let n = 0, sz = 0;
  for (const k1 in obj) {
    for (const k2 in (obj[k1]||{})) {
      const files = obj[k1][k2]?.files || [];
      n += files.length;
      files.forEach(f => sz += (f.url?.length || 0));
    }
  }
  return {count:n, sizeKB:Math.round(sz/1024)};
}

function scheduleSave() {
  if (isReceiving) { updateSidebar(); draw(); return; }
  updateSidebar(); draw();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    if (db) {
      saveToFirestore();
    } else {
      // Firestore 미연결 시 경고
      updateSyncPill("error");
      showFbNotice();
    }
  }, 400);
}

  const el = document.getElementById("sync-status");

function updateSyncPill(state) {
  const pill = document.getElementById("sync-pill");
  const sb   = document.getElementById("sync-status");
  const M = {
    saved:  ["💾 저장됨","#15803d","#dcfce7"],

    error:  ["⚠️ 저장 오류","#991b1b","#fee2e2"],

  };
  const [lbl,c,bg] = M[state]||["","","transparent"];
  if(pill){

function triggerImport() { document.getElementById("json-import-input").click(); }

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.cl && Array.isArray(data.cl)) CL = data.cl;
      if (data.sp && Array.isArray(data.sp)) SP = data.sp;
      savedAt = data.exportedAt || ts();
      scheduleSave(); // Firestore에 저장
      const toast = document.getElementById("import-toast");
      toast.style.display = "block";
      setTimeout(()=>{ toast.style.display="none"; }, 3000);
      updateSyncPill("import");
    } catch(err) { alert("JSON 파일을 읽을 수 없습니다: " + err.message); }
  };
  reader.readAsText(file);
  event.target.value = "";
}

function importFromPaste() {
  const raw = document.getElementById("paste-input").value.trim();
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    if (data.cl && Array.isArray(data.cl)) CL = data.cl;
    if (data.sp && Array.isArray(data.sp)) SP = data.sp;
    savedAt = data.exportedAt || ts();
    document.getElementById("paste-modal").style.display = "none";
    document.getElementById("paste-input").value = "";
    scheduleSave(); // Firestore에 저장
    const toast = document.getElementById("import-toast");
    toast.style.display = "block";
    setTimeout(()=>{ toast.style.display="none"; }, 3000);
  } catch(err) { alert("JSON을 읽을 수 없습니다: " + err.message); }
}

function exportJSON() {
  const data = {cl:CL, sp:SP, exportedAt:ts(), version:"2.3"};
  const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href=url; a.download=`GVF2026_데이터_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}

  if (!m) return;
  if (!m.cats) m.cats = [];
  const i = m.cats.indexOf(cat);

  else m.cats.push(cat);
  scheduleSave();

// D-7 이내 마일스톤을 To-do로 자동 추가
window.syncMsToTodos = () => {
  const today0 = new Date(); today0.setHours(0,0,0,0);
  const todayMs = today0.getTime();
  let added = 0, existed = 0;
  MILESTONES.forEach(m => {
    if (!m.deadline) return;
    const [y,mo,d] = m.deadline.split("-").map(Number);
    const targetMs = new Date(y, mo-1, d).getTime();
    const dday = Math.round((targetMs - todayMs) / 86400000);
    if (dday < 0 || dday > 7) return;
    // 마감일 To-do 추가
    if (!DAILY_TODOS[m.deadline]) DAILY_TODOS[m.deadline] = [];
    const taskText = `🏁 마일스톤 마감: ${m.title}`;
    const exists = DAILY_TODOS[m.deadline].some(t => t.task === taskText);
    if (exists) { existed++; return; }
    DAILY_TODOS[m.deadline].push({
      id: "mst_" + m.id + "_" + Date.now(),
      task: taskText,
      done: false,
      time: ""
    });
    added++;
  });
  scheduleSave();
  draw();
  alert(`✅ ${added}건 To-do 추가됨${existed > 0 ? ` (이미 등록된 ${existed}건은 건너뜀)` : ''}\n\nTo-do List 페이지에서 확인하세요.`);
};

function dtag(deadline) {
  if (!deadline) return `<span class="tag" style="background:#F1F5F9;color:#94a3b8;font-size:11px;">기한없음</span>`;
  // "YYYY-MM-DD" 를 로컬 타임으로 파싱 (new Date("YYYY-MM-DD")는 UTC 기준이라 시차 오류 발생)
  const [y, mo, d] = deadline.split('-').map(Number);
  const today = new Date(); today.setHours(0,0,0,0);
  const due   = new Date(y, mo-1, d); // 로컬 자정 기준
  const diff  = Math.round((due - today) / 86400000);
  let bg, c, label;
  if (diff < 0)       { bg="#FEE2E2"; c="#991b1b"; label=`D+${Math.abs(diff)} 초과`; }
  else if (diff === 0){ bg="#FEE2E2"; c="#dc2626"; label="오늘"; }
  else if (diff <= 3) { bg="#FEE2E2"; c="#dc2626"; label=`D-${diff}`; }
  else if (diff <= 7) { bg="#FEF3C7"; c="#92400e"; label=`D-${diff}`; }
  else if (diff <= 14){ bg="#FEF9C3"; c="#a16207"; label=`D-${diff}`; }
  else if (diff <= 30){ bg="#DBEAFE"; c="#1d4ed8"; label=`D-${diff}`; }
  else               { bg="#F0FDF4"; c="#15803d"; label=`D-${diff}`; }
  return `<span class="tag" style="background:${bg};color:${c};font-size:11px;white-space:nowrap;" title="${deadline}">${mo}/${d} <strong>${label}</strong></span>`;
}

function calcUrgCnt() {
  return calcUrgentItems().length;
}
// 긴급 처리 대상 항목 목록 (미완료 + 마감일 있음 + 0~3일 이내, 지난 마감 포함)
function calcUrgentItems() {
  const today = new Date(); today.setHours(0,0,0,0);
  return CL.filter(t=>{
    if(t.done) return false;
    if(!t.deadline) return false;
    const [y,mo,d] = t.deadline.split('-').map(Number);
    const due = new Date(y, mo-1, d);
    const diff = Math.round((due - today) / 86400000);
    return diff <= 3; // 지난 마감(음수) + 3일 이내
  });
}

};

let calViewYM = null; // {y, m} 표시 중인 연월
let selectedDate = null; // YYYY-MM-DD

function ymdStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
}

function renderSidebarCalendar() {
  const el = document.getElementById("sb-calendar");
  if (!el) return;
  if (!calViewYM) {
    const now = new Date();
    calViewYM = {y: now.getFullYear(), m: now.getMonth()};
  }
  const {y, m} = calViewYM;
  const firstDay = new Date(y, m, 1);
  const lastDay = new Date(y, m+1, 0);
  const startDow = firstDay.getDay(); // 0=일
  const daysInMonth = lastDay.getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = ymdStr(today);
  const forumStr = "2026-06-25";

  // 데드라인 있는 날짜 set
  const deadlineDates = new Set();
  CL.forEach(t => { if (!t.done && t.deadline) deadlineDates.add(t.deadline); });
  // To-do 있는 날짜 set
  const todoDates = new Set(Object.keys(DAILY_TODOS).filter(d => DAILY_TODOS[d]?.length > 0));

  const monthName = `${y}.${String(m+1).padStart(2,"0")}`;

  let html = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
    <button onclick="calPrev()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:14px;padding:2px 6px;">◀</button>
    <span style="font-size:12px;font-weight:700;color:#0B1D3F;">${monthName}</span>
    <button onclick="calNext()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:14px;padding:2px 6px;">▶</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;font-size:10px;text-align:center;">
    ${["일","월","화","수","목","금","토"].map((d,i)=>`<div style="color:${i===0?'#dc2626':i===6?'#1B4FA0':'#94a3b8'};font-weight:700;padding:3px 0;">${d}</div>`).join("")}`;
  // 시작 공백
  for (let i = 0; i < startDow; i++) {
    html += `<div></div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = ymdStr(new Date(y, m, d));
    const isToday = ds === todayStr;
    const isForum = ds === forumStr;
    const isSel = ds === selectedDate;
    const hasDeadline = deadlineDates.has(ds);
    const hasTodo = todoDates.has(ds);
    const dow = (startDow + d - 1) % 7;
    let bg = "transparent", color = "#475569", weight = "400";
    if (dow === 0) color = "#dc2626";
    if (dow === 6) color = "#1B4FA0";
    if (isSel) { bg = "#1B4FA0"; color = "#fff"; weight = "700"; }
    else if (isToday) { bg = "#DBEAFE"; color = "#1B4FA0"; weight = "700"; }
    else if (isForum) { bg = "#FEF3C7"; color = "#92400e"; weight = "700"; }
    const dot = hasDeadline ? '<div style="position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:#ef4444;"></div>'
              : hasTodo ? '<div style="position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:#16a34a;"></div>' : "";
    html += `<div onclick="selectCalDate('${ds}')" style="position:relative;padding:4px 0;border-radius:5px;cursor:pointer;background:${bg};color:${color};font-weight:${weight};font-size:10px;">${d}${dot}</div>`;
  }
  html += `</div>`;
  el.innerHTML = html;
}

      let body = activeTodos.length === 0 && !showDone
        ? `<div style="text-align:center;padding:30px 20px;color:#94a3b8;">

          </div>`
        : activeTodos.map((t,i) => todoRow(t,i,activeTodos)).join("");
      if (showDone && doneTodos.length > 0) {
        body += `<div style="font-size:10px;font-weight:700;color:#94a3b8;padding:8px 6px 4px;letter-spacing:.05em;border-top:1px dashed #E2E8F0;margin-top:6px;">✅ 완료된 항목</div>`;
        body += doneTodos.map((t,i) => todoRow(t,i,doneTodos)).join("");
      }
      // 토글 푸터 (완료된 항목이 있을 때만)
      const footer = doneTodos.length > 0 ? `
        <div style="display:flex;justify-content:center;margin-top:10px;padding-top:8px;border-top:1px solid #F1F5F9;">
          <button onclick="window._showDoneTodos=${!showDone};draw()" style="padding:5px 14px;border-radius:14px;background:#F8FAFC;color:#64748b;border:1px solid #E2E8F0;cursor:pointer;font-size:11px;font-weight:600;">

          </button>
        </div>` : "";
      return body + footer;
    })()}
  </div>`;
}

window.todoChangeDate = (delta) => {
  if (!selectedDate) selectedDate = ymdStr(new Date());
  const [y,m,d] = selectedDate.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate() + delta);
  selectedDate = ymdStr(dt);
  calViewYM = {y: dt.getFullYear(), m: dt.getMonth()};
  draw();
};
window.todoToday = () => { selectedDate = ymdStr(new Date()); const n = new Date(); calViewYM = {y:n.getFullYear(), m:n.getMonth()}; draw(); };
window.addTodo = () => {
  const input = document.getElementById("todo-add-input");
  const timeInput = document.getElementById("todo-add-time");
  const task = input?.value.trim();
  if (!task) return;
  const time = timeInput?.value || "";
  if (!selectedDate) selectedDate = ymdStr(new Date());
  if (!DAILY_TODOS[selectedDate]) DAILY_TODOS[selectedDate] = [];
  const id = "tt_" + Date.now() + "_" + Math.random().toString(36).slice(2,5);
  DAILY_TODOS[selectedDate].push({id, task, done:false, time});
  // 시간순 정렬
  DAILY_TODOS[selectedDate].sort((a,b) => (a.time||"99:99").localeCompare(b.time||"99:99"));
  scheduleSave();
};
window.toggleTodo = (ds, id) => {
  if (!DAILY_TODOS[ds]) return;
  DAILY_TODOS[ds] = DAILY_TODOS[ds].map(t => t.id===id ? {...t, done:!t.done} : t);
  scheduleSave();
};
window.delTodo = (ds, id) => {
  if (!DAILY_TODOS[ds]) return;
  DAILY_TODOS[ds] = DAILY_TODOS[ds].filter(t => t.id !== id);
  if (DAILY_TODOS[ds].length === 0) delete DAILY_TODOS[ds];
  scheduleSave();
};

window.toggleShowDone = (cat) => {
  window._showDoneCl = window._showDoneCl || {};
  window._showDoneCl[cat] = !window._showDoneCl[cat];
  draw();
};

// Firestore에서 로드됨. 초기값은 기본 Agenda 사용
let AGENDA_HTML = DEFAULT_AGENDA_HTML;
let AGENDA_META = {};
let AGENDA_ROWS = null;  // 캐시: 편집 시 사용

// ── Agenda → 참석자 관리 자동 동기화 ────────────────────
// Agenda 안의 모든 연사를 추출해서 SP(참석자 리스트)에 누락된 사람을 자동 추가
// 기존 연사 정보(상태, 국내/해외 등)는 그대로 유지
function syncAgendaToSP(opts = {}) {
  const {silent = false, removeOrphans = false} = opts;
  // 1) Agenda에서 모든 연사 추출
  const rows = AGENDA_ROWS || parseAgendaToRows(AGENDA_HTML);
  const agendaSpeakers = []; // [{name, org, session, role}]
  let currentSession = "";
  rows.forEach(r => {
    if (r.type === "header" && r.title) {
      currentSession = r.title;
    } else if (r.type === "row" && r.speakers && r.speakers.length > 0) {
      r.speakers.forEach(sp => {
        if (!sp.name || sp.name.length < 2) return;
        // 시간 같은 게 이름으로 잡힌 경우 제외
        if (/^\d{1,2}:\d{2}/.test(sp.name)) return;
        // 흔한 직책 키워드만 있는 경우 제외
        if (/^(Moderator|Speaker|Chair|Panelist|Welcome|Opening|Closing|TBD|TBA)$/i.test(sp.name.trim())) return;
        agendaSpeakers.push({
          name: sp.name.trim(),
          org: (sp.sub || "").trim(),
          session: currentSession || "",
          role: inferRole(r.title || "", sp.sub || "")
        });
      });
    }
  });

  // 2) 이름 정규화 함수 (대소문자/공백 무시 비교)
  const normName = (s) => (s||"").toLowerCase().replace(/[\s,.\-]/g, "").trim();

  // 3) SP와 매칭하면서 신규/업데이트 분류
  let added = 0, updated = 0, removed = 0;
  const agendaNames = new Set(agendaSpeakers.map(a => normName(a.name)));

  agendaSpeakers.forEach(a => {
    const existing = SP.find(s => normName(s.name) === normName(a.name));
    if (existing) {
      // 기존 연사 — 비어있는 필드만 채움 (상태/travel는 절대 덮지 않음)
      let changed = false;
      if (!existing.org && a.org) { existing.org = a.org; changed = true; }
      if (!existing.session && a.session) { existing.session = a.session; changed = true; }
      if (!existing.role && a.role) { existing.role = a.role; changed = true; }
      if (changed) updated++;
    } else {
      // 신규 연사 추가
      SP.push({
        id: nextSpId(),
        name: a.name,
        org: a.org,
        role: a.role,
        session: a.session,
        status: "pending",
        travel: /국내|domestic|korean?/i.test(a.org) ? "국내" : "미정"
      });
      added++;
    }
  });

  // 4) (옵션) Agenda에 없는 연사 제거
  if (removeOrphans) {
    const before = SP.length;
    SP = SP.filter(s => agendaNames.has(normName(s.name)));
    removed = before - SP.length;
  }

  scheduleSave();
  if (!silent) {
    let msg = `✅ 연사 동기화 완료\n\n`;
    msg += `• Agenda 연사 총 ${agendaSpeakers.length}명\n`;
    msg += `• 신규 추가: ${added}명\n`;
    msg += `• 정보 보강: ${updated}명\n`;
    if (removeOrphans) msg += `• 제거: ${removed}명\n`;
    msg += `• 현재 SP 총 ${SP.length}명`;
    alert(msg);
  }
  return {added, updated, removed, total: agendaSpeakers.length};
}

// 세션 타이틀과 sub 텍스트에서 역할 추론
function inferRole(sessionTitle, sub) {
  const lower = (sessionTitle + " " + sub).toLowerCase();
  if (/keynote|기조/.test(lower)) return "기조강연";
  if (/welcome|opening/.test(lower)) return "환영사";
  if (/closing/.test(lower)) return "폐회사";
  if (/moderator|chair|좌장/.test(lower)) return "좌장";
  if (/panel/.test(lower)) return "패널";
  return "연사";
}

window.syncAgendaToSP = (removeOrphans = false) => syncAgendaToSP({removeOrphans});

// ── Agenda 등장 순서 맵 (참석자 정렬용) ───────────────
// returns Map<normalizedName, agendaIndex>
function buildAgendaOrderMap() {
  const map = new Map();
  const rows = AGENDA_ROWS || parseAgendaToRows(AGENDA_HTML);
  let idx = 0;
  rows.forEach(r => {
    // 섹션 좌장도 포함 (예: "Jerome H. Kim, IVI Director")
    if (r.type === "section" && r.chair) {
      const chairs = parseChairNames(r.chair);
      chairs.forEach(name => {
        const key = normalizeSpName(name);
        if (key && !map.has(key)) map.set(key, idx++);
      });
    }
    if (r.type === "row" && r.speakers && r.speakers.length > 0) {
      r.speakers.forEach(sp => {
        if (!sp.name) return;
        const key = normalizeSpName(sp.name);
        if (!map.has(key)) {
          map.set(key, idx++);
        }
      });
    }
  });
  return map;
}

// 이름 정규화 (대소문자/공백/구두점 제거)
function normalizeSpName(s) {
  return (s || "").toLowerCase().replace(/[\s,.\-]/g, "").trim();
}

// 좌장 문자열에서 연사 이름들만 추출
// 입력 예: "Jerome H. Kim, IVI Director General", "Hee Sun Kim (KAIST) & John Doe (MIT)"
// 출력: ["Jerome H. Kim"], ["Hee Sun Kim", "John Doe"]
function parseChairNames(chairStr) {
  if (!chairStr) return [];
  // & 또는 and 또는 / 로 여러 명 구분
  const parts = chairStr.split(/\s+(?:&|and|\/)\s+/i);
  const names = [];
  parts.forEach(part => {
    // 괄호 안 제거 (소속/직책)
    let s = part.replace(/\([^)]*\)/g, "").trim();
    // 첫 콤마 앞까지 (예: "Jerome H. Kim, IVI Director" → "Jerome H. Kim")
    s = s.split(",")[0].trim();
    // 양 끝 구분자 제거
    s = s.replace(/^[·•∙\-\s]+|[·•∙\-\s]+$/g, "");
    // 너무 짧거나 흔한 단어면 제외
    if (s.length < 2) return;
    if (/^(chair|chairperson|moderator|speaker|panelist|by|of|the|tbd|tba)$/i.test(s)) return;
    names.push(s);
  });
  return names;
}

// ── Agenda HTML ↔ 데이터 변환 ──────────────────────────
function parseAgendaToRows(html) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html;
  const rows = [];
  let rid = 1;
  Array.from(tmp.children).forEach(el => {
    if (el.classList?.contains("ag-header")) {
      rows.push({id:"r"+(rid++), type:"header", html:el.innerHTML});
    } else if (el.classList?.contains("ag-section-label")) {
      // "Title · Chaired by Name, Org" 패턴에서 좌장 분리
      let raw = el.textContent.trim();
      // 편집 모드에서 추가된 옆 버튼 텍스트 제거 (대비책)
      raw = raw.replace(/[✏️🗑]/g, "").trim();
      const chairMatch = raw.match(/^(.*?)[·•∙‧]\s*(?:Chaired by|좌장[\s:：]*)\s*(.+)$/i)
                      || raw.match(/^(.*?)\s+(?:Chaired by|좌장[\s:：]*)\s*(.+)$/i);
      const label = (chairMatch ? chairMatch[1] : raw).trim().replace(/[·•∙‧]\s*$/, "").trim();
      const chair = chairMatch ? chairMatch[2].trim() : "";
      rows.push({id:"r"+(rid++), type:"section", label, chair});
    } else if (el.classList?.contains("ag-row")) {
      const time = (el.querySelector(".ag-time")?.textContent || "").trim();
      const title = (el.querySelector(".ag-prog")?.textContent || "").trim();
      const spkHtml = (el.querySelector(".ag-spk")?.innerHTML || "").trim();
      const rowType = el.classList.contains("special") ? "special"
                    : el.classList.contains("keynote") ? "keynote" : "normal";
      rows.push({id:"r"+(rid++), type:"row", time, title, speakers:parseSpeakerHtml(spkHtml), rowType});
    }
  });
  return rows;
}

function parseSpeakerHtml(html) {
  if (!html?.trim()) return [];

  // HTML 정리: 단계별로 안전하게 추출
  // 1. <p>, </p>를 <br>로 변환
  let h = html.replace(/<\/p>\s*<p[^>]*>/gi, "<br>").replace(/<\/?p[^>]*>/gi, "");
  // 2. 점들의 연속(……) 제거 (오타로 보이는 패턴)
  h = h.replace(/[·•∙‧⋅]{3,}/g, "");
  // 3. &amp; → &
  h = h.replace(/&amp;/g, "&");

  const speakers = [];

  // <strong> 태그가 있는 경우 → 기존 방식
  if (/<strong>/i.test(h)) {
    const parts = h.split(/(?=<strong>)/);
    parts.forEach(part => {
      if (!part.includes("<strong>")) return;
      const nameMatch = part.match(/<strong>([^<]+)<\/strong>/);
      if (!nameMatch) return;
      const name = nameMatch[1].trim();
      let sub = part.replace(/<strong>[^<]+<\/strong>/, "");
      // <em> 내용 추출, <br>로 정리
      sub = sub.replace(/<em[^>]*>([^<]*)<\/em>/gi, "$1");
      sub = sub.replace(/<[^>]+>/g, " "); // 남은 태그 모두 제거
      sub = sub.replace(/\s+/g, " ").trim();
      // 앞뒤 구분자 정리
      sub = sub.replace(/^[\s·•∙‧⋅\-–—,]+/, "").replace(/[\s·•∙‧⋅\-–—,]+$/, "").trim();
      speakers.push({name, sub});
    });
  } else {
    // <strong> 없는 경우 → 줄바꿈 기반 파싱
    // <br>로 분리 → 연속된 두 줄을 (이름, 소속) 쌍으로 처리
    h = h.replace(/<em[^>]*>([^<]*)<\/em>/gi, "$1");
    h = h.replace(/<[^>]+>/g, "<br>"); // 모든 태그를 <br>로
    const lines = h.split(/<br\s*\/?>/i).map(l => l.trim()).filter(l => l && l.length > 1);
    // 한 줄 = 한 연사 + 그 다음 줄이 소속 형태일 가능성
    if (lines.length === 0) return [];
    if (lines.length === 1) {
      speakers.push({name: lines[0], sub: ""});
    } else {
      // 두 줄씩 페어링 시도 (이름, 소속)
      let i = 0;
      while (i < lines.length) {
        const line = lines[i];
        const next = lines[i+1] || "";
        // 다음 줄이 직책/소속처럼 보이면 (Director, CEO, Professor 등 포함) 페어로
        const isJobTitle = /\b(director|ceo|cso|cto|professor|manager|officer|chief|head|president|coordinator)\b|연구원|교수|이사/i.test(next);
        if (isJobTitle && next.length < 100) {
          speakers.push({name: line, sub: next});
          i += 2;
        } else {
          // 단독 이름 (TBC 같은 케이스)
          speakers.push({name: line, sub: ""});
          i += 1;
        }
      }
    }
  }

  return speakers;
}

function speakersToHtml(speakers) {
  if (!speakers?.length) return "";
  return speakers.map(sp => {
    // ID 기반 연동: spId가 있으면 LOP에서 최신 정보 조회
    const resolved = resolveSpeaker(sp);
    const name = esc(resolved.name);
    const statusBadge = resolved.statusBadge || "";
    const orphanBadge = resolved.isOrphan ? `<span style="display:inline-block;font-size:9px;background:#FEF2F2;color:#dc2626;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:700;vertical-align:middle;" title="LOP에 등록되지 않은 연사">⚠️ 미등록</span>` : "";
    const namePart = `<strong>${name}</strong>${statusBadge}${orphanBadge}`;
    if (!resolved.sub) return namePart;
    if (resolved.sub.startsWith("(")) return `${namePart} ${esc(resolved.sub)}`;
    if (resolved.sub.startsWith("–") || resolved.sub.startsWith("-")) return `${namePart} ${esc(resolved.sub)}`;
    return `${namePart}<br><em>${esc(resolved.sub)}</em>`;
  }).join("<br>");
}

// ── ID 기반 연사 조회 + 상태 배지 ────────────────────
// 입력: Agenda 행의 speaker 객체 {spId?, name?, sub?}
// 출력: {name, sub, status, isOrphan, statusBadge}
function resolveSpeaker(sp) {
  // 1) spId로 LOP에서 조회 (마스터)
  if (sp.spId) {
    const master = SP.find(s => s.id === sp.spId);
    if (master) {
      let statusBadge = "";
      if (master.status === "pending") {
        statusBadge = ` <span style="display:inline-block;font-size:9px;background:#FEF3C7;color:#92400e;padding:1px 5px;border-radius:4px;font-weight:700;vertical-align:middle;" title="연사 상태: 대기 중">⏳ 대기</span>`;
      } else if (master.status === "cancelled") {
        statusBadge = ` <span style="display:inline-block;font-size:9px;background:#FEE2E2;color:#991b1b;padding:1px 5px;border-radius:4px;font-weight:700;vertical-align:middle;" title="연사 상태: 취소됨">❌ 취소</span>`;
      }
      return {
        name: master.name,
        sub: master.org || sp.sub || "",
        status: master.status,
        isOrphan: false,
        statusBadge
      };
    }
    // spId가 있지만 LOP에 없음 → orphan
    return {name: sp.name || "(삭제된 연사)", sub: sp.sub || "", isOrphan: true, statusBadge: ""};
  }
  // 2) spId 없음 — 이름으로 LOP에서 찾기 시도
  if (sp.name) {
    const norm = normalizeSpName(sp.name);
    const master = SP.find(s => normalizeSpName(s.name) === norm);
    if (master) {
      // 자동 바인딩: 이름 매칭되면 spId 부여 (다음 저장 시 영구화)
      sp.spId = master.id;
      let statusBadge = "";
      if (master.status === "pending") {
        statusBadge = ` <span style="display:inline-block;font-size:9px;background:#FEF3C7;color:#92400e;padding:1px 5px;border-radius:4px;font-weight:700;vertical-align:middle;">⏳ 대기</span>`;
      } else if (master.status === "cancelled") {
        statusBadge = ` <span style="display:inline-block;font-size:9px;background:#FEE2E2;color:#991b1b;padding:1px 5px;border-radius:4px;font-weight:700;vertical-align:middle;">❌ 취소</span>`;
      }
      return {name: master.name, sub: master.org || sp.sub || "", status: master.status, isOrphan: false, statusBadge};
    }
    // 이름은 있지만 LOP에 없음 → 미등록 경고
    return {name: sp.name, sub: sp.sub || "", isOrphan: true, statusBadge: ""};
  }
  return {name: "?", sub: "", isOrphan: false, statusBadge: ""};
}

// ── Agenda → LOP 역방향 동기화 ────────────────────────
// SP[i]에 sessions 배열 추가: [{title, time, rowId}]
function buildSpSessionMap() {
  const sessionMap = new Map(); // spId → [{title, time, rowId}]
  const rows = AGENDA_ROWS || parseAgendaToRows(AGENDA_HTML);
  rows.forEach(r => {
    if (r.type !== "row" || !r.speakers) return;
    r.speakers.forEach(sp => {
      if (!sp.spId) {
        // 이름으로 자동 매칭 시도
        if (sp.name) {
          const norm = normalizeSpName(sp.name);
          const master = SP.find(s => normalizeSpName(s.name) === norm);
          if (master) sp.spId = master.id;
        }
      }
      if (sp.spId) {
        if (!sessionMap.has(sp.spId)) sessionMap.set(sp.spId, []);
        sessionMap.get(sp.spId).push({
          title: r.title || "",
          time: r.time || "",
          rowId: r.id,
          rowType: r.rowType || "normal"
        });
      }
    });
  });
  return sessionMap;
}

// 호출 시점: Agenda 변경 후 / LOP 페이지 그리기 전
function refreshSpSessions() {
  const sessionMap = buildSpSessionMap();
  SP.forEach(s => {
    const sessions = sessionMap.get(s.id) || [];
    s.agendaSessions = sessions;  // [{title, time, rowId, rowType}]
  });
}

function rowsToAgendaHtml(rows) {
  return rows.map(r => {
    if (r.type === "header") return `<div class="ag-header">${r.html}</div>`;
    if (r.type === "section") {
      const chairPart = r.chair ? ` &nbsp;·&nbsp; Chaired by ${esc(r.chair)}` : "";
      return `<div class="ag-section-label">${esc(r.label)}${chairPart}</div>`;
    }
    if (r.type === "row") {
      const cls = `ag-row${r.rowType==="special"?" special":r.rowType==="keynote"?" keynote":""}`;
      return `<div class="${cls}"><span class="ag-time">${esc(r.time)}</span><span class="ag-prog">${esc(r.title)}</span><span class="ag-spk">${speakersToHtml(r.speakers)}</span></div>`;
    }
    return "";
  }).join("\n") + `<div style="font-size:11px;color:#94a3b8;text-align:center;padding:12px 0;font-style:italic;">* This agenda is subject to change.</div>`;
}

function ensureAgendaRows() {
  if (!AGENDA_ROWS || AGENDA_ROWS.length === 0) {
    AGENDA_ROWS = parseAgendaToRows(AGENDA_HTML);
  }
}

// 연사 자동 동기화: Agenda에 있는 연사 이름을 SP에 자동 추가
function syncSpeakersFromAgenda() {
  ensureAgendaRows();
  const found = new Map(); // name -> {name, sub, sessions:[]}
  AGENDA_ROWS.forEach(r => {
    if (r.type !== "row" || !r.speakers?.length) return;
    r.speakers.forEach(sp => {
      let name = sp.name.trim();
      // "TBC" 또는 "TBC (Org)" 등은 건너뜀
      if (/^TBC/i.test(name)) return;
      // 이름 정리
      name = name.replace(/\s*[–-]\s*TBC.*$/, "").trim();
      if (name.length < 2) return;
      if (!found.has(name)) {
        found.set(name, {name, sub:sp.sub||"", sessions:[]});
      }
      // 세션 정보 추출 (가장 가까운 section-label)
    });
  });
  const existingNames = new Set(SP.map(s => s.name.toLowerCase()));
  const added = [];
  const updated = [];
  found.forEach((info, name) => {
    if (existingNames.has(name.toLowerCase())) {
      // 이미 존재 — 업데이트 안 함 (기존 데이터 보존)
      return;
    }
    // 새 연사 추가
    SP.push({
      id: nextSpId(),
      name,
      org: info.sub || "",
      role: "발표",
      session: "",
      status: "pending",
      travel: "국내"
    });
    added.push(name);
  });
  // Agenda에 없는 SP는 표시만 (자동 삭제 안 함)
  const agendaNames = new Set([...found.keys()].map(n => n.toLowerCase()));
  const orphans = SP.filter(s => !agendaNames.has(s.name.toLowerCase())).map(s => s.name);
  return {added, orphans};
}

function pageAgenda() {
  ensureAgendaRows();

  // ── 정합성 체크: Agenda에 있지만 LOP에 없는 연사 찾기 ────
  const orphans = []; // [{name, sub, rowId, rowTitle, spIdx}]
  let autoBoundCount = 0;
  AGENDA_ROWS.forEach(r => {
    if (r.type !== "row" || !r.speakers) return;
    r.speakers.forEach((sp, idx) => {
      if (sp.spId) {
        // spId가 있는데 LOP에서 삭제된 경우 → orphan
        const master = SP.find(s => s.id === sp.spId);
        if (!master) orphans.push({name: sp.name||"(삭제됨)", sub: sp.sub, rowId: r.id, rowTitle: r.title, spIdx: idx, reason: "삭제됨"});
      } else if (sp.name) {
        // 이름으로 LOP 검색
        const norm = normalizeSpName(sp.name);
        const master = SP.find(s => normalizeSpName(s.name) === norm);
        if (master) {
          // 자동 ID 바인딩
          sp.spId = master.id;
          autoBoundCount++;
        } else {
          orphans.push({name: sp.name, sub: sp.sub, rowId: r.id, rowTitle: r.title, spIdx: idx, reason: "미등록"});
        }
      }
    });
  });
  if (autoBoundCount > 0) {
    AGENDA_HTML = rowsToAgendaHtml(AGENDA_ROWS);
    refreshSpSessions();
    scheduleSave();
  }

  // 전체 연사 수 집계 (Agenda에 등장 — 발표자 + 좌장 모두 포함, 중복 제거)
  const uniqueSpeakerKeys = new Set();
  AGENDA_ROWS.forEach(r => {
    // 1) 발표자 (row 안의 speakers)
    if (r.type === "row" && r.speakers) {

      });

                </select>

              <input class="ag-sp-name" type="text" value="${esc(sp.name||'')}" placeholder="이름 (LOP 미등록 시 직접 입력)" style="display:${sp.spId?'none':'block'};" data-original-name="${esc(sp.name||'')}">
              <input class="ag-sp-sub" type="text" value="${esc(sp.sub||(master?master.org:'')||'')}" placeholder="소속/직책 (자동 채워짐)" ${sp.spId?'readonly':''} style="background:${sp.spId?'#F8FAFC':'#fff'};color:${sp.spId?'#64748b':'#0B1D3F'};">

            </div>`;
            }).join("")}

          <button onclick="addSpeakerRow()" style="margin-top:5px;padding:4px 12px;border-radius:7px;border:1.5px dashed #BBF7D0;background:#F0FDF4;color:#16a34a;cursor:pointer;font-size:11px;font-weight:600;">＋ 연사 추가</button>
          <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:12px;">
            <button onclick="saveAgendaRow('${r.id}')" class="btn btn-p btn-sm">저장</button>
            <button onclick="cancelAgendaEdit()" class="btn btn-g btn-sm">취소</button>
          </div>
        </div>`;
      }
      const cls = `ag-row${r.rowType==="special"?" special":r.rowType==="keynote"?" keynote":""}`;
      return `<div class="${cls}">
        <span class="ag-time">${esc(r.time)}</span>
        <span class="ag-prog">${esc(r.title)}</span>
        <span class="ag-spk">${speakersToHtml(r.speakers)}</span>
        ${editMode ? `<span class="ag-edit-btns">
          <button class="ag-edit-btn" onclick="editAgendaRow('${r.id}')">✏️</button>
          <button class="ag-edit-btn" onclick="deleteAgendaRow('${r.id}')">🗑</button>
        </span>` : ""}
      </div>`;
    }
    return "";
  }).join("\n");
}

window.updateAgenda = function(event) {
  const file = event.target.files[0];
  if (!file) return;
  const loadEl = document.getElementById("agenda-loading");
  if(loadEl) loadEl.style.display = "block";
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      if (typeof mammoth === "undefined") throw new Error("mammoth.js 라이브러리 로드 실패.");
      const result = await mammoth.convertToHtml({arrayBuffer: e.target.result});
      const parsed = buildAgendaView(result.value, file.name);
      AGENDA_HTML = parsed;
      AGENDA_ROWS = parseAgendaToRows(AGENDA_HTML);
      const now = new Date().toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
      AGENDA_META = {updatedAt:now, fileName:file.name};
      // 자동 동기화: Agenda → 참석자 관리
      const syncResult = syncAgendaToSP({silent: true});
      await saveToFirestore();
      draw();
      // 동기화 결과 안내
      if (syncResult.added > 0 || syncResult.updated > 0) {
        setTimeout(() => {
          alert(`📥 Agenda 가져오기 완료\n\n참석자 관리 자동 동기화:\n• 신규 연사 추가: ${syncResult.added}명\n• 정보 보강: ${syncResult.updated}명`);
        }, 200);
      }
    } catch(err) {
      alert("파일 파싱 오류: " + err.message);
      if(loadEl) loadEl.style.display = "none";
    }
  };
  reader.readAsArrayBuffer(file);
  event.target.value = "";
};

window.saveAgendaRow = (id) => {
  const row = AGENDA_ROWS.find(r => r.id === id);
  if (!row) return;
  if (row.type === "section") {
    const lbl = document.getElementById("ag-edit-label")?.value.trim();
    const chair = document.getElementById("ag-edit-chair")?.value.trim();
    if (lbl) row.label = lbl;
    row.chair = chair || "";
  } else if (row.type === "row") {
    row.time = document.getElementById("ag-edit-time")?.value.trim() || "";
    row.title = document.getElementById("ag-edit-title")?.value.trim() || "";
    row.rowType = document.getElementById("ag-edit-rowtype")?.value || "normal";
    const speakerEls = document.querySelectorAll("#ag-speaker-list > div");
    row.speakers = Array.from(speakerEls).map(div => {
      const selectEl = div.querySelector(".ag-sp-select");
      const spId = selectEl ? selectEl.value : "";
      const nameInput = div.querySelector(".ag-sp-name")?.value.trim() || "";
      const subInput = div.querySelector(".ag-sp-sub")?.value.trim() || "";
      if (spId) {
        // LOP 마스터에 바인딩된 연사
        const master = SP.find(s => String(s.id) === String(spId));
        return {
          spId: master ? master.id : null,
          name: master ? master.name : nameInput,
          sub: subInput || (master ? master.org : "")
        };
      }
      // 자유 입력: 이름으로 자동 매칭 시도
      if (nameInput) {
        const norm = normalizeSpName(nameInput);
        const master = SP.find(s => normalizeSpName(s.name) === norm);
        if (master) return {spId: master.id, name: master.name, sub: subInput || master.org};
        return {name: nameInput, sub: subInput};
      }
      return null;
    }).filter(sp => sp && (sp.spId || sp.name));
  }
  AGENDA_HTML = rowsToAgendaHtml(AGENDA_ROWS);
  window._agEditingId = null;
  refreshSpSessions(); // ⭐ Agenda → LOP 역동기화
  scheduleSave();
};

  const sp = row.speakers[spIdx];

  if (!master) {
    master = {
      id: nextSpId(),
      name: sp.name,
      org: sp.sub || "",

function buildAgendaView(html, fileName) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html;
  const allRows = tmp.querySelectorAll("tr");
  if (allRows.length === 0) return `<div style="padding:20px;font-size:13px;line-height:1.7;">${html}</div>`;

  const timeRe = /^\s*\d{1,2}\s*[:\.]\s*\d{2}/;
  let out = `<div class="ag-header">
    <div style="font-size:11px;color:#64748b;font-weight:700;letter-spacing:.08em;margin-bottom:4px;">KDCA · IVI · EuBiologics · RIGHT Foundation</div>
    <div style="font-size:20px;font-weight:900;color:#0B1D3F;margin-bottom:4px;">2026 Global Vaccine Forum</div>
    <div style="font-size:12px;color:#475569;font-style:italic;margin-bottom:6px;">Strategic Partnerships for Next-Generation Vaccines</div>
    <div style="font-size:12px;color:#64748b;">📅 25 June 2026 &nbsp;·&nbsp; 🏛 Royal Hall (3F), Peace &amp; Park Convention, Seoul</div>
    <div style="font-size:10px;color:#94a3b8;margin-top:6px;">업데이트: ${esc(fileName)}</div>
  </div>`;

  // 텍스트 추출 헬퍼: 분리된 DOM에서도 안정적
  const getText = (el) => {
    if (!el) return "";
    let t = (el.textContent || "").replace(/\u00A0/g, " ").replace(/\s+/g, " ").trim();
    return t;
  };

  let pendingChair = "";
  let lastSectionIdx = -1;
  const outBuffer = [];

  allRows.forEach((row) => {
    const cells = Array.from(row.querySelectorAll("td,th"));
    if (cells.length === 0) return;

    // 셀 정보 추출 (textContent 사용 — 분리된 DOM에서 안정적)
    const cellInfo = cells.map(c => {
      const colspan = parseInt(c.getAttribute("colspan") || "1");
      const text = getText(c);
      const innerHtml = c.innerHTML || "";
      return { colspan, text, innerHtml };
    });

    // 빈 행 스킵
    if (cellInfo.every(c => !c.text)) return;

    // 헤더 행 스킵 (Time / Program / Speaker 등)
    const joined = cellInfo.map(c => c.text).join(" ").toLowerCase();
    if (/^\s*time\s+program\s+speakers?\s*$/.test(joined)) return;
    if (/^\s*time\s*$/.test(joined) && cellInfo.length === 1) return;

    // 시간 칸 찾기
    let timeCellIdx = -1;
    for (let i = 0; i < cellInfo.length; i++) {
      if (timeRe.test(cellInfo[i].text)) { timeCellIdx = i; break; }
    }

    // ─────────────────────────────────────────────────
    // CASE 1: 시간 있음
    // ─────────────────────────────────────────────────
    if (timeCellIdx !== -1) {
      const time = cellInfo[timeCellIdx].text.replace(/[-]/g, "–"); // 하이픈 → en dash
      const restCells = cellInfo.slice(timeCellIdx + 1);

      // 빈 셀 제외하지 않고 위치별로 처리
      let title = "", speakersHtml = "";

      if (restCells.length === 0) return;

      if (restCells.length === 1) {
        // 시간 + 1셀 (병합) — 휴식/이벤트 행
        title = restCells[0].text;
      } else {
        // 시간 + 2셀 이상 — 제목 + 연사
        title = restCells[0].text;
        // 연사는 두 번째 셀의 HTML
        speakersHtml = cleanSpeakerHtml(restCells[1].innerHtml);
        // 만약 두 번째 셀이 비어있고 세 번째에 내용이 있으면 거기서
        if (!speakersHtml && restCells[2]) {
          speakersHtml = cleanSpeakerHtml(restCells[2].innerHtml);
        }
      }

      if (!title && !speakersHtml) return;

      const checkText = title + " " + (speakersHtml || "");
      const isBreak = /^(\s*)(break|lunch|reception|coffee|registration|group\s*photo|cocktail|휴식)/i.test(title.trim())
                   || /break|lunch|reception|coffee\s*break|group\s*photo|registration|cocktail/i.test(title);
      const isKey  = false; // keynote 자동 스타일 비활성화 (사용자가 직접 편집 모드에서 지정)

      const cls = `ag-row${isBreak?" special":isKey?" keynote":""}`;
      outBuffer.push({
        kind: "row",
        html: `<div class="${cls}">
          <span class="ag-time">${esc(time)}</span>
          <span class="ag-prog">${esc(title)}</span>
          <span class="ag-spk">${speakersHtml}</span>
        </div>`
      });
      return;
    }

    // ─────────────────────────────────────────────────
    // CASE 2: 시간 없음 — 섹션 라벨 또는 좌장
    // ─────────────────────────────────────────────────
    // 모든 셀 텍스트 결합
    const combined = cellInfo.map(c => c.text).filter(t => t).join(" ").replace(/\s+/g, " ").trim();
    if (combined.length < 2) return;

    // 좌장만 있는 별도 행 (예: "Chaired by TBC")
    const chairOnlyMatch = combined.match(/^\s*(?:Chaired by|좌장[\s:：]*)\s*(.+)$/i);
    if (chairOnlyMatch) {
      const chair = chairOnlyMatch[1].trim();
      if (lastSectionIdx >= 0) {
        const prev = outBuffer[lastSectionIdx];
        if (!prev.html.includes("Chaired by")) {
          prev.html = prev.html.replace(
            /<\/div>$/,
            ` &nbsp;·&nbsp; <span style="font-weight:600;color:#475569;text-transform:none;letter-spacing:0;">Chaired by ${esc(chair)}</span></div>`
          );
        }
      } else {
        pendingChair = chair;
      }
      return;
    }

    // 섹션 + 좌장이 한 셀에 있는 경우 (예: "Title Chaired by Name")
    let label = combined, chair = "";
    // "Chaired by" 위치 찾기 (대소문자 무시)
    const chairIdx = combined.search(/\s*(?:Chaired by|좌장)/i);
    if (chairIdx >= 0) {
      label = combined.slice(0, chairIdx).trim().replace(/[·•∙‧\-—]\s*$/, "").trim();
      // "Chaired by " 이후 부분 추출
      const afterChair = combined.slice(chairIdx).match(/(?:Chaired by|좌장[\s:：]*)\s*(.+)$/i);
      if (afterChair) chair = afterChair[1].trim();
    } else if (pendingChair) {
      chair = pendingChair;
      pendingChair = "";
    }

    const chairPart = chair
      ? ` &nbsp;·&nbsp; <span style="font-weight:600;color:#475569;text-transform:none;letter-spacing:0;">Chaired by ${esc(chair)}</span>`
      : "";

    lastSectionIdx = outBuffer.length;
    outBuffer.push({
      kind: "section",
      html: `<div class="ag-section-label">${esc(label)}${chairPart}</div>`
    });
  });

  out += outBuffer.map(b => b.html).join("\n");
  out += `<div style="font-size:11px;color:#94a3b8;text-align:center;padding:12px 0;font-style:italic;">* Subject to change.</div>`;
  return out;
}

// 연사 HTML 정리: textContent 기반으로 안정적 동작
function cleanSpeakerHtml(html) {
  if (!html || !html.trim()) return "";
  const tmp = document.createElement("div");
  tmp.innerHTML = html;

  // 1. 모든 속성 제거
  tmp.querySelectorAll("*").forEach(el => {
    while (el.attributes.length > 0) el.removeAttribute(el.attributes[0].name);
  });

  // 2. 빈 태그 제거
  tmp.querySelectorAll("strong, em, b, i").forEach(el => {
    if (!el.textContent.trim()) el.remove();
  });

  // 3. <p> 태그를 줄바꿈으로 변환
  const ps = Array.from(tmp.querySelectorAll("p"));
  ps.forEach((p, i) => {
    const html = p.innerHTML.trim();
    if (i > 0 && html) {
      p.outerHTML = "<br>" + html;
    } else {
      p.outerHTML = html;
    }
  });

  // 4. 정리
  let result = tmp.innerHTML
    .replace(/&nbsp;/g, " ")
    .replace(/\s+/g, " ")
    .replace(/<br\s*\/?>\s*<br\s*\/?>/g, "<br>")
    .replace(/^(\s|<br\s*\/?>)+/, "")
    .replace(/(\s|<br\s*\/?>)+$/, "")
    .trim();

  if (!result) return "";

  // 5. 라인별로 분리해서 첫 줄=이름(strong), 나머지=직책/소속(em)
  const lines = result.split(/<br\s*\/?>/).map(l => l.trim()).filter(l => l);
  if (lines.length === 0) return "";

  const formatted = lines.map((line, i) => {
    // 이미 <strong>이 있는 라인은 그대로
    if (/<strong>/i.test(line)) return line;
    // 첫 줄 = 이름
    if (i === 0) {
      // <em>이 있으면 그 앞까지만 strong으로 감싸기
      const emMatch = line.match(/^([^<]+?)\s*<em>/);
      if (emMatch) {
        return line.replace(/^([^<]+?)(\s*<em>)/, `<strong>$1</strong>$2`);
      }
      return `<strong>${line}</strong>`;
    }
    // 나머지 줄 = 직책/소속
    if (/<em>/i.test(line)) return line;
    return `<em>${line}</em>`;
  });

  return formatted.join("<br>");
}

function getAgendaSessions(nameOrSp) {
  // ID 기반 우선 - SP 객체를 받았으면 agendaSessions 반환
  if (typeof nameOrSp === "object" && nameOrSp.agendaSessions) {
    return nameOrSp.agendaSessions.map(s => ({time: s.time, prog: s.title}));
  }
  // SP 객체에 id가 있으면 그 ID로 매칭
  const targetSp = (typeof nameOrSp === "object") ? nameOrSp : SP.find(s => s.name === nameOrSp);
  if (targetSp) {
    refreshSpSessions(); // 최신 데이터
    const updated = SP.find(s => s.id === targetSp.id);
    if (updated?.agendaSessions) return updated.agendaSessions.map(s => ({time: s.time, prog: s.title}));
  }
  // Fallback: 이름 문자열 기반 (기존 호환성)
  const name = (typeof nameOrSp === "string") ? nameOrSp : (nameOrSp.name || "");
  const tmp = document.createElement("div");
  tmp.innerHTML = AGENDA_HTML;
  const rows = tmp.querySelectorAll(".ag-row:not(.special)");
  const matched = [];
  const firstName = name.split(" ")[0];
  rows.forEach(row => {
    const spk = row.querySelector(".ag-spk");
    const prog = row.querySelector(".ag-prog");
    const time = row.querySelector(".ag-time");
    if(spk && prog && time) {
      const spkText = spk.textContent||"";
      if(spkText.includes(firstName) || spkText.includes(name)) {
        matched.push({time: time.textContent.trim(), prog: prog.textContent.trim()});
      }
    }
  });
  return matched;
}

    const obj = {_rowIndex: i + 2};
    headers.forEach((h, j) =&gt; { obj[h] = row[j]; });
    return obj;
  });
  return ContentService
    .createTextOutput(JSON.stringify({rows, headers, total: rows.length}))
    .setMimeType(ContentService.MimeType.JSON);
}</span></div>

    if (bIdx !== undefined) return 1;

function getSpFiles(spId) {
  try { return JSON.parse(localStorage.getItem("gvf2026_spf_"+spId)||"[]"); }
  catch { return []; }
}
function saveSpFiles(spId, files) { localStorage.setItem("gvf2026_spf_"+spId, JSON.stringify(files)); }

window.downloadSpFile = (fid, spId) => {
  const data = localStorage.getItem("gvf2026_sfd_"+fid);
  if(!data) return alert("파일을 찾을 수 없습니다.");
  let name = "파일";
  getSpFiles(spId).forEach(f=>{ if(f.id===fid) name=f.name; });
  const a = document.createElement("a"); a.href=data; a.download=name; a.click();
};
window.deleteSpFile = (spId, fid) => {
  localStorage.removeItem("gvf2026_sfd_"+fid);
  saveSpFiles(spId, getSpFiles(spId).filter(f=>f.id!==fid));
  scheduleSave(); draw();
};
window.uploadSpFile = (spId, cat, event) => {
  const files = Array.from(event.target.files);
  if(!files.length) return;
  const stored = getSpFiles(spId);
  let done = 0;
  files.forEach(file => {
    if(file.size > 4.5*1024*1024) { alert(file.name + " 파일이 너무 큽니다"); done++; return; }
    const reader = new FileReader();
    reader.onload = e => {
      const fid = "sf_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);
      const now = new Date().toLocaleDateString("ko-KR",{month:"numeric",day:"numeric"});
      localStorage.setItem("gvf2026_sfd_"+fid, e.target.result);
      stored.push({id:fid, name:file.name, type:file.type, size:file.size, date:now, cat});
      done++;
      if(done===files.length) { saveSpFiles(spId, stored); scheduleSave(); draw(); }
    };
    reader.readAsDataURL(file);
  });
  event.target.value="";
};

function pageBudget() {
  // ── 새 예산 로직 (기획안 기준) ───────────────────────
  // 1) 기준 총 예산: 80,000,000원 고정
  // 2) 편성 예산: BUDGET_ITEMS 합계
  // 3) 잔여 예산: 기준 총 예산 - 편성 예산
  // 4) 실지출: 지급 완료(paid)된 항목만 누적
  //    - 항공·숙박: TRAVEL_PAID의 4개 카테고리(flight/hotel/trans/misc) 별 토글 ON 시 누적
  //    - 그 외: BUDGET_ITEMS[i].paid === true 이면 해당 항목의 budget 전체를 실지출로 간주
  const BASE_BUDGET = 80000000;
  // 항공·숙박: 카테고리별 합계
  const travelByCat = {
    flight: TRAVEL_DETAIL.reduce((s,t)=>s+(Number(t.flight)||0),0),
    hotel:  TRAVEL_DETAIL.reduce((s,t)=>s+(Number(t.hotel)||0),0),
    trans:  TRAVEL_DETAIL.reduce((s,t)=>s+(Number(t.trans)||0),0),
    misc:   TRAVEL_DETAIL.reduce((s,t)=>s+(Number(t.misc)||0),0),
  };
  const travelTotal = travelByCat.flight + travelByCat.hotel + travelByCat.trans + travelByCat.misc;
  // 항공·숙박 실지출 = 토글 ON 카테고리 합
  const travelPaidTotal = (TRAVEL_PAID.flight?travelByCat.flight:0)
                        + (TRAVEL_PAID.hotel?travelByCat.hotel:0)
                        + (TRAVEL_PAID.trans?travelByCat.trans:0)
                        + (TRAVEL_PAID.misc?travelByCat.misc:0);
  // ── 세부 지출 내역 합계 자동 계산 (항목별) ────────────
  // 항공·숙박(b1): TRAVEL_DETAIL 합계
  // 그 외: BUDGET_ENTRIES 합계 (해당 항목의 모든 지출 내역)
  const entriesByItem = {};
  BUDGET_ENTRIES.forEach(e => {
    entriesByItem[e.budgetId] = (entriesByItem[e.budgetId] || 0) + (Number(e.amount) || 0);
  });

  // 항목별 budget을 세부 내역 합계로 자동 갱신 (수동 입력 budget을 덮어씀)
  const items = BUDGET_ITEMS.map(i => {
    let autoBudget;
    if (i.id === "b1") {
      // 항공·숙박: TRAVEL_DETAIL 합계
      autoBudget = travelTotal;
    } else if (entriesByItem[i.id] !== undefined && entriesByItem[i.id] > 0) {
      // 세부 내역이 있으면 그 합계
      autoBudget = entriesByItem[i.id];
    } else {
      // 세부 내역이 없으면 수동 입력값 유지
      autoBudget = Number(i.budget) || 0;
    }
    return {
      ...i,
      budget: autoBudget,
      manualBudget: Number(i.budget) || 0, // 원래 수동 입력값 (편집 시 사용)
      hasEntries: !!entriesByItem[i.id] || i.id === "b1",
      actual: i.id === "b1" ? travelPaidTotal : (i.paid ? autoBudget : 0)
    };
  });
  const allocatedBudget = items.reduce((s,i)=>s+i.budget,0);
  const totalActual = items.reduce((s,i)=>s+i.actual,0);
  const remainingByAllocation = BASE_BUDGET - allocatedBudget;
  const remainingByActual = BASE_BUDGET - totalActual;
  const allocPct = BASE_BUDGET>0?Math.min(100,Math.round((allocatedBudget/BASE_BUDGET)*100)):0;
  const actualPct = BASE_BUDGET>0?Math.min(100,Math.round((totalActual/BASE_BUDGET)*100)):0;
  const trvEditId    = window._travelEditId||null;

  let html = `

  </div>

      ${remainingByAllocation>0?`<div title="미편성 잔액: ${krw(remainingByAllocation)}" style="flex:${remainingByAllocation};background:#E2E8F0;display:flex;align-items:center;justify-content:center;"><span style="font-size:10px;font-weight:700;color:#94a3b8;white-space:nowrap;">미편성</span></div>`:""}

function toggleVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert("이 브라우저는 음성 인식을 지원하지 않습니다. Chrome을 사용해 주세요."); return; }
  if (magicListening) { magicRecog?.stop(); return; }
  const r = new SR();
  r.lang = "ko-KR"; r.continuous = true; r.interimResults = true;
  magicRecog = r;
  r.onstart = () => {
    magicListening = true;
    const btn = document.getElementById("voice-btn"), st = document.getElementById("voice-status");
    if(btn){btn.textContent="⏹ 녹음 중지";btn.style.background="linear-gradient(135deg,#ef4444,#dc2626)";}
    if(st){st.style.display="block";st.textContent="🎙 듣고 있습니다";st.style.color="#7c3aed";st.style.background="#faf5ff";}
  };
  r.onresult = e => {
    let fin="";
    for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)fin+=e.results[i][0].transcript;}
    const ta=document.getElementById("magic-input");
    if(fin&&ta){ta.value=(ta.value?ta.value+" ":"")+fin;magicText=ta.value;}
  };
  r.onerror = e => {
    magicListening = false;
    const st=document.getElementById("voice-status"),btn=document.getElementById("voice-btn");
    if(e.error==="not-allowed"&&st){st.textContent="⚠️ 마이크 권한이 필요합니다";st.style.color="#991b1b";st.style.background="#FEF2F2";}
    if(btn){btn.textContent="🎙 음성으로 입력";btn.style.background="linear-gradient(135deg,#7c3aed,#6d28d9)";}
  };
  r.onend = () => {
    magicListening = false;
    const btn=document.getElementById("voice-btn"),st=document.getElementById("voice-status"),ta=document.getElementById("magic-input");
    if(btn){btn.textContent="🎙 음성으로 입력";btn.style.background="linear-gradient(135deg,#7c3aed,#6d28d9)";}

  };
  r.start();
}

async function runMagic() {
  const ta = document.getElementById("magic-input");
  const txt = ta ? ta.value.trim() : magicText.trim();
  if(!txt) return;
  magicText = txt;
  const resEl = document.getElementById("magic-result");
  if(resEl) resEl.innerHTML = `<div class="card" style="text-align:center;color:#64748b;padding:20px;">🔍 명령 분석 중...</div>`;
  await new Promise(r => setTimeout(r, 250));

  // 명령을 줄 단위로 분리 (한 입력에 여러 명령 가능)
  const lines = txt.split(/\n+/).map(l => l.trim()).filter(l => l.length >= 2);
  const blocks = lines.length === 0 ? [txt] : lines;

  const changes = [];
  const ignored = [];

  // 상태 키워드
  const RX_CONFIRM = /(확정|완료|확인됨|컨펌|승낙|수락|동의|승인|체결|예약\s*완료|예약완료|확정됐|확정되|확정함|성공|booked|confirmed|approved|done\b|complete\b)/i;
  const RX_CANCEL  = /(취소|거절|불참|못함|불가|안\s*된|cancel|declined)/i;
  const RX_PENDING = /(대기|TBC|미확정|검토|보류|pending|TBD)/i;
  const RX_DONE    = /(완료|끝|완성|발송\s*완료|발송완료|체결|계약\s*완료|계약완료|반영|확정|발주\s*완료|발주완료|done\b|complete\b|sent|booked|finished)/i;

  blocks.forEach(block => {
    if (handleRename(block, changes)) return;
    if (handleBudget(block, changes)) return;
    if (handleTodo(block, changes)) return;
    if (handleChecklistAdd(block, changes)) return;
    if (handleSpeakerStatus(block, changes, {RX_CONFIRM, RX_CANCEL, RX_PENDING})) return;
    if (handleChecklistDone(block, changes, RX_DONE)) return;
    ignored.push(block);
  });

  // 변경사항 일괄 적용
  applyChanges(changes);
  if (changes.length > 0) scheduleSave();

  // 결과 표시
  renderMagicResult(resEl, changes, ignored);
}

// 명령 처리 함수들

// 1. 연사 이름 변경: "A를 B로 변경" / "A → B" / "Change A to B"
function handleRename(text, changes) {
  const patterns = [
    /([A-Za-z가-힣][A-Za-z가-힣\.\s\-]{1,40}?)\s*(?:을|를|→|->)\s*([A-Za-z가-힣][A-Za-z가-힣\.\s\-]{1,40}?)\s*(?:으?로\s*)?(?:변경|교체|대체|바꿔|바꿈|수정|대신)/i,
    /(?:change|replace|rename)\s+([A-Za-z가-힣][A-Za-z가-힣\.\s\-]{1,40}?)\s+(?:to|with|by)\s+([A-Za-z가-힣][A-Za-z가-힣\.\s\-]{1,40})/i,
  ];
  for (const re of patterns) {
    const m = text.match(re);
    if (!m) continue;
    let oldName = m[1].trim().replace(/\s+(대기|확정|취소|연사|발표자)$/g, '').trim();
    let newName = m[2].trim().replace(/^(대기|확정|취소|연사|발표자)\s+/g, '').trim();
    if (!oldName || !newName || oldName.length < 2 || newName.length < 2) continue;
    const oldTokens = oldName.split(/\s+/).filter(t => t.length >= 2);
    const target = SP.find(s => {
      const matched = oldTokens.filter(t => s.name.includes(t));
      if (oldTokens.length === 1) return s.name === oldTokens[0] || s.name.includes(oldTokens[0]);
      return matched.length >= Math.ceil(oldTokens.length / 2) && matched.length >= 2;
    });
    if (!target) { changes.push({kind:"error", text, reason:`"${oldName}" 연사를 찾을 수 없습니다`}); return true; }
    changes.push({kind:"rename", id:target.id, oldName:target.name, newName});
    return true;
  }
  return false;
}

// 2. 예산 지출 등록: "행사장에 500만원" / "사례비 200만원 추가"
function handleBudget(text, changes) {
  // 금액 패턴: "₩500만원", "500만", "5,000,000원", "5000000"
  const amtMatch = text.match(/(?:₩\s*)?(\d{1,3}(?:[,_]\d{3})+|\d+)\s*(만원|만|억|원|KRW)?/i);
  if (!amtMatch) return false;
  let amount = parseInt(amtMatch[1].replace(/[,_]/g, ""));
  const unit = (amtMatch[2] || "").trim();
  if (/만원|만/i.test(unit)) amount *= 10000;
  if (/억/i.test(unit)) amount *= 100000000;
  if (amount < 1000) return false; // 너무 작으면 예산이 아님

  // 어느 항목인지 찾기
  const itemKw = BUDGET_ITEMS.find(b => text.includes(b.label));
  if (!itemKw) return false;

  // 내역 추출 (괄호 안 또는 키워드 뒤)
  const descMatch = text.match(/\(([^)]+)\)/);
  const desc = descMatch ? descMatch[1].trim() : `${itemKw.label} 지출`;
  const today = new Date().toLocaleDateString("ko-KR",{year:"2-digit",month:"2-digit",day:"2-digit"});

  changes.push({
    kind: "budget",
    budgetId: itemKw.id,
    budgetLabel: itemKw.label,
    desc,
    amount,
    date: today
  });
  return true;
}

// 3. To-do 추가: "내일 10시 미팅" / "오늘 14시 ABC 약속"
function handleTodo(text, changes) {
  const todoKw = /(미팅|약속|회의|todo|to-do|할\s*일|일정|콜)/i;
  if (!todoKw.test(text)) return false;

  // 날짜 결정
  let date = new Date();
  if (/내일|tomorrow/i.test(text)) date.setDate(date.getDate() + 1);
  else if (/모레/i.test(text)) date.setDate(date.getDate() + 2);
  else if (/오늘|today/i.test(text)) {}
  else {
    // "5월 20일", "6/15" 같은 명시적 날짜
    const dM = text.match(/(\d{1,2})\s*[월\/.\-]\s*(\d{1,2})/);
    if (dM) {
      const y = new Date().getFullYear();
      const m = parseInt(dM[1]) - 1, d = parseInt(dM[2]);
      date = new Date(y, m, d);
    }
  }
  const ds = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;

  // 시간 추출 ("10시", "오전 10시", "14:00", "오후 2시")
  let time = "";
  const tM = text.match(/(?:(오전|오후|AM|PM)\s*)?(\d{1,2})\s*[시:](\s*\d{1,2}\s*분?)?/i);
  if (tM) {
    let h = parseInt(tM[2]);
    const min = tM[3] ? parseInt(tM[3].replace(/\D/g,"")) : 0;
    const ap = (tM[1] || "").toLowerCase();
    if ((ap === "오후" || ap === "pm") && h < 12) h += 12;
    if ((ap === "오전" || ap === "am") && h === 12) h = 0;
    time = `${String(h).padStart(2,"0")}:${String(min).padStart(2,"0")}`;
  }

  // 할 일 텍스트 (시간/날짜 관련 단어 제거)
  let task = text
    .replace(/(내일|모레|오늘|tomorrow|today)/gi, "")
    .replace(/(\d{1,2}\s*[월\/.\-]\s*\d{1,2}일?)/g, "")
    .replace(/(오전|오후|AM|PM)?\s*\d{1,2}\s*[시:]\s*(\d{1,2}\s*분?)?/gi, "")
    .replace(/에\s+추가|추가해\s*줘|추가/g, "")
    .replace(/^\s*[,·\-—]+|[,·\-—]+\s*$/g, "")
    .trim();
  if (!task) task = "미팅";

  changes.push({kind:"todo", date:ds, time, task});
  return true;
}

// 4. 체크리스트 추가: "Logistics에 X 추가" / "장소 준비에 Y 등록"
function handleChecklistAdd(text, changes) {
  if (!/(추가|등록|만들어|새로운\s*항목)/i.test(text)) return false;
  // 카테고리 찾기
  const cat = CATS.find(c => text.includes(c));
  if (!cat) return false;
  // 작업 내용 추출
  let task = text
    .replace(new RegExp(cat + "\\s*에?\\s*", "g"), "")
    .replace(/체크리스트|항목|준비/g, "")
    .replace(/(추가해\s*줘|추가|등록해\s*줘|등록|만들어\s*줘|만들어)/g, "")
    .replace(/^\s*[,·\-—]+|[,·\-—]+\s*$/g, "")
    .trim();
  if (!task || task.length < 2) return false;
  changes.push({kind:"checklistAdd", cat, task});
  return true;
}

// 5. 연사 상태 변경
function handleSpeakerStatus(text, changes, {RX_CONFIRM, RX_CANCEL, RX_PENDING}) {
  // 어떤 연사 이름이 있는지 확인
  for (const s of SP) {
    const tokens = s.name.split(/\s+/).filter(t => t.length >= 2);
    const matchedToken = tokens.find(t => text.includes(t));
    if (!matchedToken) continue;
    // 컨텍스트에서 상태 키워드 찾기
    let newStatus = null, kw = "";
    if (RX_CANCEL.test(text))       { newStatus = "cancelled"; kw = RX_CANCEL.exec(text)[0]; }
    else if (RX_CONFIRM.test(text)) { newStatus = "confirmed"; kw = RX_CONFIRM.exec(text)[0]; }
    else if (RX_PENDING.test(text)) { newStatus = "pending";   kw = RX_PENDING.exec(text)[0]; }
    if (!newStatus || newStatus === s.status) continue;
    changes.push({kind:"speaker", id:s.id, name:s.name, oldStatus:s.status, newStatus, kw});
    return true;
  }
  return false;
}

// 6. 체크리스트 완료
function handleChecklistDone(text, changes, RX_DONE) {
  if (!RX_DONE.test(text)) return false;
  const stopWords = /^(및|또는|등|이|가|을|를|에|로|와|과|의|는|은|도|만|에서|에게)$/;
  // 미완료 항목 중 가장 잘 매칭되는 것 찾기
  let bestMatch = null, bestScore = 0, bestKeys = [];
  CL.forEach(t => {
    if (t.done) return;
    const keys = t.task.replace(/[—\-()[\]·✓⚠₩,.\d]+/g, ' ').split(/\s+/).filter(w => w.length >= 2 && !stopWords.test(w));
    const matched = keys.filter(k => text.includes(k));
    if (matched.length > bestScore) {
      bestScore = matched.length;
      bestMatch = t;
      bestKeys = matched;
    }
  });
  if (bestMatch && bestScore >= 2) {
    changes.push({kind:"checklist", id:bestMatch.id, task:bestMatch.task, matched:bestKeys});
    return true;
  }
  return false;
}

// 변경사항 적용
function applyChanges(changes) {
  changes.forEach(c => {
    if (c.kind === "rename")        SP = SP.map(s => s.id===c.id ? {...s, name:c.newName} : s);
    if (c.kind === "speaker")       SP = SP.map(s => s.id===c.id ? {...s, status:c.newStatus} : s);
    if (c.kind === "checklist")     CL = CL.map(t => t.id===c.id ? {...t, done:true} : t);
    if (c.kind === "checklistAdd") {
      const newId = Math.max(0, ...CL.map(t=>typeof t.id==="number"?t.id:0)) + 1;
      CL.push({id:newId, cat:c.cat, task:c.task, done:false, pri:"medium", deadline:""});
    }
    if (c.kind === "budget") {
      const eid = "e_" + Date.now() + "_" + Math.random().toString(36).slice(2,5);
      BUDGET_ENTRIES.push({id:eid, budgetId:c.budgetId, desc:c.desc, amount:c.amount, date:c.date, paid:false});
    }
    if (c.kind === "todo") {
      if (!DAILY_TODOS[c.date]) DAILY_TODOS[c.date] = [];
      const id = "tt_" + Date.now() + "_" + Math.random().toString(36).slice(2,5);
      DAILY_TODOS[c.date].push({id, task:c.task, done:false, time:c.time||""});
      DAILY_TODOS[c.date].sort((a,b) => (a.time||"99:99").localeCompare(b.time||"99:99"));
    }
  });
}

function formatFileSize(bytes) {
  if (!bytes) return "";
  if (bytes < 1024) return bytes + "B";

window.updateMaterialField = (key, field, value) => {
  const M = getMaterials();
  if (!M[key]) M[key] = {status:"준비중", deadline:"", owner:"", notes:"", files:[]};
  M[key][field] = value;
  scheduleSave();
  if (field === "status") draw(); // 상태는 색상 바뀌므로 다시 그림
};

window.uploadMaterialFiles = async (key, e) => {
  const files = Array.from(e.target.files || []);
  if (files.length === 0) return;
  const M = getMaterials();
  if (!M[key]) M[key] = {status:"준비중", deadline:"", owner:"", notes:"", files:[]};
  if (!M[key].files) M[key].files = [];
  for (const f of files) {
    // Base64로 변환해 저장 (5MB 미만 권장)
    if (f.size > 5 * 1024 * 1024) {
      if (!confirm(`"${f.name}" 파일이 5MB를 초과합니다 (${formatFileSize(f.size)}).\nFirebase 저장 한도를 고려해 정말 추가하시겠습니까?`)) continue;
    }
    try {
      const dataUrl = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.onerror = rej;
        r.readAsDataURL(f);
      });
      M[key].files.push({
        name: f.name,
        size: f.size,
        url: dataUrl,
        uploadedAt: Date.now()
      });
    } catch(err) {
      console.error("파일 업로드 실패:", err);
      alert(`"${f.name}" 업로드 실패: ${err.message}`);
    }
  }
  e.target.value = ""; // 같은 파일 재업로드 가능하도록
  scheduleSave();
  draw();
};

window.deleteMaterialFile = (key, idx) => {
  const M = getMaterials();
  if (!M[key] || !M[key].files) return;
  if (!confirm(`"${M[key].files[idx].name}" 파일을 삭제하시겠습니까?`)) return;
  M[key].files.splice(idx, 1);
  scheduleSave();
  draw();
};

// LOP 페이지와 동일한 정렬 순서를 다른 페이지에서도 쓸 수 있도록 함수 추출
function getSpeakersSortedByLOP() {
  // Agenda에 등장하는 순서대로 spId 맵 구성 (ID 우선, 이름 차선)
  const agendaOrderMap = new Map();
  const agendaOrderByName = new Map();
  let agIdx = 0;
  const rows = (window.AGENDA_ROWS || (typeof parseAgendaToRows === "function" ? parseAgendaToRows(AGENDA_HTML) : []));
  (rows||[]).forEach(r => {
    if (r.type === "row" && r.speakers && r.speakers.length > 0) {
      r.speakers.forEach(sp => {
        if (sp.spId && !agendaOrderMap.has(sp.spId)) {
          agendaOrderMap.set(sp.spId, agIdx++);
        } else if (sp.name && !agendaOrderByName.has(normalizeSpName(sp.name))) {
          agendaOrderByName.set(normalizeSpName(sp.name), agIdx++);
        }
      });
    }
  });
  return [...SP].sort((a, b) => {
    const aOrd = (a.order !== undefined && a.order !== null) ? a.order : null;
    const bOrd = (b.order !== undefined && b.order !== null) ? b.order : null;
    if (aOrd !== null && bOrd !== null) return aOrd - bOrd;
    if (aOrd !== null) return -1;
    if (bOrd !== null) return 1;
    let aIdx = agendaOrderMap.get(a.id);
    let bIdx = agendaOrderMap.get(b.id);
    if (aIdx === undefined) aIdx = agendaOrderByName.get(normalizeSpName(a.name));
    if (bIdx === undefined) bIdx = agendaOrderByName.get(normalizeSpName(b.name));
    if (aIdx !== undefined && bIdx !== undefined) return aIdx - bIdx;
    if (aIdx !== undefined) return -1;
    if (bIdx !== undefined) return 1;
    return (a.name || "").localeCompare(b.name || "");
  });
}

// 좌장(Chair) 인지 판별
//   1) SP의 role/title에 "chair"/"좌장"/"moderator"/"사회" 포함
//   2) Agenda section.chair에서 발견된 이름
function getChairIdSet() {
  const chairIds = new Set();
  const chairNorms = new Set();
  // Agenda section.chair 수집
  const rows = (window.AGENDA_ROWS || (typeof parseAgendaToRows === "function" ? parseAgendaToRows(AGENDA_HTML) : []));
  (rows||[]).forEach(r => {
    if (r.type === "section" && r.chair) {
      const names = (typeof parseChairNames === "function") ? parseChairNames(r.chair) : [r.chair];
      names.forEach(n => { if (n) chairNorms.add(normalizeSpName(n)); });
    }
  });
  // SP에서 좌장 식별
  SP.forEach(s => {
    const roleStr = ((s.role || "") + " " + (s.title || "")).toLowerCase();
    if (/chair|좌장|moderator|사회|moderator/i.test(roleStr)) chairIds.add(s.id);
    if (s.name && chairNorms.has(normalizeSpName(s.name))) chairIds.add(s.id);
  });
  return chairIds;
}

// 좌장 제외 + LOP 순서로 정렬
function getSpeakersExcludingChairs() {
  const chairIds = getChairIdSet();
  return getSpeakersSortedByLOP().filter(s => !chairIds.has(s.id));
}

// 추가 수동 제외 명단으로 필터링 (이름의 일부 토큰 매칭)
function filterOutByNameTokens(speakers, excludeTokens) {
  if (!excludeTokens || excludeTokens.length === 0) return speakers;
  const norms = excludeTokens.map(t => normalizeSpName(String(t)));
  return speakers.filter(s => {
    const fullNorm = normalizeSpName(s.name || "");
    // 전체이름 정규화 문자열에 제외 토큰 정규화가 부분 포함되면 제외
    return !norms.some(t => t && fullNorm.includes(t));
  });
}

// ─────────── 연사별 자료 수집 페이지 (LOP 연사 카드 구조 차용) ───────────
// MATERIALS_BY_SPEAKER 데이터 구조:
//   window.MATERIALS_BY_SPEAKER = {
//     abstract: { [spId]: { collected:bool, files:[], notes:"" } },
//     designs:  { ... }
//   }
function getMaterialsBySp() {
  if (!window.MATERIALS_BY_SPEAKER) window.MATERIALS_BY_SPEAKER = {};
  return window.MATERIALS_BY_SPEAKER;
}
function getSpeakerMaterial(matKey, spId) {
  const all = getMaterialsBySp();
  if (!all[matKey]) all[matKey] = {};
  if (!all[matKey][spId]) all[matKey][spId] = {collected:false, files:[], notes:""};
  return all[matKey][spId];
}

function renderMaterialBySpeaker(matKey, title, icon, description, opts = {}) {
  const excludeChairs = opts.excludeChairs === true;
  const excludeNames = Array.isArray(opts.excludeNames) ? opts.excludeNames : [];
  const includeNames = Array.isArray(opts.includeNames) ? opts.includeNames : [];
  const duplicateAfter = Array.isArray(opts.duplicateAfter) ? opts.duplicateAfter : [];
  const all = getMaterialsBySp();
  const matData = all[matKey] || {};
  if (!window.MAT_SORT_ORDER) window.MAT_SORT_ORDER = {};
  if (!window.MAT_MANUAL) window.MAT_MANUAL = {};
  const customOrder = window.MAT_SORT_ORDER[matKey] || []; // id 배열 (수동 정렬 순서)
  const manualEntries = window.MAT_MANUAL[matKey] || []; // [{id, name, org, title, email}]
  const editSortMode = window._matEditSort === matKey;

  // includeNames 우선: 좌장으로 분류돼 있어도 강제로 포함
  const includeNorms = includeNames.map(t => normalizeSpName(String(t)));
  const isIncluded = (sp) => {
    const fullNorm = normalizeSpName(sp.name || "");
    return includeNorms.some(t => t && fullNorm.includes(t));
  };

  // LOP 동일 정렬 사용
  let sortedSP;
  if (excludeChairs) {
    const chairIds = getChairIdSet();
    SP.forEach(s => { if (isIncluded(s)) chairIds.delete(s.id); });
    sortedSP = getSpeakersSortedByLOP().filter(s => !chairIds.has(s.id));
  } else {
    sortedSP = getSpeakersSortedByLOP();
  }
  // 추가 수동 제외 (단, includeNames에 있으면 제외하지 않음)
  if (excludeNames.length > 0) {
    sortedSP = sortedSP.filter(s => {
      if (isIncluded(s)) return true;
      const fullNorm = normalizeSpName(s.name || "");
      return !excludeNames.some(t => {
        const tn = normalizeSpName(String(t));
        return tn && fullNorm.includes(tn);
      });
    });
  }
  // duplicateAfter: 특정 사람 뒤에 다른 사람의 복제본을 가상 추가
  if (duplicateAfter.length > 0) {
    duplicateAfter.forEach(rule => {
      const afterNorm = normalizeSpName(rule.after || "");
      const targetNorm = normalizeSpName(rule.name || "");
      if (!afterNorm || !targetNorm) return;
      const target = SP.find(s => normalizeSpName(s.name||"").includes(targetNorm));
      if (!target) return;
      const afterIdx = sortedSP.findIndex(s => normalizeSpName(s.name||"").includes(afterNorm));
      if (afterIdx < 0) return;
      // 가상 엔트리 (id 다르게 — _dup 접미사) → 자료 데이터 별도 저장
      const dupId = target.id + "_dup_" + (rule.suffix ? rule.suffix.replace(/\s+/g,"_") : "1");
      const clone = {...target, id: dupId, _isDuplicate: true, _origId: target.id, _suffix: rule.suffix || ""};
      sortedSP.splice(afterIdx + 1, 0, clone);
    });
  }
  // 수동 추가 엔트리 (LOP에 없는 사람)
  if (manualEntries.length > 0) {
    manualEntries.forEach(m => {
      sortedSP.push({...m, _isManual: true});
    });
  }
  // 사용자 수동 정렬 적용 (customOrder에 있는 id 우선 그 순서, 없으면 기존 위치 유지)
  if (customOrder.length > 0) {
    const orderMap = new Map(customOrder.map((id, i) => [id, i]));
    sortedSP.sort((a, b) => {
      // NaN 방지: Infinity → MAX_SAFE_INTEGER 사용
      const ao = orderMap.has(a.id) ? orderMap.get(a.id) : Number.MAX_SAFE_INTEGER;
      const bo = orderMap.has(b.id) ? orderMap.get(b.id) : Number.MAX_SAFE_INTEGER;
      return ao - bo;
    });
  }
  // 통계
  const total = sortedSP.length;
  const collected = sortedSP.filter(s => matData[s.id]?.collected).length;
  const pending = total - collected;
  const withFiles = sortedSP.filter(s => (matData[s.id]?.files||[]).length > 0).length;
  const pctVal = total > 0 ? Math.round(collected / total * 100) : 0;

  // 필터·검색
  const filter = window._matFilter || "all";
  const search = (window._matSearch || "").toLowerCase().trim();
  let filtered = sortedSP;
  if (filter === "collected") filtered = filtered.filter(s => matData[s.id]?.collected);
  else if (filter === "pending") filtered = filtered.filter(s => !matData[s.id]?.collected);
  else if (filter === "hasFiles") filtered = filtered.filter(s => (matData[s.id]?.files||[]).length > 0);
  if (search) filtered = filtered.filter(s =>
    (s.name||"").toLowerCase().includes(search) ||
    (s.org||"").toLowerCase().includes(search) ||
    (s.email||"").toLowerCase().includes(search)
  );

  const mkFilterBtn = (val, label) => {
    const active = filter === val;
    return `<button onclick="window._matFilter='${val}';draw()" style="padding:5px 11px;border-radius:14px;border:1.5px solid ${active?'#1B4FA0':'#E2E8F0'};background:${active?'#1B4FA0':'#fff'};color:${active?'#fff':'#64748b'};font-size:11px;font-weight:700;cursor:pointer;">${label}</button>`;
  };

  return `
  <div class="card" style="padding:14px 18px;margin-bottom:14px;border-left:4px solid #1B4FA0;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
      <div style="flex:1;min-width:0;">
        <div style="font-size:18px;font-weight:800;color:#0B1D3F;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
